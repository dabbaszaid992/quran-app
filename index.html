<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>القرآن الكريم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cairo:wght@400;600;700;900&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2ede4;--bg2:#e8e0d2;--bg3:#ddd5c4;
  --card:#fff;--card2:#faf7f2;
  --gold:#a07830;--gold2:#c09040;--goldbg:#fdf5e4;
  --green:#1a7048;--green2:#228855;--greenbg:#edf7f1;
  --blue:#2060c0;--bluebg:#eef4fd;
  --purple:#6040a0;--purplebg:#f3effe;
  --orange:#c06020;--orangebg:#fef3e8;
  --ink:#1a1208;--ink2:#2e2010;--ink3:#6a5030;--ink4:#a89070;
  --bdr:#d8ccb4;--bdr2:rgba(160,120,48,0.2);--shd:rgba(80,50,10,0.08);
  --ar:'Scheherazade New',serif;--ui:'Cairo',sans-serif;--en:'Lato',sans-serif;
}
.dark{
  --bg:#111008;--bg2:#181208;--bg3:#201808;--card:#1e1808;--card2:#241e0e;
  --gold:#d0a040;--gold2:#e0b850;--goldbg:#1a1400;
  --green:#30b070;--green2:#22cc88;--greenbg:#0a2018;
  --blue:#5080e0;--bluebg:#0a1428;
  --purple:#9070e0;--purplebg:#18103a;
  --orange:#e08040;--orangebg:#281408;
  --ink:#f0e8d0;--ink2:#d8c8a0;--ink3:#907040;--ink4:#504020;
  --bdr:#302808;--bdr2:rgba(208,160,64,0.2);--shd:rgba(0,0,0,0.4);
}
html,body{height:100%;overflow:hidden;background:var(--bg);direction:rtl}
body{font-family:var(--ui);color:var(--ink);direction:rtl}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
.scroller{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.scroller::-webkit-scrollbar{width:0}

/* TOPBAR */
.topbar{flex-shrink:0;z-index:60;background:var(--card);border-bottom:1px solid var(--bdr);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;direction:rtl}
.tb-group{display:flex;gap:6px;align-items:center}
.tb-ico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--bdr);cursor:pointer;font-size:16px;transition:all 0.15s;flex-shrink:0}
.tb-ico:active{background:var(--bg3);transform:scale(0.92)}
.tb-title{font-family:var(--ar);font-size:20px;font-weight:700;color:var(--ink);text-align:center}

/* HOME PRAYER STRIP */
.prayer-strip-wrap{overflow:hidden;background:linear-gradient(180deg,#a8e0e8 0%,#c8f0f4 35%,#e8f8f8 60%,var(--bg2) 100%);padding:14px 14px 0}
.dark .prayer-strip-wrap{background:linear-gradient(180deg,#0a2030 0%,#0e2838 35%,#122030 60%,var(--bg2) 100%)}
.ps-city{text-align:center;font-size:18px;font-weight:900;color:var(--ink);margin-bottom:12px}
.ps-row{display:flex;align-items:flex-end;justify-content:center;gap:6px}
.ps-pill{flex:1;background:rgba(255,255,255,0.55);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.7);border-radius:12px 12px 0 0;padding:10px 5px 12px;text-align:center;transition:all 0.18s}
.dark .ps-pill{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12)}
.ps-pill.active{background:white;border-color:white;box-shadow:0 -2px 16px rgba(0,0,0,0.1);padding-top:14px}
.dark .ps-pill.active{background:rgba(255,255,255,0.15)}
.ps-pname{font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:3px}
.ps-pill.active .ps-pname{color:var(--ink2)}
.ps-ptime{font-size:14px;font-weight:900;color:var(--ink);font-family:var(--en);direction:ltr}
.ps-center{flex:1.2;background:white;border:1.5px solid var(--bdr);border-radius:14px 14px 0 0;padding:12px 6px 12px;text-align:center;box-shadow:0 -3px 18px rgba(0,0,0,0.1)}
.dark .ps-center{background:var(--card2)}
.ps-hijri-day{font-family:var(--ar);font-size:22px;font-weight:700;color:var(--gold);line-height:1.2}
.ps-hijri-month{font-family:var(--ar);font-size:12px;color:var(--gold2);font-weight:600}
.ps-cd-bar{background:var(--card);border-bottom:1px solid var(--bdr);padding:7px 16px;display:flex;align-items:center;justify-content:flex-end;gap:8px}
.ps-cd-lbl{font-size:13px;font-weight:700;color:var(--blue)}
.ps-cd-time{font-size:15px;font-weight:900;color:var(--blue);font-family:var(--en);direction:ltr}

/* HOME MENU */
.home-menu{padding:12px 10px 12px}
.menu-row{display:flex;gap:8px;margin-bottom:8px}
.mcard{flex:1;background:var(--card);border:1.5px solid var(--bdr);border-radius:18px;padding:14px 10px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;box-shadow:0 1px 8px var(--shd);min-height:84px;position:relative;overflow:hidden;gap:5px;text-align:center}
.mcard:active{transform:scale(0.96)}
.mcard.wide{flex:2}
.mcard-ico{font-size:24px}
.mcard-title{font-family:var(--ar);font-size:14px;font-weight:700;color:var(--gold);text-align:center;line-height:1.2}
.mcard-sub{font-size:11px;color:var(--ink4);text-align:center;font-family:var(--ui)}
.mcard-num{position:absolute;left:8px;bottom:6px;font-size:15px;font-weight:900;color:rgba(0,0,0,0.06);font-family:var(--en)}
.dark .mcard-num{color:rgba(255,255,255,0.06)}

/* SURAH LIST */
.list-topbar{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);padding:8px 12px;display:flex;align-items:center;gap:8px}
.ltabs{display:flex;gap:6px;flex:1}
.ltab{padding:7px 12px;border-radius:22px;font-size:13px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all 0.18s;white-space:nowrap}
.ltab.on{background:var(--bg3);color:var(--ink)}
.lsearch{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:22px;padding:6px 12px;flex:1;max-width:130px}
.lsearch input{flex:1;border:none;background:transparent;font-family:var(--ui);font-size:13px;color:var(--ink);outline:none;direction:rtl;min-width:0}
.lsearch input::placeholder{color:var(--ink4)}
.surah-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 8px 80px}
.sgcard{background:var(--card);border:1.5px solid var(--bdr);border-radius:18px;padding:14px 14px 10px 28px;cursor:pointer;transition:all 0.2s;box-shadow:0 1px 8px var(--shd);position:relative;overflow:hidden;text-align:right;direction:rtl;min-height:108px;display:flex;flex-direction:column}
.sgcard:active{transform:scale(0.96);border-color:var(--gold)}
.sgcard-num{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:20px;font-weight:900;color:rgba(0,0,0,0.07);font-family:var(--en)}
.dark .sgcard-num{color:rgba(255,255,255,0.08)}
.sgcard-ar{font-family:var(--ar);font-size:22px;font-weight:700;color:var(--ink);line-height:1.5;direction:rtl}
.sgcard-meta{font-size:12px;color:var(--gold);font-weight:700;margin-top:5px}
.sgcard-page{font-size:11px;color:var(--ink4);margin-top:2px}
.juz-list{padding:8px 8px 80px}
.juz-card{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:13px 14px;margin-bottom:8px;cursor:pointer;transition:all 0.18s;gap:12px;box-shadow:0 1px 6px var(--shd);direction:rtl}
.juz-card:active{border-color:var(--gold);transform:scale(0.98)}
.juz-ball{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0;font-family:var(--en);box-shadow:0 2px 8px rgba(160,120,48,0.35)}
.juz-info{flex:1;text-align:right}
.juz-title{font-size:16px;font-weight:700;color:var(--ink)}
.juz-sub{font-family:var(--ar);font-size:15px;color:var(--ink3);margin-top:2px}

/* READER */
.reader-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.rnav{flex-shrink:0;background:var(--card2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:6px 10px;gap:5px;overflow-x:auto}.rnav::-webkit-scrollbar{height:0}
.rchip{flex-shrink:0;padding:5px 12px;border-radius:22px;font-size:11.5px;font-weight:700;background:var(--bg2);border:1.5px solid var(--bdr);color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all 0.18s}
.rchip.green{background:var(--green);color:#fff;border-color:transparent}
.rchip.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border-color:transparent}
.sheikh-strip{flex-shrink:0;background:var(--card2);border-bottom:1px solid var(--bdr);padding:6px 10px;display:flex;align-items:center;gap:5px;overflow-x:auto}.sheikh-strip::-webkit-scrollbar{height:0}
.sheikh-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;background:var(--bg2);border:1.5px solid var(--bdr);color:var(--ink3);cursor:pointer;white-space:nowrap;transition:all 0.18s}
.sheikh-btn.on{background:var(--gold);color:#fff;border-color:transparent}
.rtool{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:5px 10px;gap:5px}
.rtbtn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1.5px solid var(--bdr);cursor:pointer;font-size:14px;transition:all 0.18s;flex-shrink:0}
.rtbtn.on{background:var(--green);color:#fff;border-color:transparent}
.rtbtn:active{transform:scale(0.9)}
.fcg{display:flex;align-items:center;gap:4px;margin-right:auto}
.fcbtn{width:29px;height:29px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--ink2);font-family:var(--en)}
.fcbtn:active{background:var(--green);color:#fff;border-color:transparent}
.fcval{font-size:11px;color:var(--ink3);min-width:22px;text-align:center;font-weight:700;font-family:var(--en)}
.mpage{flex:1;overflow-y:auto;background:var(--bg)}.mpage::-webkit-scrollbar{width:2px}.mpage::-webkit-scrollbar-thumb{background:var(--bdr)}
.mhdr{background:var(--card);border-bottom:1.5px solid var(--bdr2);padding:20px 16px 18px;text-align:center;position:relative;overflow:hidden}
.mhdr-glow{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(160,120,48,0.07),transparent 70%);pointer-events:none}
.mhdr-ar{font-family:var(--ar);font-size:44px;font-weight:700;color:var(--ink);direction:rtl;line-height:1.3;position:relative;z-index:1}
.mhdr-en{font-family:var(--en);font-size:11px;color:var(--ink4);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;position:relative;z-index:1}
.mhdr-pills{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap;position:relative;z-index:1}
.mpill{background:var(--bg2);border:1px solid var(--bdr);border-radius:22px;padding:3px 12px;font-size:11px;color:var(--ink3);font-weight:600}
.mpill.gold{background:var(--goldbg);border-color:var(--bdr2);color:var(--gold);font-weight:700}
.bism-blk{margin:14px 12px 4px;padding:13px 16px;background:var(--goldbg);border:1px solid var(--bdr2);border-radius:18px;text-align:center;position:relative}
.bism-blk::before,.bism-blk::after{content:'';position:absolute;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.bism-blk::before{top:0}.bism-blk::after{bottom:0}
.bism-ar{font-family:var(--ar);font-size:26px;font-weight:600;color:var(--ink2);direction:rtl;line-height:1.9}
.ayah-body{padding:8px 14px 20px;direction:rtl;font-family:var(--ar);color:var(--ink);line-height:2.5;text-align:justify}
.aspan{display:inline;cursor:pointer;border-radius:5px;padding:1px 2px;transition:background 0.15s}
.aspan.sel{background:rgba(160,120,48,0.18);border-radius:6px;padding:2px 5px}
.aspan.play{background:rgba(26,112,72,0.13)}
.anum{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;margin:0 3px;vertical-align:middle;flex-shrink:0;cursor:pointer;font-size:11px;font-weight:700;color:#fff;font-family:var(--en);background:linear-gradient(135deg,var(--gold),var(--gold2));box-shadow:0 1px 6px rgba(160,120,48,0.4);transition:transform 0.15s}
.anum:active{transform:scale(0.85)}
.anum.playing{background:linear-gradient(135deg,var(--green),var(--green2));animation:beat 1.4s ease-in-out infinite}
@keyframes beat{0%,100%{box-shadow:0 1px 8px rgba(26,112,72,0.4)}50%{box-shadow:0 2px 20px rgba(26,112,72,0.7)}}
.next-banner{margin:6px 12px 18px;padding:13px 14px;background:var(--card);border:1.5px solid var(--bdr);border-radius:18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.2s;box-shadow:0 1px 8px var(--shd)}
.next-banner:active{border-color:var(--gold)}
.nb-ico{font-size:26px;flex-shrink:0}.nb-info{flex:1;text-align:right}
.nb-lbl{font-size:10px;color:var(--green);font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:var(--en)}
.nb-ar{font-family:var(--ar);font-size:21px;color:var(--ink);font-weight:700}
.nb-en{font-size:11px;color:var(--ink4)}
.trans-panel{flex-shrink:0;overflow:hidden;max-height:0;transition:max-height 0.38s cubic-bezier(.4,0,.2,1);background:var(--bg2);border-top:2px solid var(--green)}
.trans-panel.open{max-height:40vh}
.trans-inner{overflow-y:auto;max-height:40vh}.trans-inner::-webkit-scrollbar{width:2px}
.trans-hd{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:rgba(242,237,228,0.97);backdrop-filter:blur(5px);border-bottom:1px solid var(--bdr)}
.dark .trans-hd{background:rgba(17,16,8,0.97)}
.trans-lbl{font-size:11px;font-weight:700;color:var(--green);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--en)}
.trans-x{width:24px;height:24px;border-radius:6px;background:rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:var(--ink3)}
.tv{padding:10px 12px;border-bottom:1px solid rgba(160,120,48,0.1)}
.tv-n{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:4px;font-family:var(--en)}
.tv-ar{font-family:var(--ar);font-size:16px;color:var(--ink2);direction:rtl;text-align:right;line-height:1.9;margin-bottom:5px}
.tv-en{font-size:13px;color:var(--ink3);line-height:1.75;border-right:2.5px solid rgba(26,112,72,0.22);padding-right:9px;text-align:right;font-family:var(--en)}
.abar{flex-shrink:0;background:var(--green);padding:9px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 -2px 16px var(--shd)}
.aplay{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.38);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;color:#fff;flex-shrink:0;transition:all 0.15s}
.aplay:active{background:rgba(255,255,255,0.35);transform:scale(0.92)}
.ainfo{flex:1;min-width:0}
.atitle{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asub{font-size:10px;color:rgba(255,255,255,0.65);font-family:var(--en)}
.aprog{height:3px;background:rgba(255,255,255,0.25);border-radius:3px;margin-top:5px;overflow:hidden}
.afill{height:100%;background:#fff;border-radius:3px;transition:width 0.3s}
.astop{font-size:19px;cursor:pointer;color:rgba(255,255,255,0.72);flex-shrink:0}

/* ATHKAR */
.athkar-home{padding:10px 10px 80px}
.ath-sec-title{font-family:var(--ar);font-size:16px;font-weight:700;color:var(--ink3);padding:10px 4px 6px}
.ath-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.ath-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:18px;padding:16px 14px 16px;cursor:pointer;transition:all 0.2s;box-shadow:0 1px 8px var(--shd);display:flex;flex-direction:column;align-items:center;gap:6px;min-height:96px;position:relative;overflow:hidden;text-align:center}
.ath-card:active{transform:scale(0.96)}
.ath-card-ico{font-size:26px}
.ath-card-title{font-family:var(--ar);font-size:15px;font-weight:700;text-align:center;line-height:1.3}
.ath-card-count{font-size:11px;color:var(--ink4);text-align:center}
.ath-card-bar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 16px 16px}
.ath-morning .ath-card-title{color:#d4820a}.ath-morning .ath-card-bar{background:linear-gradient(90deg,#f0a830,#f8c860)}.ath-morning{border-color:rgba(212,130,10,0.3)}
.ath-evening .ath-card-title{color:#1a5fa0}.ath-evening .ath-card-bar{background:linear-gradient(90deg,#2060c0,#5090f0)}.ath-evening{border-color:rgba(26,95,160,0.3)}
.ath-sleep .ath-card-title{color:#5040a0}.ath-sleep .ath-card-bar{background:linear-gradient(90deg,#6040a0,#9070d0)}.ath-sleep{border-color:rgba(80,64,160,0.3)}
.ath-prayer .ath-card-title{color:#1a7048}.ath-prayer .ath-card-bar{background:linear-gradient(90deg,#1a7048,#30b070)}.ath-prayer{border-color:rgba(26,112,72,0.3)}
.ath-quran .ath-card-title{color:#a07830}.ath-quran .ath-card-bar{background:linear-gradient(90deg,#a07830,#d0a040)}.ath-quran{border-color:rgba(160,120,48,0.3)}
.ath-reader{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ath-reader-scroll{flex:1;overflow-y:auto;padding:10px 10px 20px}.ath-reader-scroll::-webkit-scrollbar{width:2px}
.zikr-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:20px;padding:18px 20px 18px 16px;margin-bottom:12px;box-shadow:0 1px 10px var(--shd);position:relative;overflow:hidden;direction:rtl}
.zikr-bar{position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:20px 0 0 20px}
.zikr-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--bdr);font-size:12px;font-weight:700;color:var(--ink3);font-family:var(--en);margin-bottom:10px}
.zikr-ar{font-family:var(--ar);font-weight:600;color:var(--ink);direction:rtl;text-align:right;line-height:1.9;margin-bottom:8px}
.zikr-tr{font-size:13px;color:var(--ink3);direction:rtl;text-align:right;line-height:1.7;margin-bottom:8px}
.zikr-source{font-size:11px;color:var(--ink4);direction:rtl;text-align:right;margin-bottom:10px;font-style:italic}
.zikr-footer{display:flex;align-items:center;justify-content:space-between}
.zikr-rep{background:var(--goldbg);border:1px solid var(--bdr2);border-radius:22px;padding:4px 14px;font-size:12px;font-weight:700;color:var(--gold)}
.zikr-counter{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;cursor:pointer;color:#fff;font-family:var(--en);transition:transform 0.15s;flex-shrink:0}
.zikr-counter:active{transform:scale(0.88)}
.zikr-done{background:var(--greenbg);border:1.5px solid rgba(26,112,72,0.3);border-radius:22px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--green)}

/* PRAYER PAGE */
.prayer-wrap{flex:1;overflow-y:auto;padding:10px 10px 80px}.prayer-wrap::-webkit-scrollbar{width:0}
.pcity-row{text-align:center;margin-bottom:10px;font-size:20px;font-weight:900;color:var(--ink)}

function useCountdown(t) {
  const [cd, setCd] = useState("--:--:--");
  useEffect(() => {
    if (!t) return;
    const tick = () => {
      const now = new Date();
      const parts = t.split(":").map(Number);
      const tgt = new Date(now);
      tgt.setHours(parts[0], parts[1], 0, 0);
      if (tgt < now) tgt.setDate(tgt.getDate() + 1);
      const d = Math.max(0, tgt - now);
      const hh = String(Math.floor(d / 3600000)).padStart(2, "0");
      const mm = String(Math.floor((d % 3600000) / 60000)).padStart(2, "0");
      const ss = String(Math.floor((d % 60000) / 1000)).padStart(2, "0");
      setCd(hh + ":" + mm + ":" + ss);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [t]);
  return cd;
}

  const openSurah = async (s) => {
    setSurah(s); setTab("reader"); setVerses([]); setTrans([]);
    setLoading(true); stopAudio(); setSelV(null);
    if (pageRef.current) pageRef.current.scrollTop = 0;
    try {
      const [a, e] = await Promise.all([
        fetch(API + "/surah/" + s.n).then(r => r.json()),

    setLoading(false);
  };

  const stopAudio = () => {
    if (aud.current) { aud.current.pause(); aud.current.src = ""; aud.current = null; }
    if (ntimer.current) clearTimeout(ntimer.current);
    setPlaying(false); setPlayV(null); setProg(0);
  };

    stopAudio();
    const url = SHEIKHS[sheikhIdx].url + "/" + globalNum + ".mp3";
    const a = new Audio(url);
    aud.current = a;
    a.ontimeupdate = () => { if (a.duration) setProg(a.currentTime / a.duration * 100); };
    a.onended = () => {
      setProg(0); setPlaying(false);
      const arr = allV || verses;
      const idx = arr.findIndex(v => v.numberInSurah === num);

      setTimeout(() => {
        const el = ayRefs.current[num];

              <div className="ps-center"><div className="ps-hijri-day">{new Date().getDate()}</div><div className="ps-hijri-month">{hijriDate.split(" ")[1] || "رمضان"}</div></div>
              {pt && <div className={"ps-pill" + (nextP === "Asr" ? " active" : "")}><div className="ps-pname">{L(PNAMES_AR.Asr, PNAMES_EN.Asr)}</div><div className="ps-ptime" dir="ltr">{pt.Asr}</div></div>}
              {pt && <div className={"ps-pill" + (nextP === "Maghrib" ? " active" : "")}><div className="ps-pname">{L(PNAMES_AR.Maghrib, PNAMES_EN.Maghrib)}</div><div className="ps-ptime" dir="ltr">{pt.Maghrib}</div></div>}
            </div>
          </div>
          {nextP && pt && (
            <div className="ps-cd-bar">
              <div className="ps-cd-time" dir="ltr">{cd}</div>
              <div className="ps-cd-lbl">{L(PNAMES_AR[nextP] + " بعد", PNAMES_EN[nextP] + " in")}</div>
            </div>
          )}
          <div className="home-menu">
            <div className="menu-row">
              <div className="mcard wide" onClick={() => setTab("surahlist")}><div className="mcard-ico">📖</div><div className="mcard-title">{L("المصحف","Quran")}</div><div className="mcard-sub">{L("114 سورة","114 Surahs")}</div><div className="mcard-num">1</div></div>
              <div className="mcard" onClick={() => setTab("athkar")}><div className="mcard-ico">🤲</div><div className="mcard-title">{L("الأذكار","Athkar")}</div><div className="mcard-sub">{L("5 أقسام","5 sections")}</div><div className="mcard-num">2</div></div>
            </div>
            <div className="menu-row">
              <div className="mcard" onClick={() => setTab("prayer")}><div className="mcard-ico">🕌</div><div className="mcard-title">{L("الصلاة","Prayer")}</div><div className="mcard-sub">{L("مواقيت","Times")}</div><div className="mcard-num">3</div></div>
              <div className="mcard" onClick={() => setTab("ramadan")}><div className="mcard-ico">🌙</div><div className="mcard-title">{L("رمضان","Ramadan")}</div><div className="mcard-sub">{L("1447 هـ","1447 AH")}</div><div className="mcard-num">4</div></div>
              <div className="mcard" onClick={() => openSurah(SURAHS[17])}><div className="mcard-ico">⭐</div><div className="mcard-title">{L("الكهف","Al-Kahf")}</div><div className="mcard-sub">{L("سورة ١٨","Surah 18")}</div><div className="mcard-num">18</div></div>
            </div>
            <div className="menu-row">
              <div className="mcard" onClick={() => openSurah(SURAHS[35])}><div className="mcard-ico">✨</div><div className="mcard-title">{L("يس","Ya-Sin")}</div><div className="mcard-sub">{L("سورة ٣٦","Surah 36")}</div><div className="mcard-num">36</div></div>
              <div className="mcard" onClick={() => openSurah(SURAHS[66])}><div className="mcard-ico">🌙</div><div className="mcard-title">{L("الملك","Al-Mulk")}</div><div className="mcard-sub">{L("سورة ٦٧","S.67")}</div><div className="mcard-num">67</div></div>
              <div className="mcard" onClick={() => openSurah(SURAHS[54])}><div className="mcard-ico">💚</div><div className="mcard-title">{L("الرحمن","Ar-Rahman")}</div><div className="mcard-sub">{L("سورة ٥٥","S.55")}</div><div className="mcard-num">55</div></div>
            </div>
          </div>
        </div>
      )}

      {/* SURAH LIST */}
      {tab === "surahlist" && (
        <React.Fragment>
          <div className="list-topbar">
            <div className="ltabs">
              <div className={"ltab" + (surahTab === "surahs" ? " on" : "")} onClick={() => setSurahTab("surahs")}>{L("السور","Surahs")}</div>
              <div className={"ltab" + (surahTab === "juz" ? " on" : "")} onClick={() => setSurahTab("juz")}>{L("الأجزاء","Juz")}</div>
            </div>
            <div className="lsearch">
              <span style={{fontSize:13,color:"var(--ink4)"}}>🔍</span>
              <input placeholder={L("بحث...","Search...")} value={q} onChange={e => setQ(e.target.value)} />
            </div>
          </div>
          <div className="scroller su">
            {surahTab === "surahs" && (
              <div className="surah-grid">
                {fil.map(s => (
                  <div key={s.n} className="sgcard" onClick={() => openSurah(s)}>
                    <div className="sgcard-num">{s.n}</div>
                    <div className="sgcard-ar">{s.ar}</div>
                    <div className="sgcard-meta">{L(s.tar, s.ten)} · {s.v} {L("آية","v")}</div>
                    <div className="sgcard-page">{L("ص","P.")} {s.pg}</div>
                  </div>
                ))}
              </div>
            )}
            {surahTab === "juz" && (
              <div className="juz-list">
                {JUZ.map(j => {
                  const s = SURAHS[j.s - 1];
                  return (
                    <div key={j.j} className="juz-card" onClick={() => openSurah(s)}>
                      <div className="juz-ball">{j.j}</div>
                      <div className="juz-info">
                        <div className="juz-title">{L("الجزء " + j.j, "Juz " + j.j)}</div>
                        <div className="juz-sub">{L(s.arShort, s.en)}</div>
                      </div>
                      <span style={{fontSize:18,color:"var(--ink4)"}}>←</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </React.Fragment>
      )}

      {/* READER */}
      {tab === "reader" && surah && (
        <div className="reader-wrap su">
          <div className="rnav">
            <div className="rchip green">{surah.arShort}</div>
            <div style={{width:1,height:14,background:"var(--bdr)",flexShrink:0}} />
            <div className="rchip gold">{L("الجزء " + getJuz(surah.n), "Juz " + getJuz(surah.n))}</div>
            <div style={{width:1,height:14,background:"var(--bdr)",flexShrink:0}} />
            <div className="rchip" onClick={() => setShowTrans(s => !s)}>{showTrans ? L("إخفاء","Hide") : L("ترجمة","Translation")}</div>
            <div style={{marginRight:"auto",fontSize:11,color:"var(--ink4)",flexShrink:0,fontWeight:700,fontFamily:"var(--en)"}}>{surah.v}</div>
          </div>
          <div className="sheikh-strip">
            <span style={{fontSize:11,color:"var(--ink4)",flexShrink:0,fontWeight:700}}>{L("القارئ:","Sheikh:")}</span>
            {SHEIKHS.map((sh, i) => (
              <div key={sh.id} className={"sheikh-btn" + (sheikhIdx === i ? " on" : "")}
                onClick={() => { setSheikhIdx(i); if (playV !== null) { stopAudio(); msg(L("تم التغيير إلى " + sh.ar, "Switched to " + sh.en)); } }}>
                {isAr ? sh.ar : sh.en}
              </div>
            ))}
          </div>
          <div className="rtool">
            <div className={"rtbtn" + (autoScroll ? " on" : "")} onClick={() => setAutoScroll(s => !s)}>📜</div>
            <div className="rtbtn" onClick={() => { if (selV) { const v = verses.find(x => x.numberInSurah === selV); if (v) toggleBM(v, surah); } else msg(L("اضغط على آية","Tap an ayah")); }}>🔖</div>
            <div className="rtbtn" onClick={() => { if (selV) { const v = verses.find(x => x.numberInSurah === selV); if (v) share(v, surah); } else msg(L("اضغط على آية","Tap an ayah")); }}>📤</div>
            <div className="rtbtn" onClick={() => { if (verses[0]) playAyah(verses[0].numberInSurah, verses[0].number, verses); }}>▶</div>
            <div className="fcg">
              <div className="fcbtn" onClick={() => setFs(f => Math.max(18, f - 2))}>A−</div>
              <div className="fcval">{fs}</div>
              <div className="fcbtn" onClick={() => setFs(f => Math.min(42, f + 2))}>A+</div>
            </div>
          </div>
          <div className="mpage" ref={pageRef}>
            <div className="mhdr">
              <div className="mhdr-glow" />
              <div className="mhdr-ar">{surah.ar}</div>
              <div className="mhdr-en">{surah.en}</div>
              <div className="mhdr-pills">
                <span className="mpill">{surah.v} {L("آية","Ayahs")}</span>
                <span className="mpill">{L(surah.tar, surah.ten)}</span>
                <span className="mpill gold">{L("الجزء " + getJuz(surah.n), "Juz " + getJuz(surah.n))}</span>
                <span className="mpill">{L("ص","P.")}{surah.pg}</span>
              </div>
            </div>
            {surah.n !== 1 && surah.n !== 9 && (<div className="bism-blk"><div className="bism-ar">{BISM}</div></div>)}
            {loading ? (
              <div className="loading"><div className="spin">🌙</div>{L("جاري التحميل...","Loading...")}</div>
            ) : (
              <React.Fragment>
                <div className="ayah-body" style={{fontSize: fs + "px"}}>
                  {verses.map(v => (
                    <span key={v.number}
                      ref={el => { if (el) ayRefs.current[v.numberInSurah] = el; }}
                      className={"aspan" + (playV === v.numberInSurah ? " play" : "") + (selV === v.numberInSurah ? " sel" : "")}
                      onClick={() => setSelV(p => p === v.numberInSurah ? null : v.numberInSurah)}>
                      {v.text}{" "}
                      <span className={"anum" + (playV === v.numberInSurah ? " playing" : "")}
                        onClick={e => { e.stopPropagation(); playAyah(v.numberInSurah, v.number, verses); }}>
                        {v.numberInSurah}
                      </span>{" "}
                    </span>
                  ))}
                </div>
                {nextSurah && verses.length > 0 && (
                  <div className="next-banner" onClick={() => openSurah(nextSurah)}>
                    <div style={{fontSize:20,color:"var(--ink4)"}}>→</div>
                    <div className="nb-info">
                      <div className="nb-lbl">{L("السورة التالية","Next Surah")}</div>
                      <div className="nb-ar">{nextSurah.ar}</div>
                      <div className="nb-en">{nextSurah.en} · {nextSurah.v} {L("آية","verses")}</div>
                    </div>
                    <div className="nb-ico">📖</div>
                  </div>
                )}
              </React.Fragment>
            )}
          </div>
          <div className={"trans-panel" + (showTrans ? " open" : "")}>
            <div className="trans-inner">
              <div className="trans-hd">
                <div className="trans-lbl">✦ Sahih International</div>
                <div className="trans-x" onClick={() => setShowTrans(false)}>✕</div>
              </div>
              {trans.map((t, i) => (
                <div key={t.number} className="tv">
                  <div className="tv-n">Ayah {t.numberInSurah}</div>
                  <div className="tv-ar">{verses[i] && verses[i].text}</div>
                  <div className="tv-en">{t.text}</div>
                </div>
              ))}
            </div>
          </div>
          {playV !== null && (
            <div className="abar">
              <div className="aplay" onClick={togglePlay}>{playing ? "⏸" : "▶"}</div>
              <div className="ainfo">
                <div className="atitle">{L("الآية " + playV + " · " + SHEIKHS[sheikhIdx].ar, "Ayah " + playV + " · " + SHEIKHS[sheikhIdx].en)}</div>
                <div className="asub">{surah.en} · Auto {autoScroll ? "ON" : "OFF"}</div>
                <div className="aprog"><div className="afill" style={{width: prog + "%"}} /></div>
              </div>
              <div className="astop" onClick={stopAudio}>⏹</div>
            </div>
          )}
        </div>
      )}

      {/* ATHKAR HOME */}
      {tab === "athkar" && !athCat && (
        <div className="scroller su">
          <div className="athkar-home">
            <div className="ath-sec-title">{L("اختر قسماً","Choose a section")}</div>
            <div className="ath-grid">
              {ATHKAR_CATS.map(c => (
                <div key={c.id} className={"ath-card ath-" + c.col} onClick={() => setAthCat(c.id)}>
                  <div className="ath-card-ico">{c.ico}</div>
                  <div className="ath-card-title">{isAr ? c.ar : c.en}</div>
                  <div className="ath-card-count">{(ATHKAR_DATA[c.id] || []).length} {L("ذكر","adhkar")}</div>
                  <div className="ath-card-bar" />
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ATHKAR READER */}
      {tab === "athkar" && athCat && (
        <AthkarReader
          cat={athCat}
          items={ATHKAR_DATA[athCat] || []}
          fs={fs}
          isAr={isAr}
          zikrCounts={zikrCounts}
          onIncr={incrZikr}
          onBack={() => setAthCat(null)}
        />
      )}

      {/* RAMADAN */}
      {tab === "ramadan" && (
        <RamadanPage
          pt={pt}
          isAr={isAr}
          taraweehDone={taraweehDone}
          setTaraweehDone={setTaraweehDone}
          khatmDone={khatmDone}
          setKhatmDone={setKhatmDone}
        />
      )}

      {/* PRAYER */}
      {tab === "prayer" && (
        <div className="prayer-wrap su">
          <div className="pcity-row">{L("دبي، الإمارات","Dubai, UAE")}</div>
          <div className="pdate-row">
            <div className="pdate-card"><div className="pdate-ar" dir="rtl">{weekdayAr} · {hijriDate.split(" ").slice(0,2).join(" ")}</div></div>
            <div className="pdate-card"><div className="pdate-en">{weekdayEn}</div><div className="pdate-en" style={{fontSize:11,color:"var(--ink4)",marginTop:2}}>{todayEn}</div></div>
          </div>
          {nextP && pt && (
            <div className="pnext">
              <div className="pnext-lbl">{L(PNAMES_AR[nextP] + " بعد", PNAMES_EN[nextP] + " in")}</div>
              <div className="pnext-cd" dir="ltr">{cd}</div>
            </div>
          )}
          <div className="pgrid">
            {pt && PRAYERS_MAIN.map(p => (
              <div key={p} className={"pcard" + (nextP === p ? " now" : "")}>
                <div className="pcard-name">{PICO[p]} {L(PNAMES_AR[p], PNAMES_EN[p])}</div>
                <div className="pcard-time" dir="ltr">{pt[p] ? pt[p].split(":").slice(0,2).join(":") : "--:--"}</div>
                <div className="pcard-ampm">{L(parseInt(pt[p]) >= 12 ? "م" : "ص", parseInt(pt[p]) >= 12 ? "PM" : "AM")}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* BOOKMARKS */}
      {tab === "bookmarks" && (
        <div className="bm-wrap su">
          <div className="bmhero">
            <div className="bmhero-title">{L("المحفوظات","Bookmarks")}</div>
            <div className="bmhero-sub">{bms.length} {L("آيات محفوظة","saved ayahs")}</div>
          </div>
          {bms.length === 0 ? (
            <div className="empty">
              <div className="empty-ico">🔖</div>
              <div className="empty-txt">{L("لا توجد محفوظات\nافتح سورة → اضغط على آية → 🔖","No bookmarks yet\nOpen a surah → tap an ayah → 🔖")}</div>
            </div>
          ) : bms.map(b => (
            <div key={b.id} className="bmrow" onClick={() => openSurah(SURAHS[b.sn - 1])}>
              <div className="bmico">🔖</div>
              <div className="bmi">
                <div className="bmtitle">{b.sar} · {L("آية","Ayah")} {b.vn}</div>
                <div className="bmsub">{b.sen} · {L("سورة","Surah")} {b.sn}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* BOTTOM NAV */}
      <div className="bnav">
        {NAV_TABS.map(n => (
          <div key={n.id}
            className={"bnitem" + ((tab === n.id || (tab === "reader" && n.id === "surahlist")) ? " on" : "")}
            onClick={() => { stopAudio(); if (n.id !== "athkar") setAthCat(null); setTab(n.id); }}>
            <span className="bnico">{n.ico}</span>
            <span className="bnlbl">{L(n.ar, n.en)}</span>
          </div>
        ))}
      </div>

      {/* DRAWER */}
      {drawer && <div className="overlay" onClick={() => setDrawer(false)} />}
      <div className={"drawer" + (drawer ? " open" : "")}>
        <div className="dhead">
          <div><div className="dh-ar">القرآن الكريم</div><div className="dh-en">The Holy Quran</div></div>
          <div className="dclose" onClick={() => setDrawer(false)}>✕</div>
        </div>
        <div className="dbody">
          <div className="dsec">
            <div className="dsec-t">Settings · الإعدادات</div>
            {[
              {ar:"🌙 الوضع الليلي",  en:"🌙 Night Mode",       on:dark,       fn:() => setDark(d => !d)},
              {ar:"🌐 إنجليزي",        en:"🌐 Switch to Arabic", on:!isAr,      fn:() => setIsAr(a => !a)},
              {ar:"📜 تمرير تلقائي",   en:"📜 Auto-Scroll",      on:autoScroll, fn:() => setAutoScroll(s => !s)},
              {ar:"📖 عرض الترجمة",    en:"📖 Show Translation", on:showTrans,  fn:() => setShowTrans(s => !s)},
            ].map(r => (
              <div key={r.ar} className="trow">
                <span className="trow-lbl">{L(r.ar, r.en)}</span>
                <Tog on={r.on} fn={r.fn} />
              </div>
            ))}
            <div className="trow">
              <span className="trow-lbl">{L("🔤 حجم الخط","🔤 Font Size")}</span>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div className="fcbtn" onClick={() => setFs(f => Math.max(18, f - 2))}>−</div>
                <span style={{fontSize:13,color:"var(--ink2)",minWidth:22,textAlign:"center",fontWeight:700,fontFamily:"var(--en)"}}>{fs}</span>
                <div className="fcbtn" onClick={() => setFs(f => Math.min(42, f + 2))}>+</div>
              </div>
            </div>
          </div>
          <div className="dsec">
            <div className="dsec-t">Sheikh · القارئ</div>
            <div className="sheikh-grid">
              {SHEIKHS.map((sh, i) => (
                <div key={sh.id} className={"sheikh-radio" + (sheikhIdx === i ? " on" : "")}
                  onClick={() => { setSheikhIdx(i); if (playV !== null) { stopAudio(); msg(L("تم التغيير", "Switched")); } setDrawer(false); }}>
                  <div className="sheikh-radio-name">{isAr ? sh.ar : sh.en}</div>
                  <div className="sheikh-radio-en">{sh.en}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
