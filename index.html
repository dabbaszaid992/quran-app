<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>القرآن الكريم</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cairo:wght@400;600;700;900&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2ede4;--bg2:#e8e0d2;--bg3:#ddd5c4;
  --card:#fff;--card2:#faf7f2;
  --gold:#a07830;--gold2:#c09040;--goldbg:#fdf5e4;
  --green:#1a7048;--green2:#228855;--greenbg:#edf7f1;
  --blue:#1a50a0;--bluebg:#eef4fd;
  --purple:#6040a0;--purplebg:#f3effe;
  --orange:#c06020;--orangebg:#fef3e8;
  --ink:#1a1208;--ink2:#2e2010;--ink3:#6a5030;--ink4:#a89070;
  --bdr:#d8ccb4;--bdr2:rgba(160,120,48,0.25);--shd:rgba(80,50,10,0.08);
  --ar:'Scheherazade New',serif;--ui:'Cairo',sans-serif;--en:'Lato',sans-serif;
}
.dark{
  --bg:#0f0e08;--bg2:#181208;--bg3:#201808;--card:#1a1808;--card2:#221e0e;
  --gold:#d0a040;--gold2:#e0b850;--goldbg:#181200;
  --green:#28a060;--green2:#30b870;--greenbg:#081a10;
  --blue:#4070d0;--bluebg:#080e1e;
  --purple:#8060d0;--purplebg:#100820;
  --orange:#d07030;--orangebg:#1a0e04;
  --ink:#ede8dc;--ink2:#d0c090;--ink3:#806030;--ink4:#483a20;
  --bdr:#281e08;--bdr2:rgba(200,150,40,0.22);--shd:rgba(0,0,0,0.45);
}
html,body{height:100%;overflow:hidden;background:var(--bg);direction:rtl}
body{font-family:var(--ui);color:var(--ink);direction:rtl}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.scroll::-webkit-scrollbar{width:0}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;z-index:60;background:var(--card);border-bottom:1px solid var(--bdr);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.tb-g{display:flex;gap:6px;align-items:center}
.tb-ico{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--bdr);cursor:pointer;font-size:15px;transition:all 0.15s;flex-shrink:0}
.tb-ico:active{transform:scale(0.9)}
.tb-title{font-family:var(--ar);font-size:19px;font-weight:700;color:var(--ink);text-align:center;flex:1}

/* ── HOME ── */
.home-prayer{overflow:hidden;background:linear-gradient(180deg,#9ad8e8 0%,#c4eef4 40%,#e0f4f6 65%,var(--bg2) 100%);padding:12px 12px 0}
.dark .home-prayer{background:linear-gradient(180deg,#071820 0%,#0c2030 40%,#102030 65%,var(--bg2) 100%)}
.hp-city{text-align:center;font-size:17px;font-weight:900;color:var(--ink);margin-bottom:10px;font-family:var(--ui)}
.hp-row{display:flex;align-items:flex-end;justify-content:center;gap:5px}
.hp-pill{flex:1;background:rgba(255,255,255,0.52);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.68);border-radius:10px 10px 0 0;padding:9px 4px 11px;text-align:center;transition:all 0.18s}
.dark .hp-pill{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.1)}
.hp-pill.act{background:white;border-color:white;box-shadow:0 -2px 14px rgba(0,0,0,0.1);padding-top:13px}
.dark .hp-pill.act{background:rgba(255,255,255,0.14)}
.hpp-name{font-size:10px;font-weight:700;color:var(--ink3);margin-bottom:2px;font-family:var(--ui)}
.hp-pill.act .hpp-name{color:var(--ink2)}
.hpp-time{font-size:13px;font-weight:900;color:var(--ink);font-family:var(--en);direction:ltr}
.hp-center{flex:1.15;background:white;border:1.5px solid var(--bdr);border-radius:12px 12px 0 0;padding:10px 5px 11px;text-align:center;box-shadow:0 -3px 16px rgba(0,0,0,0.08)}
.dark .hp-center{background:var(--card2)}
.hpc-day{font-family:var(--ar);font-size:20px;font-weight:700;color:var(--gold);line-height:1.2}
.hpc-month{font-family:var(--ar);font-size:11px;color:var(--gold2);font-weight:600}

/* Countdown + fast duration row */
.home-info-bar{background:var(--card);border-bottom:1px solid var(--bdr);padding:0;display:flex;align-items:stretch}
.hib-next{flex:1;padding:9px 12px;display:flex;align-items:center;gap:8px;border-left:1px solid var(--bdr)}
.hib-fast{flex:1;padding:9px 12px;display:flex;align-items:center;gap:6px}
.hib-label{font-family:var(--ui);font-size:12px;font-weight:700;color:var(--blue);line-height:1.2}
.hib-next-name{font-family:var(--ui);font-size:13px;font-weight:900;color:var(--blue)}
.hib-time{font-family:var(--en);font-size:16px;font-weight:900;color:var(--blue);direction:ltr;letter-spacing:0.5px}
.hib-fast-ico{font-size:18px;flex-shrink:0}
.hib-fast-text{font-family:var(--ui);font-size:11px;font-weight:700;color:var(--orange);line-height:1.35}

/* Rotating dua bar */
.home-dua-bar{background:var(--goldbg);border-bottom:1.5px solid var(--bdr2);padding:9px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.hdb-label{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-family:var(--en);flex-shrink:0}
.hdb-text{font-family:var(--ar);font-size:15px;color:var(--ink2);flex:1;direction:rtl;line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdb-arrow{font-size:13px;color:var(--gold2);flex-shrink:0}

/* HOME GRID - improved layout */
.home-grid{padding:10px 10px 10px}
.hg-row{display:flex;gap:8px;margin-bottom:8px}
.hg-card{flex:1;background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:13px 10px 11px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.18s;box-shadow:0 1px 7px var(--shd);position:relative;overflow:hidden;gap:5px;text-align:center;min-height:80px}
.hg-card:active{transform:scale(0.95);border-color:var(--gold)}
.hg-card.feat{border-color:var(--bdr2);background:var(--goldbg)}
.hg-ico{font-size:20px}
.hg-title{font-family:var(--ar);font-size:14px;font-weight:700;color:var(--gold);line-height:1.2}
.hg-sub{font-size:10px;color:var(--ink4);font-family:var(--ui)}
.hg-num{position:absolute;left:7px;bottom:5px;font-size:13px;font-weight:900;color:rgba(0,0,0,0.05);font-family:var(--en)}
.dark .hg-num{color:rgba(255,255,255,0.05)}

/* ── SURAH LIST ── */
.list-topbar{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);padding:7px 12px;display:flex;align-items:center;gap:7px}
.ltabs{display:flex;gap:5px;flex:1}
.ltab{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.ltab.on{background:var(--bg3);color:var(--ink)}
.lsearch{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:20px;padding:5px 11px;max-width:120px;flex:1}
.lsearch input{flex:1;border:none;background:transparent;font-size:13px;color:var(--ink);outline:none;direction:rtl;min-width:0;font-family:var(--ui)}
.lsearch input::placeholder{color:var(--ink4)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:9px 8px 80px}
.sgcard{background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:13px 13px 9px 26px;cursor:pointer;transition:all 0.18s;box-shadow:0 1px 7px var(--shd);position:relative;overflow:hidden;text-align:right;direction:rtl;min-height:100px;display:flex;flex-direction:column}
.sgcard:active{transform:scale(0.96);border-color:var(--gold)}
.sgcard-num{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:18px;font-weight:900;color:rgba(0,0,0,0.06);font-family:var(--en)}
.dark .sgcard-num{color:rgba(255,255,255,0.07)}
.sgcard-ar{font-family:var(--ar);font-size:21px;font-weight:700;color:var(--ink);line-height:1.5;direction:rtl}
.sgcard-meta{font-size:11px;color:var(--gold);font-weight:700;margin-top:4px}
.sgcard-page{font-size:10px;color:var(--ink4);margin-top:2px}
.juz-list{padding:7px 8px 80px}
.juz-card{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--bdr);border-radius:14px;padding:12px 13px;margin-bottom:7px;cursor:pointer;transition:all 0.16s;gap:11px;box-shadow:0 1px 5px var(--shd);direction:rtl}
.juz-card:active{border-color:var(--gold);transform:scale(0.98)}
.juz-ball{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0;font-family:var(--en)}
.juz-info{flex:1;text-align:right}
.juz-title{font-size:15px;font-weight:700;color:var(--ink)}
.juz-sub{font-family:var(--ar);font-size:14px;color:var(--ink3);margin-top:1px}

/* ── READER ── */
.reader-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.rnav{flex-shrink:0;background:var(--card2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:5px 9px;gap:4px;overflow-x:auto}.rnav::-webkit-scrollbar{height:0}
.rchip{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;background:var(--bg2);border:1.5px solid var(--bdr);color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all 0.15s}
.rchip.grn{background:var(--green);color:#fff;border-color:transparent}
.rchip.gld{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border-color:transparent}
.sheikh-strip{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bdr);padding:5px 9px;display:flex;align-items:center;gap:4px;overflow-x:auto}.sheikh-strip::-webkit-scrollbar{height:0}
.sh-btn{flex-shrink:0;padding:4px 11px;border-radius:18px;font-size:11px;font-weight:700;background:var(--card);border:1.5px solid var(--bdr);color:var(--ink3);cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:var(--ui)}
.sh-btn.on{background:var(--gold);color:#fff;border-color:transparent}
.rtool{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:4px 9px;gap:4px}
.rtbtn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1.5px solid var(--bdr);cursor:pointer;font-size:13px;transition:all 0.15s;flex-shrink:0}
.rtbtn.on{background:var(--green);color:#fff;border-color:transparent}
.rtbtn:active{transform:scale(0.88)}
.fcg{display:flex;align-items:center;gap:3px;margin-right:auto}
.fcbtn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--bdr);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--ink2);font-family:var(--en)}
.fcbtn:active{background:var(--green);color:#fff;border-color:transparent}
.fcval{font-size:11px;color:var(--ink3);min-width:20px;text-align:center;font-weight:700;font-family:var(--en)}
.mpage{flex:1;overflow-y:auto;background:var(--bg)}.mpage::-webkit-scrollbar{width:2px}.mpage::-webkit-scrollbar-thumb{background:var(--bdr)}
.mhdr{background:var(--card);border-bottom:1.5px solid var(--bdr2);padding:18px 14px 15px;text-align:center;position:relative;overflow:hidden}
.mhdr-glow{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(160,120,48,0.07),transparent 70%);pointer-events:none}
.mhdr-ar{font-family:var(--ar);font-size:42px;font-weight:700;color:var(--ink);direction:rtl;line-height:1.3;position:relative;z-index:1}
.mhdr-en{font-family:var(--en);font-size:10px;color:var(--ink4);letter-spacing:2.5px;text-transform:uppercase;margin-top:3px;position:relative;z-index:1}
.mhdr-pills{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:9px;flex-wrap:wrap;position:relative;z-index:1}
.mpill{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:2px 10px;font-size:10px;color:var(--ink3);font-weight:600}
.mpill.gld{background:var(--goldbg);border-color:var(--bdr2);color:var(--gold);font-weight:700}
/* bismillah shown only once - in verse 1 it's already in the text */
.bism-blk{margin:12px 10px 3px;padding:11px 14px;background:var(--goldbg);border:1px solid var(--bdr2);border-radius:16px;text-align:center;position:relative}
.bism-blk::before,.bism-blk::after{content:'';position:absolute;left:14%;right:14%;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.bism-blk::before{top:0}.bism-blk::after{bottom:0}
.bism-ar{font-family:var(--ar);font-size:24px;font-weight:600;color:var(--ink2);direction:rtl;line-height:1.9}
.ayah-body{padding:6px 13px 18px;direction:rtl;font-family:var(--ar);color:var(--ink);line-height:2.6;text-align:justify}
.aspan{display:inline;cursor:pointer;border-radius:4px;padding:1px 2px;transition:background 0.12s}
.aspan.sel{background:rgba(160,120,48,0.16);border-radius:5px}
.aspan.play{background:rgba(26,112,72,0.11)}
.anum{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;margin:0 2px;vertical-align:middle;flex-shrink:0;cursor:pointer;font-size:10px;font-weight:700;color:#fff;font-family:var(--en);background:linear-gradient(135deg,var(--gold),var(--gold2));transition:transform 0.12s}
.anum:active{transform:scale(0.82)}
.anum.playing{background:linear-gradient(135deg,var(--green),var(--green2));animation:beat 1.4s ease-in-out infinite}
@keyframes beat{0%,100%{box-shadow:0 1px 6px rgba(26,112,72,0.35)}50%{box-shadow:0 2px 18px rgba(26,112,72,0.65)}}
.next-banner{margin:5px 10px 16px;padding:12px 13px;background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all 0.18s;box-shadow:0 1px 7px var(--shd)}
.next-banner:active{border-color:var(--gold)}
.nb-info{flex:1;text-align:right}
.nb-lbl{font-size:9px;color:var(--green);font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:var(--en)}
.nb-ar{font-family:var(--ar);font-size:20px;color:var(--ink);font-weight:700}
.nb-en{font-size:10px;color:var(--ink4)}
.trans-panel{flex-shrink:0;overflow:hidden;max-height:0;transition:max-height 0.35s cubic-bezier(.4,0,.2,1);background:var(--bg2);border-top:2px solid var(--green)}
.trans-panel.open{max-height:40vh}
.trans-inner{overflow-y:auto;max-height:40vh}.trans-inner::-webkit-scrollbar{width:2px}
.trans-hd{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:6px 11px;background:rgba(242,237,228,0.97);backdrop-filter:blur(5px);border-bottom:1px solid var(--bdr)}
.dark .trans-hd{background:rgba(15,14,8,0.97)}
.trans-lbl{font-size:10px;font-weight:700;color:var(--green);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--en)}
.trans-x{width:22px;height:22px;border-radius:5px;background:rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--ink3)}
.tv{padding:9px 11px;border-bottom:1px solid rgba(160,120,48,0.09)}
.tv-n{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:9px;margin-bottom:3px;font-family:var(--en)}
.tv-ar{font-family:var(--ar);font-size:15px;color:var(--ink2);direction:rtl;text-align:right;line-height:1.9;margin-bottom:4px}
.tv-en{font-size:12px;color:var(--ink3);line-height:1.7;border-right:2px solid rgba(26,112,72,0.2);padding-right:8px;text-align:right;font-family:var(--en)}
.abar{flex-shrink:0;background:var(--green);padding:8px 13px;display:flex;align-items:center;gap:9px}
.aplay{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.18);border:2px solid rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;color:#fff;flex-shrink:0;transition:all 0.13s}
.aplay:active{background:rgba(255,255,255,0.32);transform:scale(0.9)}
.ainfo{flex:1;min-width:0}
.atitle{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--ui)}
.asub{font-size:9px;color:rgba(255,255,255,0.6);font-family:var(--en)}
.aprog{height:2.5px;background:rgba(255,255,255,0.22);border-radius:3px;margin-top:4px;overflow:hidden}
.afill{height:100%;background:#fff;border-radius:3px;transition:width 0.3s}
.astop{font-size:18px;cursor:pointer;color:rgba(255,255,255,0.7);flex-shrink:0}

/* ── ATHKAR ── */
.ath-home{padding:10px 10px 80px}
.ath-sec{font-family:var(--ar);font-size:15px;font-weight:700;color:var(--ink3);padding:8px 2px 6px}
.ath-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:6px}
.ath-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:14px 12px 14px;cursor:pointer;transition:all 0.18s;box-shadow:0 1px 7px var(--shd);display:flex;flex-direction:column;align-items:center;gap:5px;min-height:90px;position:relative;overflow:hidden;text-align:center}
.ath-card:active{transform:scale(0.95)}
.ath-card-ico{font-size:22px}
.ath-card-title{font-family:var(--ar);font-size:14px;font-weight:700;text-align:center;line-height:1.3}
.ath-card-count{font-size:10px;color:var(--ink4);text-align:center;font-family:var(--ui)}
.ath-bar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 14px 14px}
.ath-morning .ath-card-title{color:#b87010}.ath-morning .ath-bar{background:linear-gradient(90deg,#e09820,#f8c040)}.ath-morning{border-color:rgba(184,112,16,0.25)}
.ath-evening .ath-card-title{color:#1a50a0}.ath-evening .ath-bar{background:linear-gradient(90deg,#1a50a0,#4080e0)}.ath-evening{border-color:rgba(26,80,160,0.25)}
.ath-sleep   .ath-card-title{color:#5040a0}.ath-sleep   .ath-bar{background:linear-gradient(90deg,#5040a0,#8060d0)}.ath-sleep{border-color:rgba(80,64,160,0.25)}
.ath-prayer  .ath-card-title{color:#1a7048}.ath-prayer  .ath-bar{background:linear-gradient(90deg,#1a7048,#28a060)}.ath-prayer{border-color:rgba(26,112,72,0.25)}
.ath-quran   .ath-card-title{color:#a07830}.ath-quran   .ath-bar{background:linear-gradient(90deg,#a07830,#c09040)}.ath-quran{border-color:rgba(160,120,48,0.25)}
.ath-ramadan .ath-card-title{color:#7030a0}.ath-ramadan .ath-bar{background:linear-gradient(90deg,#5a1080,#9040c0)}.ath-ramadan{border-color:rgba(90,16,128,0.25)}
.ath-reader{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ath-scroll{flex:1;overflow-y:auto;padding:9px 9px 20px}.ath-scroll::-webkit-scrollbar{width:2px}
.zcard{background:var(--card);border:1.5px solid var(--bdr);border-radius:18px;padding:16px 17px 14px 14px;margin-bottom:10px;box-shadow:0 1px 8px var(--shd);position:relative;overflow:hidden;direction:rtl}
.zbar{position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:18px 0 0 18px}
.znum{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--bg2);border:1px solid var(--bdr);font-size:11px;font-weight:700;color:var(--ink3);font-family:var(--en);margin-bottom:9px}
.zar{font-family:var(--ar);font-weight:600;color:var(--ink);direction:rtl;text-align:right;line-height:1.95;margin-bottom:7px}

.ram-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:3px;position:relative;z-index:1}

.rtc-ico{font-size:24px;margin-bottom:5px}

.rtc-time{font-size:28px;font-weight:900;color:#fff;font-family:var(--en);direction:ltr;line-height:1}
.rtc-name{font-family:var(--ar);font-size:13px;font-weight:700;color:rgba(255,255,255,0.82);margin-top:3px}
.ram-fast{background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:13px 14px;margin-bottom:9px;box-shadow:0 1px 7px var(--shd)}

.dark .ram-dua{background:linear-gradient(135deg,var(--goldbg),rgba(25,18,0,0.5))}
.ram-dua::before,.ram-dua::after{content:'';position:absolute;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.ram-dua::before{top:0}.ram-dua::after{bottom:0}
.rdc-lbl{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-family:var(--en);margin-bottom:9px;text-align:center}
.rdc-ar{font-family:var(--ar);font-size:19px;font-weight:600;color:var(--ink);direction:rtl;text-align:right;line-height:1.9;margin-bottom:7px}
.rdc-tr{font-size:12px;color:var(--ink3);text-align:right;line-height:1.65}
.rdc-src{font-size:10px;color:var(--ink4);text-align:center;margin-top:7px}
.ram-ig{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.ram-ic{background:var(--card);border:1.5px solid var(--bdr);border-radius:14px;padding:12px 10px;text-align:center;box-shadow:0 1px 5px var(--shd)}
.ric-ico{font-size:22px;margin-bottom:5px}
.ric-title{font-family:var(--ar);font-size:13px;font-weight:700;color:var(--ink2)}
.ric-sub{font-size:10px;color:var(--ink4);margin-top:2px;line-height:1.5;font-family:var(--ui)}
.ric-time{font-size:11px;font-weight:700;color:var(--green);margin-top:3px}
.ram-trk{background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:13px;margin-bottom:9px;box-shadow:0 1px 7px var(--shd)}
.rt-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;direction:rtl}
.rt-ttl{font-family:var(--ar);font-size:14px;font-weight:700;color:var(--ink2)}
.rt-cnt{font-size:11px;color:var(--green);font-weight:700}
.rt-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.rt-day{border-radius:9px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;border:1.5px solid var(--bdr);background:var(--bg2);gap:2px}

.rk-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}

.rk-j.done{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;border-color:transparent}
.rk-j:active{transform:scale(0.85)}

/* ── BOOKMARKS ── */
.bm-wrap{flex:1;overflow-y:auto;padding-bottom:80px}.bm-wrap::-webkit-scrollbar{width:0}
.bmhero{background:var(--card2);padding:14px;border-bottom:1px solid var(--bdr);text-align:right}
.bmhero-t{font-family:var(--ar);font-size:19px;font-weight:700;color:var(--ink)}
.bmhero-s{font-size:11px;color:var(--ink4);margin-top:2px}
.bmrow{display:flex;align-items:center;padding:11px 13px;border-bottom:1px solid rgba(160,120,48,0.09);cursor:pointer;gap:9px;transition:background 0.13s}
.bmrow:active{background:var(--goldbg)}
.bmico{width:34px;height:34px;border-radius:9px;background:var(--goldbg);border:1px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.bmi{flex:1;text-align:right}
.bmtitle{font-family:var(--ar);font-size:14px;font-weight:700;color:var(--ink)}
.bmsub{font-size:10px;color:var(--ink4);margin-top:1px}

/* ── BOTTOM NAV ── */
.bnav{flex-shrink:0;background:var(--card);border-top:1px solid var(--bdr);display:flex;box-shadow:0 -3px 18px var(--shd);padding-bottom:env(safe-area-inset-bottom,0)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;cursor:pointer;gap:3px;position:relative;transition:background 0.15s}
.bni:active{background:var(--bg2)}
.bni-pip{position:absolute;top:6px;right:50%;transform:translateX(10px);width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity 0.2s}
.bni.on .bni-pip{opacity:1}
.bni-ico{font-size:22px;filter:grayscale(1) opacity(0.32);transition:filter 0.18s,transform 0.18s}
.bni-lbl{font-size:9.5px;color:var(--ink4);font-weight:700;transition:color 0.18s;text-align:center;font-family:var(--ui);letter-spacing:0.2px}
.bni.on .bni-ico{filter:none;transform:scale(1.12)}
.bni.on .bni-lbl{color:var(--gold);font-weight:900}

/* ── DRAWER ── */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.46);z-index:200;backdrop-filter:blur(2px)}
.drawer{position:absolute;left:0;top:0;bottom:0;width:84%;max-width:340px;background:var(--bg);z-index:201;transform:translateX(-102%);transition:transform 0.3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:4px 0 28px rgba(0,0,0,0.2);border-right:1px solid var(--bdr)}
.drawer.open{transform:translateX(0)}
.dhead{background:var(--card);border-bottom:1.5px solid var(--bdr);padding:14px 13px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dh-ar{font-family:var(--ar);font-size:22px;font-weight:700;color:var(--gold)}
.dh-en{font-size:9px;color:var(--ink4);letter-spacing:2.5px;text-transform:uppercase;margin-top:2px;font-family:var(--en)}
.dcls{width:30px;height:30px;border-radius:8px;background:var(--bg2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink3);cursor:pointer}
.dbody{flex:1;overflow-y:auto;padding:13px}.dbody::-webkit-scrollbar{width:2px}
.dsec{margin-bottom:16px}
.dsec-t{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1.5px solid var(--bdr);display:flex;align-items:center;gap:6px;font-family:var(--en)}
.dsec-t::before{content:'';width:3px;height:11px;background:linear-gradient(180deg,var(--gold),var(--gold2));border-radius:2px;flex-shrink:0}
.trow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(160,120,48,0.09)}
.trow-lbl{font-size:13px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:6px}
.tog{width:42px;height:24px;border-radius:12px;background:var(--bdr);cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
.tog.on{background:var(--green)}
.togk{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.tog.on .togk{transform:translateX(18px)}
.sh-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px}
.sh-radio{background:var(--card);border:1.5px solid var(--bdr);border-radius:11px;padding:8px 9px;cursor:pointer;transition:all 0.15s;text-align:right;direction:rtl}

.sh-radio.on .sh-radio-name{color:var(--gold)}
.sh-radio-en{font-size:9px;color:var(--ink4);font-family:var(--en);margin-top:1px}

.hg-wide{width:100%;flex:none}

.hgf-title{font-family:var(--ar);font-size:14px;font-weight:700;color:var(--orange);text-align:right;direction:rtl;margin-bottom:9px}

/* Prayer reminder */

.prem-name{font-size:14px;font-weight:700;color:var(--ink2);font-family:var(--ui)}

.prem-tog-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.prem-tog-lbl{font-size:11px;color:var(--ink4);font-family:var(--ui)}

/* Athkar audio bar */
.ath-audio-bar{flex-shrink:0;background:var(--goldbg);border-bottom:1.5px solid var(--bdr2);padding:7px 12px;display:flex;align-items:center;gap:8px}
.aab-lbl{font-size:10px;font-weight:700;color:var(--gold);font-family:var(--en);flex-shrink:0;letter-spacing:1px}
.aab-sh{display:flex;gap:4px;flex:1;overflow-x:auto}.aab-sh::-webkit-scrollbar{height:0}
.aab-btn{flex-shrink:0;padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;background:var(--bg2);border:1.5px solid var(--bdr);color:var(--ink3);cursor:pointer;font-family:var(--ui);transition:all 0.15s}
.aab-btn.on{background:var(--gold);color:#fff;border-color:transparent}
.aab-play{width:30px;height:30px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:#fff;flex-shrink:0;transition:all 0.15s}
.aab-play:active{transform:scale(0.88)}
.aab-stop{font-size:16px;cursor:pointer;color:var(--ink3);flex-shrink:0}

/* Islamic background images section */
.home-bg-strip{position:relative;overflow:hidden;height:110px;flex-shrink:0;background:linear-gradient(135deg,#1a0a30,#2a1050 40%,#1a3060)}
.home-bg-strip img{width:100%;height:100%;object-fit:cover;opacity:0.55;display:block}
.dark .home-bg-strip img{opacity:0.28}
.home-bg-strip-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,var(--bg2) 100%)}

/* MISC */
.empty{text-align:center;padding:55px 18px}
.empty-ico{font-size:48px;opacity:0.18;margin-bottom:11px}
.empty-txt{color:var(--ink4);font-size:14px;line-height:1.9;font-family:var(--ui)}
.loading{text-align:center;padding:45px 18px;color:var(--ink4)}
.spin{display:block;font-size:30px;animation:sp 1.3s linear infinite;margin:0 auto 9px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:absolute;bottom:78px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;white-space:nowrap;animation:fio 2.4s ease forwards;box-shadow:0 3px 16px rgba(26,112,72,0.4);font-family:var(--ui)}
@keyframes fio{0%{opacity:0;transform:translateX(-50%) translateY(7px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}82%{opacity:1}100%{opacity:0}}
.su{animation:su 0.26s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>

function useCountdown(t) {
  const [cd, setCd] = useState("--:--:--");
  useEffect(() => {
    if (!t) return;
    const tick = () => {
      const now = new Date();
      const p = t.split(":").map(Number);
      const tgt = new Date(now);
      tgt.setHours(p[0], p[1], 0, 0);
      if (tgt < now) tgt.setDate(tgt.getDate() + 1);
      const d = Math.max(0, tgt - now);
      const hh = String(Math.floor(d / 3600000)).padStart(2, "0");
      const mm = String(Math.floor((d % 3600000) / 60000)).padStart(2, "0");
      const ss = String(Math.floor((d % 60000) / 1000)).padStart(2, "0");
      setCd(hh + ":" + mm + ":" + ss);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [t]);
  return cd;
}

  const stopAthAud = () => {
    if (athAud) { try { athAud.pause(); athAud.src = ""; } catch(e){} }
    setAthAud(null); setAthPlayCat(null);
  };

  // Prayer reminder setup
  const setupReminders = (pt) => {
    if (!("Notification" in window)) return;
    Notification.requestPermission().then(perm => {
      if (perm === "granted") msg(L("تم تفعيل التنبيهات","Reminders enabled"));
      else msg(L("يرجى السماح بالتنبيهات","Please allow notifications"));
    });
  };

  // Rotate dua every 8s
  useEffect(() => {
    const id = setInterval(() => setDuaIdx(i => (i + 1) % ROTATING_DUAS.length), 8000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    document.documentElement.className = dark ? "dark" : "";
  }, [dark]);

  const msg = (t) => { setToast(t); setTimeout(() => setToast(null), 2200); };

  // Fast duration calc for home bar
  const getFastInfo = () => {
    if (!pt) return null;
    const fp = pt.Fajr.split(":").map(Number);
    const mp = pt.Maghrib.split(":").map(Number);
    const fastMins = (mp[0] * 60 + mp[1]) - (fp[0] * 60 + fp[1]);
    return Math.floor(fastMins / 60) + "h " + (fastMins % 60) + "m";
  };

  const openSurah = async (s) => {
    setSurah(s); setTab("reader"); setVerses([]); setTrans([]);
    setLoading(true); stopAudio(); setSelV(null);
    if (pageRef.current) pageRef.current.scrollTop = 0;
    try {
      const [a, e] = await Promise.all([
        fetch(API + "/surah/" + s.n).then(r => r.json()),
        fetch(API + "/surah/" + s.n + "/en.sahih").then(r => r.json()),
      ]);
      const ayahs = a.data ? a.data.ayahs : [];
      const engAyahs = e.data ? e.data.ayahs : [];
      // FIX: Remove bismillah from verse 1 text if surah is not Fatiha/Tawba
      // The API includes bismillah in ayah 1 for all surahs except 1 and 9
      // We show our styled bism block separately, so strip it from verse 1
      if (s.n !== 1 && s.n !== 9 && ayahs.length > 0) {
        const first = ayahs[0];
        const cleaned = first.text.replace(/^بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ\s*/, "").trim();
        ayahs[0] = Object.assign({}, first, {text: cleaned});
      }
      setVerses(ayahs);
      setTrans(engAyahs);
    } catch (err) { msg(L("فشل التحميل","Failed to load")); }
    setLoading(false);
  };

  const stopAudio = () => {
    if (aud.current) { aud.current.pause(); aud.current.src = ""; aud.current = null; }
    if (ntimer.current) clearTimeout(ntimer.current);
    setPlaying(false); setPlayV(null); setProg(0);
  };

  const playAyah = (num, globalNum, allV) => {
    stopAudio();
    const a = new Audio(SHEIKHS[shIdx].url + "/" + globalNum + ".mp3");
    aud.current = a;
    a.ontimeupdate = () => { if (a.duration) setProg(a.currentTime / a.duration * 100); };
    a.onended = () => {
      setProg(0); setPlaying(false);
      const arr = allV || verses;
      const idx = arr.findIndex(v => v.numberInSurah === num);
      if (idx < arr.length - 1) {
        const nv = arr[idx + 1];
        ntimer.current = setTimeout(() => playAyah(nv.numberInSurah, nv.number, arr), 300);
      } else setPlayV(null);
    };
    a.onerror = () => msg(L("الصوت غير متاح","Audio unavailable"));
    a.play().then(() => { setPlayV(num); setPlaying(true); }).catch(() => msg(L("الصوت غير متاح","Audio unavailable")));
    if (autoScroll) {
      setTimeout(() => {
        const el = ayRefs.current[num];
        if (el && pageRef.current) el.scrollIntoView({behavior:"smooth",block:"center"});
      }, 200);
    }
  };

  const togglePlay = () => {
    if (!aud.current) return;
    if (playing) { aud.current.pause(); setPlaying(false); }
    else { aud.current.play(); setPlaying(true); }
  };

  const toggleBM = (v, s) => {
    const id = s.n + ":" + v.numberInSurah;
    setBms(prev => {
      const has = prev.find(b => b.id === id);
      if (has) { msg(L("تمت الإزالة","Removed")); return prev.filter(b => b.id !== id); }
      msg(L("تم الحفظ 🔖","Bookmarked 🔖"));
      return [...prev, {id, sn:s.n, sen:s.en, sar:s.arShort, vn:v.numberInSurah}];
    });
  };

  const share = (v, s) => {
    const ti = trans[v.numberInSurah - 1] ? trans[v.numberInSurah - 1].text : "";
    const txt = v.text + "\n\n\"" + ti + "\"\n\n— " + s.arShort + " (" + s.n + ":" + v.numberInSurah + ")";
    if (navigator.share) navigator.share({title:"القرآن الكريم",text:txt}).catch(()=>{});
    else if (navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>msg(L("تم النسخ","Copied"))).catch(()=>{});
  };

  useEffect(() => {
    fetch("https://api.aladhan.com/v1/timingsByCity?city=Dubai&country=AE&method=8")
      .then(r => r.json())
      .then(d => {
        const t = d.data && d.data.timings ? d.data.timings : null;
        if (t) {
          setPt(t);
          const nm = new Date().getHours() * 60 + new Date().getMinutes();
          let f = null;
          for (let i = 0; i < PRAYERS_MAIN.length; i++) {
            const p = PRAYERS_MAIN[i];
            const pp = t[p].split(":").map(Number);
            if (pp[0] * 60 + pp[1] > nm) { f = p; break; }
          }
          setNextP(f || "Fajr");
        }
      })
      .catch(() => { setPt({Fajr:"05:22",Sunrise:"06:35",Dhuhr:"12:33",Asr:"15:53",Maghrib:"18:26",Isha:"19:39"}); setNextP("Asr"); });
  }, []);

  const getJuz = (sn) => { let j = 1; for (let i = 0; i < JUZ.length; i++) { if (JUZ[i].s <= sn) j = JUZ[i].j; else break; } return j; };
  const fil = SURAHS.filter(s => s.en.toLowerCase().includes(q.toLowerCase()) || s.arShort.includes(q) || String(s.n).includes(q));
  const nextS = surah && surah.n < 114 ? SURAHS[surah.n] : null;
  const hijri = new Date().toLocaleDateString("ar-SA-u-ca-islamic",{day:"numeric",month:"long",year:"numeric"});
  const wdAr = new Date().toLocaleDateString("ar-SA",{weekday:"long"});
  const wdEn = new Date().toLocaleDateString("en",{weekday:"long"});
  const todayEn = new Date().toLocaleDateString("en-CA");

  const incrZ = (cat, i) => {
    const k = cat + "-" + i;
    setZCounts(prev => {
      const c = (prev[k] || 0) + 1;
      const mx = ATHKAR[cat][i].rep;
      if (c >= mx) msg(L("✅ اكتمل","✅ Done!"));
      return {...prev, [k]: c >= mx ? 0 : c};
    });
  };

  const fastInfo = getFastInfo();
  const curDua = ROTATING_DUAS[duaIdx];

  const NAV = [
    {id:"home",      ico:"🏠",ar:"الرئيسية",en:"Home"},
    {id:"surahlist", ico:"📖",ar:"المصحف",  en:"Quran"},
    {id:"athkar",    ico:"🤲",ar:"الأذكار",  en:"Athkar"},
    {id:"ramadan",   ico:"🌙",ar:"رمضان",    en:"Ramadan"},
    {id:"prayer",    ico:"🕌",ar:"الصلاة",   en:"Prayer"},
  ];

  const pageTitle = () => {
    if (tab === "reader" && surah) return surah.arShort;
    if (tab === "prayer") return L("أوقات الصلاة","Prayer Times");
    if (tab === "bookmarks") return L("المحفوظات","Bookmarks");
    if (tab === "surahlist") return L("المصحف","Quran");
    if (tab === "athkar" && athCat) return (ATHKAR_CATS.find(x => x.id === athCat) || {ar:""}).ar;
    if (tab === "athkar") return L("الأذكار","Athkar");
    if (tab === "ramadan") return L("رمضان المبارك","Ramadan");
    return "القرآن الكريم";
  };

  const goBack = () => {
    if (tab === "reader") { stopAudio(); setTab("surahlist"); }
    else if (tab === "athkar" && athCat) setAthCat(null);
  };
  const showBack = tab === "reader" || (tab === "athkar" && athCat);

  return (
    <div className="app">
      {/* TOPBAR */}
      <div className="topbar">
        <div className="tb-g">
          <div className="tb-ico" onClick={() => setDrawer(true)}>⚙️</div>
          <div className="tb-ico" onClick={() => setTab("surahlist")}>🔍</div>
          <div className="tb-ico" onClick={() => setTab("bookmarks")}>🔖</div>
        </div>
        <div className="tb-title">{pageTitle()}</div>
        <div className="tb-g">
          {showBack && <div className="tb-ico" onClick={goBack}>←</div>}
          <div className="tb-ico" onClick={() => setDark(d => !d)}>{dark ? "☀️" : "🌙"}</div>
        </div>
      </div>

      {/* HOME */}
      {tab === "home" && (
        <div className="scroll su">
          {/* Prayer strip */}
          <div className="home-prayer">
            <div className="hp-city">{L("دبي، الإمارات","Dubai, UAE")}</div>
            <div className="hp-row">
              {pt && <div className={"hp-pill"+(nextP==="Fajr"?" act":"")}><div className="hpp-name">{L(PNAMES_AR.Fajr,PNAMES_EN.Fajr)}</div><div className="hpp-time" dir="ltr">{pt.Fajr}</div></div>}
              {pt && <div className={"hp-pill"+(nextP==="Dhuhr"?" act":"")}><div className="hpp-name">{L(PNAMES_AR.Dhuhr,PNAMES_EN.Dhuhr)}</div><div className="hpp-time" dir="ltr">{pt.Dhuhr}</div></div>}
              <div className="hp-center"><div className="hpc-day">{new Date().getDate()}</div><div className="hpc-month">{hijri.split(" ")[1]||"رمضان"}</div></div>
              {pt && <div className={"hp-pill"+(nextP==="Asr"?" act":"")}><div className="hpp-name">{L(PNAMES_AR.Asr,PNAMES_EN.Asr)}</div><div className="hpp-time" dir="ltr">{pt.Asr}</div></div>}
              {pt && <div className={"hp-pill"+(nextP==="Maghrib"?" act":"")}><div className="hpp-name">{L(PNAMES_AR.Maghrib,PNAMES_EN.Maghrib)}</div><div className="hpp-time" dir="ltr">{pt.Maghrib}</div></div>}
            </div>
          </div>
          {/* Countdown + Fast duration */}
          {pt && nextP && (
            <div className="home-info-bar">
              <div className="hib-next">
                <div>
                  <div className="hib-next-name">{L(PNAMES_AR[nextP],PNAMES_EN[nextP])}</div>
                  <div className="hib-label">{L("بعد","in")}</div>
                </div>
                <div className="hib-time" dir="ltr">{cd}</div>
              </div>
              {fastInfo && (
                <div className="hib-fast">
                  <div className="hib-fast-ico">🌙</div>
                  <div className="hib-fast-text">{L("مدة الصوم","Fast")} {fastInfo}</div>
                </div>
              )}
            </div>
          )}
          {/* Islamic background strip */}
          <div className="home-bg-strip">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Image-Kaaba.jpg/1280px-Image-Kaaba.jpg"
              alt=""
              style={{width:"100%",height:"100%",objectFit:"cover"}}
              onError={e=>{
                e.target.src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mosque_of_the_Prophet.jpg/1280px-Mosque_of_the_Prophet.jpg";
                e.target.onerror=()=>{e.target.style.display="none";};
              }}
            />
            <div className="home-bg-strip-overlay"/>
          </div>
          {/* Rotating Dua */}
          <div className="home-dua-bar" onClick={() => setTab("athkar")}>
            <div className="hdb-label">DUA</div>
            <div className="hdb-text">{curDua.ar}</div>
            <div className="hdb-arrow">←</div>
          </div>
          {/* Home grid */}
          <div className="home-grid">
            {/* المصحف - wide alone */}
            <div className="hg-row">
              <div className="hg-card hg-wide feat" onClick={()=>setTab("surahlist")}>
                <div className="hg-ico">📖</div>
                <div className="hg-title">{L("المصحف الشريف","The Holy Quran")}</div>
                <div className="hg-sub">{L("١١٤ سورة · ٦٢٣٦ آية","114 Surahs · 6236 Ayahs")}</div>
              </div>
            </div>
            {/* Fast card - from screenshot */}
            {pt && (
              <div className="hg-fast-card">
                <div className="hgf-title">{L("مدة الصوم: "+Math.floor(((pt.Maghrib.split(":").map(Number)[0]*60+pt.Maghrib.split(":").map(Number)[1])-(pt.Fajr.split(":").map(Number)[0]*60+pt.Fajr.split(":").map(Number)[1]))/60)+" ساعة و "+((pt.Maghrib.split(":").map(Number)[0]*60+pt.Maghrib.split(":").map(Number)[1])-(pt.Fajr.split(":").map(Number)[0]*60+pt.Fajr.split(":").map(Number)[1]))%60+" دقيقة","Fast: "+Math.floor(((pt.Maghrib.split(":").map(Number)[0]*60+pt.Maghrib.split(":").map(Number)[1])-(pt.Fajr.split(":").map(Number)[0]*60+pt.Fajr.split(":").map(Number)[1]))/60)+"h")}</div>
                <div className="hgf-bar-wrap"><div className="hgf-bar" style={{width:Math.max(0,Math.min(100,((new Date().getHours()*60+new Date().getMinutes()-(pt.Fajr.split(":").map(Number)[0]*60+pt.Fajr.split(":").map(Number)[1]))/((pt.Maghrib.split(":").map(Number)[0]*60+pt.Maghrib.split(":").map(Number)[1])-(pt.Fajr.split(":").map(Number)[0]*60+pt.Fajr.split(":").map(Number)[1])))*100))+"%"}}/></div>
                <div className="hgf-labels">
                  <span className="hgf-s">{L("الإمساك","Suhoor")} {pt.Fajr}</span>
                  <span className="hgf-status">{(new Date().getHours()*60+new Date().getMinutes())>=(pt.Fajr.split(":").map(Number)[0]*60+pt.Fajr.split(":").map(Number)[1])&&(new Date().getHours()*60+new Date().getMinutes())<(pt.Maghrib.split(":").map(Number)[0]*60+pt.Maghrib.split(":").map(Number)[1])?L("🌙 أنت صائم الآن","🌙 Fasting"):""}</span>
                  <span className="hgf-i">{L("الإفطار","Iftar")} {pt.Maghrib}</span>
                </div>
              </div>
            )}
            <div className="hg-row">
              <div className="hg-card" onClick={()=>{setAthCat("morning");setTab("athkar");}}><div className="hg-ico">🌅</div><div className="hg-title">{L("أذكار الصباح","Morning")}</div><div className="hg-sub">{ATHKAR.morning.length+" "+L("ذكر","adhkar")}</div></div>
              <div className="hg-card" onClick={()=>{setAthCat("evening");setTab("athkar");}}><div className="hg-ico">🌙</div><div className="hg-title">{L("أذكار المساء","Evening")}</div><div className="hg-sub">{ATHKAR.evening.length+" "+L("ذكر","adhkar")}</div></div>
              <div className="hg-card" onClick={()=>{setAthCat("prayer");setTab("athkar");}}><div className="hg-ico">🤲</div><div className="hg-title">{L("أذكار الصلاة","Prayer")}</div><div className="hg-sub">{ATHKAR.prayer.length+" "+L("ذكر","adhkar")}</div></div>
            </div>
            <div className="hg-row">
              <div className="hg-card" onClick={()=>setTab("ramadan")}><div className="hg-ico">🌙</div><div className="hg-title">{L("رمضان","Ramadan")}</div><div className="hg-sub">{L("١٤٤٧ هـ","1447 AH")}</div></div>
              <div className="hg-card" onClick={()=>{setAthCat("ramadan");setTab("athkar");}}><div className="hg-ico">🤲</div><div className="hg-title">{L("أدعية رمضان","Ramadan Duas")}</div><div className="hg-sub">{ATHKAR.ramadan.length+" "+L("دعاء","duas")}</div></div>
              <div className="hg-card" onClick={()=>setTab("prayer")}><div className="hg-ico">🕌</div><div className="hg-title">{L("الصلاة","Prayer")}</div><div className="hg-sub">{L("مواقيت","Times")}</div></div>
            </div>
          </div>
        </div>
      )}

      {/* SURAH LIST */}
      {tab === "surahlist" && (
        <React.Fragment>
          <div className="list-topbar">
            <div className="ltabs">
              <div className={"ltab"+(stab==="surahs"?" on":"")} onClick={()=>setStab("surahs")}>{L("السور","Surahs")}</div>
              <div className={"ltab"+(stab==="juz"?" on":"")} onClick={()=>setStab("juz")}>{L("الأجزاء","Juz")}</div>
            </div>
            <div className="lsearch">
              <span style={{fontSize:12,color:"var(--ink4)"}}>🔍</span>
              <input placeholder={L("بحث...","Search...")} value={q} onChange={e=>setQ(e.target.value)} />
            </div>
          </div>
          <div className="scroll su">
            {stab === "surahs" && (
              <div className="sgrid">
                {fil.map(s => (
                  <div key={s.n} className="sgcard" onClick={()=>openSurah(s)}>
                    <div className="sgcard-num">{s.n}</div>
                    <div className="sgcard-ar">{s.ar}</div>
                    <div className="sgcard-meta">{L(s.tar,s.ten)} · {s.v} {L("آية","v")}</div>
                    <div className="sgcard-page">{L("ص","P.")} {s.pg}</div>
                  </div>
                ))}
              </div>
            )}
            {stab === "juz" && (
              <div className="juz-list">
                {JUZ.map(j => {
                  const s = SURAHS[j.s - 1];
                  return (
                    <div key={j.j} className="juz-card" onClick={()=>openSurah(s)}>
                      <div className="juz-ball">{j.j}</div>
                      <div className="juz-info">
                        <div className="juz-title">{L("الجزء "+j.j,"Juz "+j.j)}</div>
                        <div className="juz-sub">{L(s.arShort,s.en)}</div>
                      </div>
                      <span style={{fontSize:16,color:"var(--ink4)"}}>←</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </React.Fragment>
      )}

      {/* READER */}
      {tab === "reader" && surah && (
        <div className="reader-wrap su">
          <div className="rnav">
            <div className="rchip grn">{surah.arShort}</div>
            <div style={{width:1,height:12,background:"var(--bdr)",flexShrink:0}}/>
            <div className="rchip gld">{L("ج"+getJuz(surah.n),"Juz "+getJuz(surah.n))}</div>
            <div style={{width:1,height:12,background:"var(--bdr)",flexShrink:0}}/>
            <div className="rchip" onClick={()=>setShowT(s=>!s)}>{showT?L("إخفاء","Hide"):L("ترجمة","Translation")}</div>
            <div style={{marginRight:"auto",fontSize:10,color:"var(--ink4)",flexShrink:0,fontWeight:700,fontFamily:"var(--en)"}}>{surah.v} {L("آية","v")}</div>
          </div>
          <div className="sheikh-strip">
            <span style={{fontSize:10,color:"var(--ink4)",flexShrink:0,fontWeight:700,fontFamily:"var(--ui)"}}>{L("القارئ:","Sheikh:")}</span>
            {SHEIKHS.map((sh,i)=>(
              <div key={sh.id} className={"sh-btn"+(shIdx===i?" on":"")}
                onClick={()=>{setShIdx(i);if(playV!==null){stopAudio();msg(L("تم التغيير","Switched"));}}}>
                {isAr?sh.ar:sh.en}
              </div>
            ))}
          </div>
          <div className="rtool">
            <div className={"rtbtn"+(autoScroll?" on":"")} title="Auto-scroll" onClick={()=>setAutoScroll(s=>!s)}>📜</div>
            <div className="rtbtn" title="Bookmark" onClick={()=>{if(selV){const v=verses.find(x=>x.numberInSurah===selV);if(v)toggleBM(v,surah);}else msg(L("اضغط على آية","Tap an ayah"));}}>🔖</div>
            <div className="rtbtn" title="Share" onClick={()=>{if(selV){const v=verses.find(x=>x.numberInSurah===selV);if(v)share(v,surah);}else msg(L("اضغط على آية","Tap an ayah"));}}>📤</div>
            <div className="rtbtn" title="Play all" onClick={()=>{if(verses[0])playAyah(verses[0].numberInSurah,verses[0].number,verses);}}>▶</div>
            <div className="fcg">
              <div className="fcbtn" onClick={()=>setFs(f=>Math.max(18,f-2))}>A−</div>
              <div className="fcval">{fs}</div>
              <div className="fcbtn" onClick={()=>setFs(f=>Math.min(42,f+2))}>A+</div>
            </div>
          </div>
          <div className="mpage" ref={pageRef}>
            <div className="mhdr">
              <div className="mhdr-glow"/>
              <div className="mhdr-ar">{surah.ar}</div>
              <div className="mhdr-en">{surah.en}</div>
              <div className="mhdr-pills">
                <span className="mpill">{surah.v} {L("آية","Ayahs")}</span>
                <span className="mpill">{L(surah.tar,surah.ten)}</span>
                <span className="mpill gld">{L("الجزء "+getJuz(surah.n),"Juz "+getJuz(surah.n))}</span>
                <span className="mpill">{L("ص","P.")}{surah.pg}</span>
              </div>
            </div>
            {/* Show bismillah block only for surahs that need it — NOT for Fatiha (it's in v1) or Tawba */}
            {surah.n !== 1 && surah.n !== 9 && (
              <div className="bism-blk"><div className="bism-ar">{BISM}</div></div>
            )}
            {loading ? (
              <div className="loading"><div className="spin">🌙</div>{L("جاري التحميل...","Loading...")}</div>
            ) : (
              <React.Fragment>
                <div className="ayah-body" style={{fontSize:fs+"px"}}>
                  {verses.map(v => (
                    <span key={v.number}
                      ref={el=>{if(el)ayRefs.current[v.numberInSurah]=el;}}
                      className={"aspan"+(playV===v.numberInSurah?" play":"")+(selV===v.numberInSurah?" sel":"")}
                      onClick={()=>setSelV(p=>p===v.numberInSurah?null:v.numberInSurah)}>
                      {v.text}{" "}
                      <span className={"anum"+(playV===v.numberInSurah?" playing":"")}
                        onClick={e=>{e.stopPropagation();playAyah(v.numberInSurah,v.number,verses);}}>
                        {v.numberInSurah}
                      </span>{" "}
                    </span>
                  ))}
                </div>
                {nextS && verses.length > 0 && (
                  <div className="next-banner" onClick={()=>openSurah(nextS)}>
                    <span style={{fontSize:18,color:"var(--ink4)"}}>→</span>
                    <div className="nb-info">
                      <div className="nb-lbl">{L("السورة التالية","Next Surah")}</div>
                      <div className="nb-ar">{nextS.ar}</div>
                      <div className="nb-en">{nextS.en} · {nextS.v} {L("آية","v")}</div>
                    </div>
                    <span style={{fontSize:22}}>📖</span>
                  </div>
                )}
              </React.Fragment>
            )}
          </div>
          <div className={"trans-panel"+(showT?" open":"")}>
            <div className="trans-inner">
              <div className="trans-hd">
                <div className="trans-lbl">✦ Sahih International</div>
                <div className="trans-x" onClick={()=>setShowT(false)}>✕</div>
              </div>
              {trans.map((t,i)=>(
                <div key={t.number} className="tv">
                  <div className="tv-n">Ayah {t.numberInSurah}</div>
                  <div className="tv-ar">{verses[i]&&verses[i].text}</div>
                  <div className="tv-en">{t.text}</div>
                </div>
              ))}
            </div>
          </div>
          {playV !== null && (
            <div className="abar">
              <div className="aplay" onClick={togglePlay}>{playing?"⏸":"▶"}</div>
              <div className="ainfo">
                <div className="atitle">{L("الآية "+playV+" · "+SHEIKHS[shIdx].ar,"Ayah "+playV+" · "+SHEIKHS[shIdx].en)}</div>
                <div className="asub">{surah.en} · Auto {autoScroll?"ON":"OFF"}</div>
                <div className="aprog"><div className="afill" style={{width:prog+"%"}}/></div>
              </div>
              <div className="astop" onClick={stopAudio}>⏹</div>
            </div>
          )}
        </div>
      )}

      {/* ATHKAR HOME */}
      {tab === "athkar" && !athCat && (
        <div className="scroll su">
          <div className="ath-home">
            <div className="ath-sec">{L("اختر قسماً","Choose a section")}</div>
            <div className="ath-grid">
              {ATHKAR_CATS.map(c=>(
                <div key={c.id} className={"ath-card ath-"+c.col} onClick={()=>setAthCat(c.id)}>
                  <div className="ath-card-ico">{c.ico}</div>
                  <div className="ath-card-title">{isAr?c.ar:c.en}</div>
                  <div className="ath-card-count">{(ATHKAR[c.id]||[]).length} {L("ذكر","adhkar")}</div>
                  <div className="ath-bar"/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ATHKAR READER */}
      {tab === "athkar" && athCat && (
        <React.Fragment>
          <div className="ath-audio-bar">
            <div className="aab-lbl">🔊</div>
            <div className="aab-sh">
              {ATH_AUDIO_SHEIKHS.map((sh,i)=>(
                <div key={sh.id} className={"aab-btn"+(athShIdx===i?" on":"")} onClick={()=>{stopAthAud();setAthShIdx(i);}}>{isAr?sh.ar:sh.en}</div>
              ))}
            </div>
            {athPlayCat === athCat
              ? <div className="aab-stop" onClick={stopAthAud}>⏹</div>
              : <div className="aab-play" onClick={()=>{
                  stopAthAud();
                  const items = ATHKAR[athCat]||[];
                  if(!items.length) return;
                  // Play a Quran ayah as background recitation (ayah 1 of Al-Fatiha area)
                  const a = new Audio(ATH_AUDIO_SHEIKHS[athShIdx].url+"/1.mp3");
                  a.volume=0.4;
                  a.play().catch(()=>{});
                  setAthAud(a); setAthPlayCat(athCat);
                  msg(L("جاري التشغيل","Playing..."));
                }}>▶</div>
            }
          </div>
          <AthkarReader cat={athCat} items={ATHKAR[athCat]||[]} fs={fs} isAr={isAr} counts={zCounts} onIncr={incrZ}/>
        </React.Fragment>
      )}

      {/* RAMADAN */}
      {tab === "ramadan" && (
        <RamadanPage pt={pt} isAr={isAr} tDone={tDone} setTDone={setTDone} kDone={kDone} setKDone={setKDone}/>
      )}

      {/* PRAYER */}
      {tab === "prayer" && (
        <div className="prayer-wrap su">
          <div className="pcity">{L("دبي، الإمارات","Dubai, UAE")}</div>
          <div className="pdate-row">
            <div className="pdate-card">
              <div style={{fontSize:10,fontWeight:700,color:"var(--ink4)",marginBottom:3,fontFamily:"var(--ui)"}}>{L("التقويم الهجري","Hijri")}</div>
              <div className="pdate-ar" dir="rtl">{wdAr}</div>
              <div style={{fontFamily:"var(--ar)",fontSize:15,fontWeight:700,color:"var(--gold)",direction:"rtl",marginTop:3}}>{hijri}</div>
            </div>
            <div className="pdate-card">
              <div style={{fontSize:10,fontWeight:700,color:"var(--ink4)",marginBottom:3,fontFamily:"var(--ui)"}}>{L("التقويم الميلادي","Gregorian")}</div>
              <div className="pdate-ar" dir="rtl">{new Date().toLocaleDateString("ar-SA",{weekday:"long"})}</div>
              <div style={{fontFamily:"var(--ar)",fontSize:15,fontWeight:700,color:"var(--blue)",direction:"rtl",marginTop:3}}>{new Date().toLocaleDateString("ar-SA",{year:"numeric",month:"long",day:"numeric"})}</div>
            </div>
          </div>
          {nextP && pt && (
            <div className="pnext">
              <div className="pnext-lbl">{L(PNAMES_AR[nextP]+" بعد",PNAMES_EN[nextP]+" in")}</div>
              <div className="pnext-cd" dir="ltr">{cd}</div>
            </div>
          )}
          <div className="pgrid">
            {pt && PRAYERS_MAIN.map(p=>(
              <div key={p} className={"pcard"+(nextP===p?" now":"")}>
                <div className="pcard-name">{PICO[p]} {L(PNAMES_AR[p],PNAMES_EN[p])}</div>
                <div className="pcard-time" dir="ltr">{pt[p]?pt[p].split(":").slice(0,2).join(":"):"--:--"}</div>
                <div className="pcard-ampm">{L(parseInt(pt[p])>=12?"م":"ص",parseInt(pt[p])>=12?"PM":"AM")}</div>
              </div>
            ))}
          </div>
          {/* Prayer Reminders */}
          <div className="prem-sec">
            <div className="prem-title">{L("تنبيهات الصلاة","Prayer Reminders")}</div>
            <div style={{marginBottom:8}}>
              <button
                style={{width:"100%",padding:"10px",background:"var(--green)",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"var(--ui)"}}
                onClick={()=>setupReminders(pt)}>
                {L("🔔 تفعيل تنبيهات الصلاة","🔔 Enable Prayer Notifications")}
              </button>
            </div>
            {pt && PRAYERS_MAIN.map(p=>(
              <div key={p} className="prem-card">
                <div className="prem-row">
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:18}}>{PICO[p]}</span>
                    <div className="prem-name">{L(PNAMES_AR[p],PNAMES_EN[p])}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div className="prem-time" dir="ltr">{pt[p]}</div>
                    <Tog on={reminders[p]||false} fn={()=>setReminders(prev=>({...prev,[p]:!prev[p]}))}/>
                  </div>
                </div>
              </div>
            ))}
            <div style={{fontSize:11,color:"var(--ink4)",textAlign:"right",direction:"rtl",padding:"4px 2px",fontFamily:"var(--ui)"}}>{L("* يتطلب السماح بالإشعارات في المتصفح","* Requires browser notification permission")}</div>
          </div>
        </div>
      )}

      {/* BOOKMARKS */}
      {tab === "bookmarks" && (
        <div className="bm-wrap su">
          <div className="bmhero"><div className="bmhero-t">{L("المحفوظات","Bookmarks")}</div><div className="bmhero-s">{bms.length} {L("آيات محفوظة","saved ayahs")}</div></div>
          {bms.length===0?(
            <div className="empty"><div className="empty-ico">🔖</div><div className="empty-txt">{L("لا توجد محفوظات\nافتح سورة → اضغط آية → 🔖","No bookmarks yet\nOpen surah → tap ayah → 🔖")}</div></div>
          ):bms.map(b=>(
            <div key={b.id} className="bmrow" onClick={()=>openSurah(SURAHS[b.sn-1])}>
              <div className="bmico">🔖</div>
              <div className="bmi"><div className="bmtitle">{b.sar} · {L("آية","Ayah")} {b.vn}</div><div className="bmsub">{b.sen} · {L("سورة","Surah")} {b.sn}</div></div>
            </div>
          ))}
        </div>
      )}

      {/* BOTTOM NAV */}
      <div className="bnav">
        {NAV.map(n=>(
          <div key={n.id}
            className={"bni"+((tab===n.id||(tab==="reader"&&n.id==="surahlist"))?" on":"")}
            onClick={()=>{stopAudio();if(n.id!=="athkar")setAthCat(null);setTab(n.id);}}>
            <span className="bni-pip"/>
            <span className="bni-ico">{n.ico}</span>
            <span className="bni-lbl">{L(n.ar,n.en)}</span>
          </div>
        ))}
      </div>

      {/* DRAWER */}
      {drawer && <div className="overlay" onClick={()=>setDrawer(false)}/>}
      <div className={"drawer"+(drawer?" open":"")}>
        <div className="dhead">
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:12,background:"var(--goldbg)",border:"1.5px solid var(--bdr2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🕌</div>
            <div><div className="dh-ar">القرآن الكريم</div><div className="dh-en">The Holy Quran</div></div>
          </div>
          <div className="dcls" onClick={()=>setDrawer(false)}>✕</div>
        </div>
        <div className="dbody">
          <div className="dsec">
            <div className="dsec-t">Settings · الإعدادات</div>
            {[
              {ar:"🌙 الوضع الليلي",en:"🌙 Night Mode",on:dark,fn:()=>setDark(d=>!d)},
              {ar:"🌐 إنجليزي",en:"🌐 Switch to Arabic",on:!isAr,fn:()=>setIsAr(a=>!a)},
              {ar:"📜 تمرير تلقائي",en:"📜 Auto-Scroll",on:autoScroll,fn:()=>setAutoScroll(s=>!s)},
              {ar:"📖 عرض الترجمة",en:"📖 Show Translation",on:showT,fn:()=>setShowT(s=>!s)},
            ].map(r=>(
              <div key={r.ar} className="trow">
                <span className="trow-lbl">{L(r.ar,r.en)}</span>
                <Tog on={r.on} fn={r.fn}/>
              </div>
            ))}
            <div className="trow">
              <span className="trow-lbl">{L("🔤 حجم الخط","🔤 Font Size")}</span>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <div className="fcbtn" onClick={()=>setFs(f=>Math.max(18,f-2))}>−</div>
                <span style={{fontSize:12,color:"var(--ink2)",minWidth:20,textAlign:"center",fontWeight:700,fontFamily:"var(--en)"}}>{fs}</span>
                <div className="fcbtn" onClick={()=>setFs(f=>Math.min(42,f+2))}>+</div>
              </div>
            </div>
          </div>
          <div className="dsec">
            <div className="dsec-t">Sheikh · القارئ</div>
            <div className="sh-grid">
              {SHEIKHS.map((sh,i)=>(
                <div key={sh.id} className={"sh-radio"+(shIdx===i?" on":"")}
                  onClick={()=>{setShIdx(i);if(playV!==null){stopAudio();msg(L("تم التغيير","Switched"));}setDrawer(false);}}>
                  <div className="sh-radio-name">{isAr?sh.ar:sh.en}</div>
                  <div className="sh-radio-en">{sh.en}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
