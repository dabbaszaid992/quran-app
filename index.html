<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>القرآن الكريم</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cairo:wght@400;600;700;900&family=Amiri+Quran&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  /* Spec palette: #1E3A5F blue, #C89B3C gold, #F7F3EA bg */
  --bg:#F7F3EA;--bg2:#EDE8DC;--bg3:#E0D8C8;
  --card:#FFFFFF;--card2:#FDFAF4;
  --gold:#C89B3C;--gold2:#A07828;--goldbg:#FDF5E0;--goldlt:#FEF9EE;
  --blue:#1E3A5F;--blue2:#2A4E7F;--bluebg:#EEF3FA;--bluelt:#F5F8FD;
  --green:#1A7048;--green2:#228855;--greenbg:#EDF7F1;
  --orange:#C06020;--orangebg:#FEF3E8;
  --red:#C03030;--redbg:#FEF0F0;
  --ink:#1A1208;--ink2:#2E2010;--ink3:#5C4830;--ink4:#9A8060;--ink5:#C8B090;
  --bdr:#DDD5C0;--bdr2:rgba(200,155,60,0.25);--shd:rgba(30,58,95,0.07);--shd2:rgba(30,58,95,0.14);
  --ar:'Scheherazade New',serif;--qr:'Amiri Quran','Scheherazade New',serif;--ui:'Cairo',sans-serif;--en:'Lato',sans-serif;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
.dark{
  --bg:#0D0C08;--bg2:#141008;--bg3:#1C1610;--card:#181410;--card2:#201C12;
  --gold:#D4A840;--gold2:#E0BC58;--goldbg:#181200;--goldlt:#100E00;
  --blue:#4A7AC8;--blue2:#6090E0;--bluebg:#080E18;--bluelt:#060810;
  --green:#28A060;--greenbg:#081810;
  --orange:#D07030;--orangebg:#1A0E04;
  --red:#D04040;--redbg:#1A0808;
  --ink:#EDE8DC;--ink2:#D4C898;--ink3:#907858;--ink4:#604830;--ink5:#3A2818;
  --bdr:#2A2018;--bdr2:rgba(212,168,64,0.2);--shd:rgba(0,0,0,0.4);--shd2:rgba(0,0,0,0.6);
}
html,body{height:100%;overflow:hidden;background:var(--bg);direction:rtl}
body{font-family:var(--ui);color:var(--ink);direction:rtl}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.scroll::-webkit-scrollbar{width:0}
.su{animation:su 0.22s ease}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ══ TOPBAR ══ */
.topbar{flex-shrink:0;z-index:60;background:var(--card);border-bottom:1px solid var(--bdr);padding:0 14px;height:54px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.tb-g{display:flex;gap:6px;align-items:center}
.tb-ico{width:40px;height:40px;border-radius:var(--r12);display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--bdr);cursor:pointer;font-size:16px;transition:all 0.15s;flex-shrink:0}
.tb-ico:active{transform:scale(0.88);background:var(--bg3)}
.tb-center{flex:1;display:flex;flex-direction:column;align-items:center}
.tb-title{font-family:var(--ui);font-size:17px;font-weight:700;color:var(--ink);text-align:center}
.tb-sub{font-size:11px;color:var(--gold);text-align:center;font-family:var(--ar);opacity:0.85;margin-top:1px}

/* ══ HOME ══ */
/* Hero */
.nph{margin:12px 14px 0;border-radius:var(--r20);overflow:hidden;background:linear-gradient(145deg,var(--blue) 0%,var(--blue2) 60%,#1a3058 100%);padding:18px 20px 16px;position:relative;direction:rtl;box-shadow:0 6px 24px var(--shd2)}
.nph-glow{position:absolute;top:-40px;right:-20px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(200,155,60,0.18),transparent 70%);pointer-events:none}
.nph-stars{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(255,255,255,0.04),transparent 60%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(200,155,60,0.06),transparent 60%);pointer-events:none}
.nph-loc{font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);margin-bottom:12px;display:flex;align-items:center;gap:5px;font-family:var(--ui)}
.nph-loc-dot{width:5px;height:5px;border-radius:50%;background:#5cc87a;flex-shrink:0}
.nph-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px}
.nph-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;font-family:var(--en);margin-bottom:5px}
.nph-name{font-family:var(--ui);font-size:28px;font-weight:900;color:#fff;line-height:1}
.nph-ico{width:48px;height:48px;border-radius:var(--r12);background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.nph-cd{font-family:var(--en);font-size:50px;font-weight:900;color:#fff;direction:ltr;letter-spacing:1px;line-height:1;margin:10px 0 10px;text-shadow:0 2px 12px rgba(0,0,0,0.25)}
.nph-prog{height:3px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden;margin-bottom:12px}
.nph-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,rgba(200,155,60,0.6),rgba(255,255,255,0.85))}
.nph-hijri{font-family:var(--ar);font-size:12px;color:rgba(255,255,255,0.45)}
.nph-skeleton .nph-name{opacity:0.35;font-size:18px}
.nph-skeleton .nph-cd{opacity:0.3;font-size:36px}

/* Prayer strip */
.ps{margin:10px 14px 0;display:flex;gap:6px}
.ps-c{flex:1;background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r12);padding:9px 4px;text-align:center;transition:all 0.15s;position:relative;cursor:pointer}
.ps-c:active{transform:scale(0.95)}
.ps-c.nxt{background:var(--bluebg);border-color:var(--blue);box-shadow:0 2px 10px rgba(30,58,95,0.12)}
.dark .ps-c.nxt{background:var(--bluebg);border-color:var(--blue2)}
.ps-dot{position:absolute;top:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--blue)}
.ps-name{font-size:9px;font-weight:700;color:var(--ink3);margin-bottom:3px;font-family:var(--ui)}
.ps-c.nxt .ps-name{color:var(--blue)}
.ps-time{font-size:13px;font-weight:900;color:var(--ink);font-family:var(--en);direction:ltr}
.ps-c.nxt .ps-time{color:var(--blue)}

/* Ramadan home card */
.rhc{margin:10px 14px 0;background:var(--card);border:1.5px solid var(--bdr2);border-radius:var(--r16);padding:14px 16px;box-shadow:0 2px 10px var(--shd);direction:rtl;overflow:hidden;position:relative}
.rhc::after{content:'🌙';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:42px;opacity:0.07}
.rhc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.rhc-ttl{font-size:13px;font-weight:700;color:var(--ink2);display:flex;align-items:center;gap:7px;font-family:var(--ui)}
.rhc-badge{background:var(--blue);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:var(--ui)}
.rhc-rem{font-family:var(--ui);font-size:16px;font-weight:900;color:var(--orange);margin-bottom:9px;direction:rtl}
.rhc-bar{height:8px;background:var(--bg2);border-radius:8px;overflow:hidden;margin-bottom:7px}
.rhc-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#1E3A5F,#C89B3C)}
.rhc-labels{display:flex;justify-content:space-between;font-size:10.5px;font-weight:600;font-family:var(--ui)}
.rhc-s{color:var(--blue)}.rhc-i{color:var(--orange)}

/* Last read / Quran card */
.qhc{margin:10px 14px 0;background:var(--goldlt);border:1.5px solid var(--bdr2);border-radius:var(--r16);padding:14px 16px;box-shadow:0 2px 10px var(--shd);direction:rtl;position:relative;overflow:hidden}
.qhc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--gold),var(--gold2))}
.qhc-lbl{font-size:10px;font-weight:700;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;font-family:var(--en);margin-bottom:6px}
.qhc-surah{font-family:var(--ar);font-size:24px;font-weight:700;color:var(--ink);margin-bottom:2px}
.qhc-meta{font-size:11px;color:var(--ink3);margin-bottom:12px;font-family:var(--ui)}
.qhc-btns{display:flex;gap:8px}
.qhc-main{flex:1;background:var(--blue);color:#fff;border:none;border-radius:var(--r12);padding:11px;font-size:13px;font-weight:700;font-family:var(--ui);cursor:pointer;text-align:center;transition:opacity 0.15s}
.qhc-main:active{opacity:0.85}
.qhc-sec{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:var(--r12);padding:11px 14px;font-size:13px;font-weight:700;font-family:var(--ui);color:var(--ink2);cursor:pointer;white-space:nowrap;transition:background 0.15s}
.qhc-sec:active{background:var(--bg3)}

/* Dua ticker */
.dua-tick{margin:10px 14px 0;background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r14,14px);padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 1px 6px var(--shd)}
.dt-ico{width:36px;height:36px;border-radius:var(--r10,10px);background:var(--goldbg);border:1px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.dt-body{flex:1;min-width:0}
.dt-lbl{font-size:9px;font-weight:700;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;font-family:var(--en);margin-bottom:2px}
.dt-txt{font-family:var(--ar);font-size:14px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl}
.dt-arr{font-size:12px;color:var(--ink4);flex-shrink:0}

/* Section header */
.sec-h{padding:14px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.sec-ht{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;font-family:var(--en)}
.sec-ht::before{content:'';width:3px;height:13px;background:linear-gradient(180deg,var(--gold),var(--gold2));border-radius:2px;flex-shrink:0}
.sec-ha{font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;font-family:var(--ui)}

/* Quick actions grid */
.qa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px}
.qa-c{background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r14,14px);padding:13px 8px 11px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all 0.15s;box-shadow:0 1px 6px var(--shd);min-height:78px}
.qa-c:active{transform:scale(0.93);border-color:var(--gold)}
.qa-ico{font-size:22px}
.qa-ttl{font-family:var(--ar);font-size:12.5px;font-weight:700;color:var(--ink2);line-height:1.2;text-align:center}
.qa-sub{font-size:9.5px;color:var(--ink4);font-family:var(--ui)}

/* ══ SURAH LIST ══ */
.list-tb{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);padding:8px 14px;display:flex;align-items:center;gap:8px}
.ltabs{display:flex;gap:4px;flex:1}
.ltab{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all 0.14s;white-space:nowrap;font-family:var(--ui)}
.ltab.on{background:var(--blue);color:#fff}
.lsrch{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1.5px solid var(--bdr);border-radius:20px;padding:6px 12px;flex:1;max-width:130px}
.lsrch input{flex:1;border:none;background:transparent;font-size:13px;color:var(--ink);outline:none;direction:rtl;min-width:0;font-family:var(--ui)}
.lsrch input::placeholder{color:var(--ink4)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 10px 90px}
.sgc{background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r16);padding:14px 14px 10px;cursor:pointer;transition:all 0.16s;box-shadow:0 1px 6px var(--shd);position:relative;overflow:hidden;direction:rtl}
.sgc:active{transform:scale(0.96);border-color:var(--gold)}
.sgc-n{position:absolute;left:8px;bottom:6px;font-size:28px;font-weight:900;color:rgba(30,58,95,0.05);font-family:var(--en);line-height:1}
.dark .sgc-n{color:rgba(74,122,200,0.08)}
.sgc-ar{font-family:var(--ar);font-size:22px;font-weight:700;color:var(--ink);direction:rtl;line-height:1.4}
.sgc-type{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;margin:5px 0 3px;font-family:var(--ui)}
.sgc-type.mk{background:var(--orangebg);color:var(--orange)}
.sgc-type.md{background:var(--greenbg);color:var(--green)}
.sgc-meta{font-size:10.5px;color:var(--ink3);font-weight:600;font-family:var(--ui)}
.sgc-page{font-size:10px;color:var(--ink5);margin-top:2px;font-family:var(--ui)}
.juz-list{padding:8px 10px 90px}
.juz-c{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r14,14px);padding:13px 14px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;gap:12px;box-shadow:0 1px 5px var(--shd);direction:rtl}
.juz-c:active{border-color:var(--gold);transform:scale(0.98)}
.juz-ball{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0;font-family:var(--en)}
.juz-info{flex:1;text-align:right}
.juz-ttl{font-size:15px;font-weight:700;color:var(--ink);font-family:var(--ui)}
.juz-sub{font-family:var(--ar);font-size:14px;color:var(--ink3);margin-top:2px}

/* ══ READER ══ */
.rd-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
/* Reader top nav strip */
.rd-nav{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:6px 10px;gap:5px;overflow-x:auto}.rd-nav::-webkit-scrollbar{height:0}
.rchip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;background:var(--bg2);border:1.5px solid var(--bdr);color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all 0.14s;font-family:var(--ui)}
.rchip.bl{background:var(--blue);color:#fff;border-color:transparent}
.rchip.gd{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border-color:transparent}
/* Sheikh strip */
.sh-strip{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bdr);padding:5px 10px;display:flex;align-items:center;gap:5px;overflow-x:auto}.sh-strip::-webkit-scrollbar{height:0}
.sh-lbl{font-size:10px;color:var(--ink4);font-weight:700;font-family:var(--ui);flex-shrink:0}
.sh-btn{flex-shrink:0;padding:4px 11px;border-radius:16px;font-size:11px;font-weight:700;background:var(--card);border:1.5px solid var(--bdr);color:var(--ink3);cursor:pointer;transition:all 0.14s;font-family:var(--ui)}
.sh-btn.on{background:var(--gold);color:#fff;border-color:transparent}
/* Toolbar */
.rd-tool{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:5px 10px;gap:5px}
.rtbtn{min-width:40px;height:40px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1.5px solid var(--bdr);cursor:pointer;font-size:14px;transition:all 0.14s;flex-shrink:0;font-family:var(--ui);font-size:11px;font-weight:700;color:var(--ink2);padding:0 8px;gap:3px}
.rtbtn.on{background:var(--blue);color:#fff;border-color:transparent}
.rtbtn:active{transform:scale(0.88)}
.rtbtn-sep{width:1px;height:24px;background:var(--bdr);flex-shrink:0}
.fcg{display:flex;align-items:center;gap:4px;margin-right:auto}
.fcbtn{width:32px;height:32px;border-radius:var(--r8);border:1.5px solid var(--bdr);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--ink2);font-family:var(--en);transition:all 0.14s}
.fcbtn:active{background:var(--blue);color:#fff;border-color:transparent}
.fcval{font-size:12px;color:var(--ink3);min-width:22px;text-align:center;font-weight:700;font-family:var(--en)}
/* Mushaf page */
.mpage{flex:1;overflow-y:auto;background:var(--bg)}.mpage::-webkit-scrollbar{width:2px}.mpage::-webkit-scrollbar-thumb{background:var(--bdr)}
.mhdr{background:var(--card);border-bottom:2px solid var(--bdr2);padding:20px 16px 18px;text-align:center;position:relative;overflow:hidden}
.mhdr-glow{position:absolute;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(200,155,60,0.08),transparent 70%);pointer-events:none}
.mhdr-ar{font-family:var(--ar);font-size:46px;font-weight:700;color:var(--ink);direction:rtl;line-height:1.3;position:relative;z-index:1}
.mhdr-en{font-size:10px;color:var(--ink4);letter-spacing:3px;text-transform:uppercase;margin-top:2px;font-family:var(--en);position:relative;z-index:1}
.mhdr-pills{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:10px;flex-wrap:wrap;position:relative;z-index:1}
.mpill{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--ink3);font-weight:600;font-family:var(--ui)}
.mpill.gd{background:var(--goldbg);border-color:var(--bdr2);color:var(--gold2);font-weight:700}
.mpill.mk{background:var(--orangebg);border-color:rgba(192,96,32,0.2);color:var(--orange)}
.mpill.md{background:var(--greenbg);border-color:rgba(26,112,72,0.2);color:var(--green)}
/* Bismillah - authentic style */
.bism-blk{margin:16px 12px 4px;padding:14px 16px;background:var(--goldlt);border:1px solid var(--bdr2);border-radius:var(--r16);text-align:center;position:relative}
.bism-blk::before,.bism-blk::after{content:'';position:absolute;left:16%;right:16%;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent)}
.bism-blk::before{top:0}.bism-blk::after{bottom:0}
.bism-ar{font-family:var(--qr);font-size:26px;font-weight:700;color:var(--ink2);direction:rtl;line-height:2}
/* Ayah reading area - Mushaf style */
.ayah-body{padding:10px 16px 20px;direction:rtl;font-family:var(--qr);color:var(--ink);line-height:3;text-align:justify;word-spacing:1px}
.aspan{display:inline;cursor:pointer;border-radius:3px;padding:2px 1px;transition:background 0.12s}
.aspan.sel{background:rgba(200,155,60,0.18)}
.aspan.play{background:rgba(26,112,72,0.12)}
/* Ayah number - end marker ۝ style */
.anum{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;margin:0 2px;vertical-align:middle;cursor:pointer;font-size:10px;font-weight:700;color:#fff;font-family:var(--en);background:linear-gradient(135deg,var(--gold),var(--gold2));transition:transform 0.12s;box-shadow:0 1px 4px rgba(200,155,60,0.3)}
.anum:active{transform:scale(0.82)}
.anum.playing{background:linear-gradient(135deg,var(--green),var(--green2));box-shadow:0 0 0 3px rgba(26,112,72,0.2);animation:beat 1.2s ease-in-out infinite}
@keyframes beat{0%,100%{box-shadow:0 0 0 3px rgba(26,112,72,0.12)}50%{box-shadow:0 0 0 6px rgba(26,112,72,0.25)}}
/* Next surah banner */
.nb{margin:6px 12px 16px;padding:13px 14px;background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r16);display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.15s;box-shadow:0 1px 8px var(--shd)}
.nb:active{border-color:var(--gold)}
.nb-info{flex:1;text-align:right}

/* ══ SETTINGS (full page) ══ */
.settings-wrap{flex:1;overflow-y:auto;padding-bottom:90px}.settings-wrap::-webkit-scrollbar{width:0}

/* ── helpers ── */
function Tog({on,fn}){
  return <div className={"tog"+(on?" on":"")} onClick={fn}><div className="togk"/></div>;
}

function useCountdown(t){
  const [cd,setCd]=useState("--:--:--");
  useEffect(()=>{
    if(!t)return;
    const tick=()=>{
      const now=new Date();
      const p=t.split(":").map(Number);
      const tgt=new Date(now);
      tgt.setHours(p[0],p[1],0,0);
      if(tgt<now)tgt.setDate(tgt.getDate()+1);
      const d=Math.max(0,tgt-now);
      const hh=String(Math.floor(d/3600000)).padStart(2,"0");
      const mm=String(Math.floor((d%3600000)/60000)).padStart(2,"0");
      const ss=String(Math.floor((d%60000)/1000)).padStart(2,"0");
      setCd(hh+":"+mm+":"+ss);
    };
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[t]);
  return cd;
}

/* ── RamadanHomeCard ── */
function RamadanHomeCard({pt,isAr}){
  const L=(ar,en)=>isAr?ar:en;
  const fp=pt.Fajr.split(":").map(Number);
  const mp=pt.Maghrib.split(":").map(Number);
  const now=new Date();const nm=now.getHours()*60+now.getMinutes();
  const sm=fp[0]*60+fp[1];const em=mp[0]*60+mp[1];
  const pct=Math.max(0,Math.min(100,((nm-sm)/(em-sm))*100));
  const isFasting=nm>=sm&&nm<em;const afterIftar=nm>=em;
  const remMins=isFasting?em-nm:0;const remH=Math.floor(remMins/60);const remM=remMins%60;
  const toFajrMins=nm<sm?sm-nm:(24*60-nm+sm);const tFH=Math.floor(toFajrMins/60);const tFM=toFajrMins%60;
  const status=afterIftar?L("🎉 حان وقت الإفطار","🎉 Iftar time!")
    :isFasting?L("🌙 متبقي على الإفطار: "+remH+" ساعة و "+remM+" دقيقة","🌙 Remaining: "+remH+"h "+remM+"m")
    :L("🌅 متبقي على الإمساك: "+tFH+" ساعة و "+tFM+" دقيقة","🌅 To Suhoor: "+tFH+"h "+tFM+"m");
  return(
    <div className="rhc">
      <div className="rhc-hdr">
        <div className="rhc-ttl">🌙 {L("رمضان المبارك","Blessed Ramadan")}</div>
        <div className="rhc-badge">{L("١٤٤٧ هـ","1447 AH")}</div>
      </div>
      <div className="rhc-rem">{status}</div>
      <div className="rhc-bar"><div className="rhc-fill" style={{width:pct+"%"}}/></div>
      <div className="rhc-labels">
        <span className="rhc-s">🌅 {L("الإمساك","Suhoor")} {pt.Fajr}</span>
        <span className="rhc-i">🌇 {L("الإفطار","Iftar")} {pt.Maghrib}</span>
      </div>
    </div>
  );
}

/* ── AthkarReader ── */
function AthkarReader({cat,items,fs,isAr,counts,onIncr}){
  const L=(ar,en)=>isAr?ar:en;
  const colMap={morning:"#b87010",evening:"#1E3A5F",sleep:"#5040a0",prayer:"#1A7048",quran:"#C89B3C",ramadan:"#7030a0"};
  const col=colMap[cat]||"#C89B3C";
  const total=items.length;
  const done=items.filter((_,i)=>{const c=counts[cat+"-"+i]||0;return c>0&&(items[i].rep===1||c>=items[i].rep);}).length;
  return(
    <div className="ath-reader">
      <div className="ath-prog-hdr">
        <div className="ath-prog-bar"><div className="ath-prog-fill" style={{width:(done/total*100)+"%"}}/></div>
        <div className="ath-prog-txt">{done}/{total}</div>
      </div>
      <div className="ath-scroll">
        {items.map((z,i)=>{
          const cnt=counts[cat+"-"+i]||0;
          const isDone=z.rep===1||(z.rep>1&&cnt>=z.rep);
          return(
            <div key={i} className="zcard" style={{opacity:isDone?0.65:1}}>
              <div className="zbar" style={{background:col}}/>
              <div className="znum">{i+1}</div>
              <div className="zar" style={{fontSize:fs+"px"}}>{z.ar}</div>
              {z.tr&&<div className="ztr">{z.tr}</div>}
              <div className="zsrc">{z.src}</div>
              <div className="zfoot">
                {z.rep>1&&!isDone?(
                  <div className="zctr-wrap">
                    <div className="zrep-pill">{L("×"+z.rep+" مرة","×"+z.rep)}</div>
                    <div className="zctr-lbl">{cnt}/{z.rep}</div>
                    <div className="zctr" style={{background:col}} onClick={()=>onIncr(cat,i)}>{cnt}</div>
                  </div>
                ):(
                  <div className="zrep-pill">{z.rep>1?L("×"+z.rep+" مرة","×"+z.rep):L("مرة واحدة","Once")}</div>
                )}
                {isDone&&<div className="zdone">✓ {L("تم","Done")}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

            <div style={{fontFamily:"var(--ar)",fontSize:14,fontWeight:700,color:"var(--ink2)"}}>{L("أيام رمضان","Nights")}</div>
            <div style={{fontSize:11,color:"var(--green)",fontWeight:700}}>{tDone.length}/30</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:5}}>
            {Array.from({length:30},(_,i)=>(
              <div key={i} style={{borderRadius:9,aspectRatio:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",border:"1.5px solid "+(tDone.includes(i+1)?"transparent":"var(--bdr)"),background:tDone.includes(i+1)?"linear-gradient(135deg,#180840,#280c58)":"var(--bg2)",gap:2}} onClick={()=>tgT(i+1)}>
                <div style={{fontSize:11,fontWeight:900,color:tDone.includes(i+1)?"#fff":"var(--ink2)",fontFamily:"var(--en)"}}>{i+1}</div>
                <div style={{fontSize:7,color:tDone.includes(i+1)?"rgba(255,255,255,0.6)":"var(--ink4)"}}>{tDone.includes(i+1)?"✓":"ن"}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{fontFamily:"var(--ar)",fontSize:15,fontWeight:700,color:"var(--ink2)",marginBottom:8,paddingRight:2}}>{L("ختمة القرآن","Quran Completion")}</div>
        <div style={{background:"var(--card)",border:"1.5px solid var(--bdr)",borderRadius:16,padding:13,boxShadow:"0 1px 7px var(--shd)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,direction:"rtl"}}>
            <div style={{fontFamily:"var(--ar)",fontSize:14,fontWeight:700,color:"var(--ink2)"}}>{L("الأجزاء","Juz")}</div>
            <div style={{fontSize:11,color:"var(--green)",fontWeight:700}}>{Math.round(kDone.length/30*100)}% ({kDone.length}/30)</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:5}}>
            {Array.from({length:30},(_,i)=>(
              <div key={i} style={{borderRadius:8,aspectRatio:1,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:"1.5px solid "+(kDone.includes(i+1)?"transparent":"var(--bdr)"),background:kDone.includes(i+1)?"linear-gradient(135deg,var(--green),var(--green2))":"var(--bg2)",fontSize:11,fontWeight:700,color:kDone.includes(i+1)?"#fff":"var(--ink3)",fontFamily:"var(--en)"}} onClick={()=>tgK(i+1)}>{i+1}</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════ MAIN APP ══════════════════ */
function App(){
  const [tab,setTab]=useState("home");
  const [stab,setStab]=useState("surahs");
  const [isAr,setIsAr]=useState(true);
  const [surah,setSurah]=useState(null);
  const [verses,setVerses]=useState([]);
  const [trans,setTrans]=useState([]);
  const [loading,setLoading]=useState(false);
  const [dark,setDark]=useState(false);
  const [fs,setFs]=useState(26);
  const [showT,setShowT]=useState(false);
  const [autoScroll,setAutoScroll]=useState(true);
  const [playV,setPlayV]=useState(null);
  const [playing,setPlaying]=useState(false);
  const [prog,setProg]=useState(0);
  const [bms,setBms]=useState([]);
  const [selV,setSelV]=useState(null);
  const [pt,setPt]=useState(null);
  const [nextP,setNextP]=useState(null);
  const [toast,setToast]=useState(null);
  const [q,setQ]=useState("");
  const [shIdx,setShIdx]=useState(0);
  const [athCat,setAthCat]=useState(null);
  const [zCounts,setZCounts]=useState({});
  const [tDone,setTDone]=useState([]);
  const [kDone,setKDone]=useState([]);
  const [duaIdx,setDuaIdx]=useState(0);
  const [lastRead,setLastRead]=useState(null);
  const [reminders,setReminders]=useState({Fajr:true,Dhuhr:false,Asr:true,Maghrib:true,Isha:false});
  const [athShIdx,setAthShIdx]=useState(0);
  const [athAud,setAthAud]=useState(null);
  const [athPlayCat,setAthPlayCat]=useState(null);

  const aud=useRef(null);const pageRef=useRef(null);const ayRefs=useRef({});const ntimer=useRef(null);
  const cd=useCountdown(pt&&nextP?pt[nextP]:null);
  const L=(ar,en)=>isAr?ar:en;

  const ATH_AUDIO_SHEIKHS=[
    {id:"afasy",ar:"العفاسي",url:"https://cdn.islamic.network/quran/audio/128/ar.alafasy"},
    {id:"husary",ar:"الحصري",url:"https://cdn.islamic.network/quran/audio/128/ar.husary"},
  ];

  useEffect(()=>{const id=setInterval(()=>setDuaIdx(i=>(i+1)%ROTATING_DUAS.length),8000);return()=>clearInterval(id);},[]);
  useEffect(()=>{document.documentElement.className=dark?"dark":"";},[dark]);
  const msg=(t)=>{setToast(t);setTimeout(()=>setToast(null),2300);};

  const dayProgPct=(()=>{
    if(!pt||!nextP)return 0;
    const now=new Date().getHours()*60+new Date().getMinutes();
    const idx=PRAYERS_MAIN.indexOf(nextP);
    const prevP=idx>0?pt[PRAYERS_MAIN[idx-1]]:pt["Isha"];
    const pm=prevP.split(":").map(Number);const nm2=pt[nextP].split(":").map(Number);
    const start=pm[0]*60+pm[1];const end=nm2[0]*60+nm2[1];
    const el=end>start?(now-start)/(end-start)*100:(now<end?(24*60+now-start)/(24*60+end-start)*100:100);
    return Math.max(0,Math.min(100,el));
  })();

  const openSurah=async(s)=>{
    setSurah(s);setTab("reader");setVerses([]);setTrans([]);
    setLoading(true);stopAudio();setSelV(null);
    setLastRead({n:s.n,arShort:s.arShort,en:s.en,ayah:1});
    if(pageRef.current)pageRef.current.scrollTop=0;
    try{
      const[a,e]=await Promise.all([
        fetch(API+"/surah/"+s.n).then(r=>r.json()),
        fetch(API+"/surah/"+s.n+"/en.sahih").then(r=>r.json()),
      ]);
      const ayahs=a.data?a.data.ayahs:[];
      const engAyahs=e.data?e.data.ayahs:[];
      // Strip bismillah from verse 1 text (for all surahs except Fatiha & Tawba)
      if(s.n!==1&&s.n!==9&&ayahs.length>0){
        const cleaned=ayahs[0].text.replace(/^بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ\s*/,"").replace(/^بسم الله الرحمن الرحيم\s*/,"").trim();
        ayahs[0]={...ayahs[0],text:cleaned};
      }
      setVerses(ayahs);setTrans(engAyahs);
    }catch(err){msg(L("فشل التحميل","Load failed"));}
    setLoading(false);
  };

  const stopAudio=()=>{
    if(aud.current){aud.current.pause();aud.current.src="";aud.current=null;}
    if(ntimer.current)clearTimeout(ntimer.current);
    setPlaying(false);setPlayV(null);setProg(0);
  };
  const stopAthAud=()=>{
    if(athAud){try{athAud.pause();athAud.src="";}catch(e){}}
    setAthAud(null);setAthPlayCat(null);
  };

  const playAyah=(num,globalNum,allV)=>{
    stopAudio();
    const a=new Audio(SHEIKHS[shIdx].url+"/"+globalNum+".mp3");
    aud.current=a;
    a.ontimeupdate=()=>{if(a.duration)setProg(a.currentTime/a.duration*100);};
    a.onended=()=>{
      setProg(0);setPlaying(false);
      const arr=allV||verses;const idx=arr.findIndex(v=>v.numberInSurah===num);
      if(idx<arr.length-1){const nv=arr[idx+1];ntimer.current=setTimeout(()=>playAyah(nv.numberInSurah,nv.number,arr),300);}
      else setPlayV(null);
    };
    a.onerror=()=>msg(L("الصوت غير متاح","Audio unavailable"));
    a.play().then(()=>{setPlayV(num);setPlaying(true);}).catch(()=>msg(L("الصوت غير متاح","Audio unavailable")));
    if(autoScroll){setTimeout(()=>{const el=ayRefs.current[num];if(el&&pageRef.current)el.scrollIntoView({behavior:"smooth",block:"center"});},200);}
  };

  const togglePlay=()=>{
    if(!aud.current)return;
    if(playing){aud.current.pause();setPlaying(false);}else{aud.current.play();setPlaying(true);}
  };

  const toggleBM=(v,s)=>{
    const id=s.n+":"+v.numberInSurah;
    setBms(prev=>{
      const has=prev.find(b=>b.id===id);
      if(has){msg(L("تمت الإزالة","Removed"));return prev.filter(b=>b.id!==id);}
      msg(L("تم الحفظ 🔖","Bookmarked 🔖"));
      return[...prev,{id,sn:s.n,sen:s.en,sar:s.arShort,vn:v.numberInSurah}];
    });
  };

  const share=(v,s)=>{
    const ti=trans[v.numberInSurah-1]?trans[v.numberInSurah-1].text:"";
    const txt=v.text+"\n\n\""+ti+"\"\n\n— "+s.arShort+" ("+s.n+":"+v.numberInSurah+")";
    if(navigator.share)navigator.share({title:"القرآن الكريم",text:txt}).catch(()=>{});
    else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>msg(L("تم النسخ","Copied"))).catch(()=>{});
  };

  useEffect(()=>{
    fetch("https://api.aladhan.com/v1/timingsByCity?city=Dubai&country=AE&method=8")
      .then(r=>r.json()).then(d=>{
        const t=d.data?.timings;
        if(t){setPt(t);
          const nm=new Date().getHours()*60+new Date().getMinutes();
          let f=null;
          for(let i=0;i<PRAYERS_MAIN.length;i++){const p=PRAYERS_MAIN[i];const pp=t[p].split(":").map(Number);if(pp[0]*60+pp[1]>nm){f=p;break;}}
          setNextP(f||"Fajr");
        }
      }).catch(()=>{setPt({Fajr:"05:22",Sunrise:"06:35",Dhuhr:"12:33",Asr:"15:53",Maghrib:"18:26",Isha:"19:39"});setNextP("Asr");});
  },[]);

  const getJuz=(sn)=>{let j=1;for(let i=0;i<JUZ.length;i++){if(JUZ[i].s<=sn)j=JUZ[i].j;else break;}return j;};
  const fil=SURAHS.filter(s=>s.en.toLowerCase().includes(q.toLowerCase())||s.arShort.includes(q)||String(s.n).includes(q));
  const nextS=surah&&surah.n<114?SURAHS[surah.n]:null;
  const hijri=new Date().toLocaleDateString("ar-SA-u-ca-islamic",{day:"numeric",month:"long",year:"numeric"});
  const wdAr=new Date().toLocaleDateString("ar-SA",{weekday:"long"});

  const incrZ=(cat,i)=>{
    const k=cat+"-"+i;
    setZCounts(prev=>{
      const c=(prev[k]||0)+1;const mx=ATHKAR[cat][i].rep;
      if(c>=mx)msg(L("✅ اكتمل","✅ Done!"));
      return{...prev,[k]:c>=mx?0:c};
    });
  };

  const setupReminders=()=>{
    if(!("Notification" in window))return msg(L("المتصفح لا يدعم التنبيهات","Browser doesn't support notifications"));
    Notification.requestPermission().then(p=>{
      if(p==="granted")msg(L("✅ تم تفعيل التنبيهات","✅ Notifications enabled"));
      else msg(L("⚠️ يرجى السماح بالتنبيهات","⚠️ Please allow notifications"));
    });
  };

  const NAV=[
    {id:"home",      ico:"🏠",ar:"الرئيسية", en:"Home"},
    {id:"surahlist", ico:"📖",ar:"المصحف",   en:"Quran"},
    {id:"athkar",    ico:"🤲",ar:"الأذكار",   en:"Athkar"},
    {id:"prayer",    ico:"🕌",ar:"الصلاة",    en:"Prayer"},
    {id:"settings",  ico:"⚙️",ar:"الإعدادات",en:"Settings"},
  ];

  const pageTitle=()=>{
    if(tab==="reader"&&surah)return surah.arShort;
    if(tab==="prayer")return L("أوقات الصلاة","Prayer Times");
    if(tab==="bookmarks")return L("المحفوظات","Bookmarks");
    if(tab==="surahlist")return L("المصحف الشريف","The Holy Quran");
    if(tab==="athkar"&&athCat)return(ATHKAR_CATS.find(x=>x.id===athCat)||{ar:""}).ar;
    if(tab==="athkar")return L("الأذكار","Athkar");
    if(tab==="ramadan")return L("رمضان المبارك","Ramadan");
    if(tab==="settings")return L("الإعدادات","Settings");
    return"القرآن الكريم";
  };

  const goBack=()=>{
    if(tab==="reader"){stopAudio();setTab("surahlist");}
    else if(tab==="athkar"&&athCat)setAthCat(null);
  };
  const showBack=tab==="reader"||(tab==="athkar"&&athCat);

  const curDua=ROTATING_DUAS[duaIdx];

  return(
    <div className="app">
      {/* TOPBAR */}
      <div className="topbar">
        <div className="tb-g">
          {!showBack&&<div className="tb-ico" onClick={()=>setTab("bookmarks")}>🔖</div>}
          {showBack&&<div className="tb-ico" onClick={goBack} style={{color:"var(--blue)",fontWeight:700,fontSize:18}}>←</div>}
          {tab==="surahlist"&&<div className="tb-ico" style={{background:"var(--bluebg)",border:"1px solid var(--blue)"}} onClick={()=>setTab("bookmarks")}>🔖</div>}
        </div>
        <div className="tb-center">
          <div className="tb-title">{pageTitle()}</div>
          {tab==="home"&&<div className="tb-sub">بِسْمِ اللَّهِ</div>}
          {tab==="reader"&&surah&&<div style={{fontSize:9,color:"var(--ink4)",fontFamily:"var(--en)",letterSpacing:2,textTransform:"uppercase",marginTop:1}}>{surah.en}</div>}
        </div>
        <div className="tb-g">
          {tab==="surahlist"&&<div className="tb-ico" style={{background:"var(--bluebg)",border:"1px solid var(--blue)"}} onClick={()=>document.getElementById("srch-inp")?.focus()}>🔍</div>}
          {(tab==="home"||tab==="reader")&&<div className="tb-ico" onClick={()=>setDark(d=>!d)}>{dark?"☀️":"🌙"}</div>}
          {tab==="reader"&&surah&&<div className="tb-ico" onClick={()=>setShowT(s=>!s)} style={showT?{background:"var(--bluebg)",border:"1px solid var(--blue)"}:{}}>🌐</div>}
        </div>
      </div>

      {/* ── HOME ── */}
      {tab==="home"&&(
        <div className="scroll su" style={{paddingBottom:16}}>
          {/* Hero - Next Prayer */}
          {pt&&nextP?(
            <div className="nph">
              <div className="nph-glow"/><div className="nph-stars"/>
              <div className="nph-loc"><div className="nph-loc-dot"/>دبي، الإمارات</div>
              <div className="nph-row">
                <div>
                  <div className="nph-lbl">{L("الوقت المتبقي لصلاة","Next prayer")}</div>
                  <div className="nph-name">{L(PNAMES_AR[nextP],PNAMES_EN[nextP])}</div>
                </div>
                <div className="nph-ico">{PICO[nextP]}</div>
              </div>
              <div className="nph-cd" dir="ltr">{cd}</div>
              <div className="nph-prog"><div className="nph-fill" style={{width:dayProgPct+"%"}}/></div>
              <div className="nph-hijri">{hijri}</div>
            </div>
          ):(
            <div className="nph nph-skeleton">
              <div className="nph-glow"/>
              <div className="nph-loc"><div className="nph-loc-dot"/>دبي، الإمارات</div>
              <div className="nph-name" style={{opacity:0.4,fontSize:16}}>{L("جاري تحميل المواقيت...","Loading...")}</div>
              <div className="nph-cd" dir="ltr" style={{opacity:0.2}}>--:--:--</div>
            </div>
          )}

          {/* Prayer strip */}
          <div className="ps">
            {pt&&PRAYERS_MAIN.map(p=>(
              <div key={p} className={"ps-c"+(nextP===p?" nxt":"")} onClick={()=>setTab("prayer")}>
                {nextP===p&&<div className="ps-dot"/>}
                <div className="ps-name">{L(PNAMES_AR[p],PNAMES_EN[p])}</div>
                <div className="ps-time" dir="ltr">{pt[p]?pt[p].slice(0,5):"--"}</div>
              </div>
            ))}
          </div>

          {/* Ramadan fasting */}
          {pt&&<RamadanHomeCard pt={pt} isAr={isAr}/>}

          {/* Quran last read */}
          <div className="qhc">
            <div className="qhc-lbl">📖 {L("آخر قراءة","Last Read")}</div>
            <div className="qhc-surah">{lastRead?lastRead.arShort:L("الفاتحة","Al-Fatiha")}</div>
            <div className="qhc-meta">{lastRead?L("آية "+lastRead.ayah+" · "+lastRead.en,"Ayah "+lastRead.ayah+" · "+lastRead.en):L("سورة ١ · الصفحة ١","Surah 1 · Page 1")}</div>
            <div className="qhc-btns">
              <button className="qhc-main" onClick={()=>openSurah(lastRead?SURAHS[lastRead.n-1]:SURAHS[0])}>{L("متابعة القراءة ←","Continue →")}</button>
              <button className="qhc-sec" onClick={()=>setTab("surahlist")}>{L("الفهرس","Index")}</button>
            </div>
          </div>

          {/* Dua ticker */}
          <div className="dua-tick" onClick={()=>setTab("athkar")}>
            <div className="dt-ico">🤲</div>
            <div className="dt-body">
              <div className="dt-lbl">DUA · دعاء اليوم</div>
              <div className="dt-txt">{curDua.ar}</div>
            </div>
            <div className="dt-arr">←</div>
          </div>

          {/* Quick actions */}
          <div>
            <div className="sec-h">
              <div className="sec-ht">{L("QUICK ACTIONS","Quick Actions")}</div>
              <div className="sec-ha" onClick={()=>setTab("athkar")}>{L("الكل ←","All →")}</div>
            </div>
            <div className="qa-grid">
              {[
                {ico:"🌅",ar:"أذكار الصباح",en:"Morning",fn:()=>{setAthCat("morning");setTab("athkar");},cnt:ATHKAR.morning.length},
                {ico:"🌙",ar:"أذكار المساء",en:"Evening",fn:()=>{setAthCat("evening");setTab("athkar");},cnt:ATHKAR.evening.length},
                {ico:"😴",ar:"أذكار النوم",en:"Sleep",fn:()=>{setAthCat("sleep");setTab("athkar");},cnt:ATHKAR.sleep.length},
                {ico:"🤲",ar:"أذكار الصلاة",en:"Prayer",fn:()=>{setAthCat("prayer");setTab("athkar");},cnt:ATHKAR.prayer.length},
                {ico:"☪️",ar:"أدعية رمضان",en:"Ramadan",fn:()=>{setAthCat("ramadan");setTab("athkar");},cnt:ATHKAR.ramadan.length},
                {ico:"📿",ar:"رمضان",en:"Ramadan",fn:()=>setTab("ramadan"),cnt:null},
              ].map((a,i)=>(
                <div key={i} className="qa-c" onClick={a.fn}>
                  <div className="qa-ico">{a.ico}</div>
                  <div className="qa-ttl">{L(a.ar,a.en)}</div>
                  {a.cnt&&<div className="qa-sub">{a.cnt} {L("ذكر","adhkar")}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── SURAH LIST ── */}
      {tab==="surahlist"&&(
        <React.Fragment>
          <div className="list-tb">
            <div className="ltabs">
              <div className={"ltab"+(stab==="surahs"?" on":"")} onClick={()=>setStab("surahs")}>{L("السور","Surahs")}</div>
              <div className={"ltab"+(stab==="juz"?" on":"")} onClick={()=>setStab("juz")}>{L("الأجزاء","Juz")}</div>
            </div>
            <div className="lsrch">
              <span style={{fontSize:12,color:"var(--ink4)"}}>🔍</span>
              <input id="srch-inp" placeholder={L("بحث...","Search...")} value={q} onChange={e=>setQ(e.target.value)}/>
            </div>
          </div>
          <div className="scroll su">
            {stab==="surahs"&&(
              <div className="sgrid">
                {fil.map(s=>(
                  <div key={s.n} className="sgc" onClick={()=>openSurah(s)}>
                    <div className="sgc-n">{s.n}</div>
                    <div className="sgc-ar">{s.ar}</div>
                    <div className={"sgc-type "+(s.tar==="مكية"?"mk":"md")}>{L(s.tar,s.ten)}</div>
                    <div className="sgc-meta">{s.v} {L("آية","ayahs")}</div>
                    <div className="sgc-page">{L("ص","P.")}{s.pg}</div>
                  </div>
                ))}
              </div>
            )}
            {stab==="juz"&&(
              <div className="juz-list">
                {JUZ.map(j=>{const s=SURAHS[j.s-1];return(
                  <div key={j.j} className="juz-c" onClick={()=>openSurah(s)}>
                    <div className="juz-ball">{j.j}</div>
                    <div className="juz-info">
                      <div className="juz-ttl">{L("الجزء "+j.j,"Juz "+j.j)}</div>
                      <div className="juz-sub">{L(s.arShort,s.en)}</div>
                    </div>
                    <span style={{fontSize:16,color:"var(--ink4)"}}>←</span>
                  </div>
                );})}
              </div>
            )}
          </div>
        </React.Fragment>
      )}

      {/* ── READER ── */}
      {tab==="reader"&&surah&&(
        <div className="rd-wrap su">
          <div className="rd-nav">
            <div className="rchip bl">{surah.arShort}</div>
            <div style={{width:1,height:14,background:"var(--bdr)",flexShrink:0}}/>
            <div className="rchip gd">{L("ج"+getJuz(surah.n),"Juz "+getJuz(surah.n))}</div>
            <div style={{width:1,height:14,background:"var(--bdr)",flexShrink:0}}/>
            <div className={"rchip"+(showT?" bl":"")} onClick={()=>setShowT(s=>!s)}>{L("ترجمة","Translation")}</div>
            <div style={{marginRight:"auto",fontSize:10,color:"var(--ink4)",flexShrink:0,fontWeight:700,fontFamily:"var(--en)"}}>{surah.v} {L("آية","v")}</div>
          </div>
          <div className="sh-strip">
            <div className="sh-lbl">{L("القارئ:","Reciter:")}</div>
            {SHEIKHS.map((sh,i)=>(
              <div key={sh.id} className={"sh-btn"+(shIdx===i?" on":"")} onClick={()=>{setShIdx(i);if(playV!==null){stopAudio();msg(L("تم التغيير","Switched"));}}}>
                {isAr?sh.ar:sh.en}
              </div>
            ))}
          </div>
          <div className="rd-tool">
            <div className={"rtbtn"+(autoScroll?" on":"")} onClick={()=>setAutoScroll(s=>!s)}>📜 {L("تمرير","Auto")}</div>
            <div className="rtbtn" onClick={()=>{if(selV){const v=verses.find(x=>x.numberInSurah===selV);if(v)toggleBM(v,surah);}else msg(L("اضغط على آية","Tap an ayah"));}}>🔖</div>
            <div className="rtbtn" onClick={()=>{if(selV){const v=verses.find(x=>x.numberInSurah===selV);if(v)share(v,surah);}else msg(L("اضغط على آية","Tap an ayah"));}}>📤</div>
            <div className="rtbtn" onClick={()=>{if(verses[0])playAyah(verses[0].numberInSurah,verses[0].number,verses);}}>▶ {L("تشغيل","Play")}</div>
            <div className="fcg">
              <div className="fcbtn" onClick={()=>setFs(f=>Math.max(18,f-2))}>A−</div>
              <div className="fcval">{fs}</div>
              <div className="fcbtn" onClick={()=>setFs(f=>Math.min(46,f+2))}>A+</div>
            </div>
          </div>
          <div className="mpage" ref={pageRef}>
            <div className="mhdr">
              <div className="mhdr-glow"/>
              <div className="mhdr-ar">{surah.ar}</div>
              <div className="mhdr-en">{surah.en}</div>
              <div className="mhdr-pills">
                <span className="mpill">{surah.v} {L("آية","Ayahs")}</span>
                <span className={"mpill "+(surah.tar==="مكية"?"mk":"md")}>{L(surah.tar,surah.ten)}</span>
                <span className="mpill gd">{L("الجزء "+getJuz(surah.n),"Juz "+getJuz(surah.n))}</span>
                <span className="mpill">{L("ص","P.")}{surah.pg}</span>
              </div>
            </div>
            {/* Bismillah — once, only for surahs that need it */}
            {surah.n!==1&&surah.n!==9&&(
              <div className="bism-blk"><div className="bism-ar">{BISM}</div></div>
            )}
            {loading?(
              <div className="loading"><div className="spin">🌙</div>{L("جاري التحميل...","Loading...")}</div>
            ):(
              <React.Fragment>
                <div className="ayah-body" style={{fontSize:fs+"px"}}>
                  {verses.map(v=>(
                    <span key={v.number}
                      ref={el=>{if(el)ayRefs.current[v.numberInSurah]=el;}}
                      className={"aspan"+(playV===v.numberInSurah?" play":"")+(selV===v.numberInSurah?" sel":"")}
                      onClick={()=>{setSelV(p=>p===v.numberInSurah?null:v.numberInSurah);if(surah)setLastRead({n:surah.n,arShort:surah.arShort,en:surah.en,ayah:v.numberInSurah});}}>
                      {v.text}
                      {" "}
                      <span className={"anum"+(playV===v.numberInSurah?" playing":"")}
                        onClick={e=>{e.stopPropagation();playAyah(v.numberInSurah,v.number,verses);}}>
                        {v.numberInSurah}
                      </span>
                      {" "}
                    </span>
                  ))}
                </div>
                {nextS&&verses.length>0&&(
                  <div className="nb" onClick={()=>openSurah(nextS)}>
                    <span style={{fontSize:20,color:"var(--ink4)"}}>→</span>
                    <div className="nb-info">
                      <div className="nb-lbl">{L("السورة التالية","Next Surah")}</div>
                      <div className="nb-ar">{nextS.ar}</div>
                      <div className="nb-en">{nextS.en} · {nextS.v} {L("آية","v")}</div>
                    </div>
                    <span style={{fontSize:24}}>📖</span>
                  </div>
                )}
              </React.Fragment>
            )}
          </div>
          <div className={"trans-p"+(showT?" open":"")}>
            <div className="trans-i">
              <div className="trans-hd">
                <div className="trans-lbl">✦ SAHIH INTERNATIONAL</div>
                <div className="trans-x" onClick={()=>setShowT(false)}>✕</div>
              </div>
              {trans.map((t,i)=>(
                <div key={t.number} className="tv">
                  <div className="tv-n">Ayah {t.numberInSurah}</div>
                  <div className="tv-ar">{verses[i]&&verses[i].text}</div>
                  <div className="tv-en">{t.text}</div>
                </div>
              ))}
            </div>
          </div>
          {playV!==null&&(
            <div className="abar">
              <div className="aplay" onClick={togglePlay}>{playing?"⏸":"▶"}</div>
              <div className="ainfo">
                <div className="atitle">{L("الآية "+playV+" · "+SHEIKHS[shIdx].ar,"Ayah "+playV+" · "+SHEIKHS[shIdx].en)}</div>
                <div className="asub">{surah.en} · Auto-scroll {autoScroll?"ON":"OFF"}</div>
                <div className="aprog"><div className="afill" style={{width:prog+"%"}}/></div>
              </div>
              <div className="astop" onClick={stopAudio}>⏹</div>
            </div>
          )}
        </div>
      )}

      {/* ── ATHKAR HOME ── */}
      {tab==="athkar"&&!athCat&&(
        <div className="scroll su">
          <div className="ath-home">
            <div className="ath-sec-lbl">{L("اختر قسماً","Choose a section")}</div>
            <div className="ath-grid">
              {ATHKAR_CATS.map(c=>(
                <div key={c.id} className={"ath-c ac-"+c.col} onClick={()=>setAthCat(c.id)}>
                  <div className="ath-ico">{c.ico}</div>
                  <div className="ath-ttl">{isAr?c.ar:c.en}</div>
                  <div className="ath-cnt">{(ATHKAR[c.id]||[]).length} {L("ذكر","adhkar")}</div>
                  <div className="ath-bar-b"/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── ATHKAR READER ── */}
      {tab==="athkar"&&athCat&&(
        <React.Fragment>
          <div className="ath-aud">
            <div className="ath-aud-lbl">🔊 {L("تشغيل","Play")}</div>
            <div className="ath-aud-sh">
              {ATH_AUDIO_SHEIKHS.map((sh,i)=>(
                <div key={sh.id} className={"ath-aud-btn"+(athShIdx===i?" on":"")} onClick={()=>{stopAthAud();setAthShIdx(i);}}>
                  {isAr?sh.ar:sh.en}
                </div>
              ))}
            </div>
            {athPlayCat===athCat
              ?<div className="ath-aud-play" style={{background:"var(--red)"}} onClick={stopAthAud}>⏹</div>
              :<div className="ath-aud-play" onClick={()=>{
                  stopAthAud();
                  const nums=[1,2,3,4,5,6,7];let idx=0;
                  const pn=()=>{
                    if(idx>=nums.length)return;
                    const a=new Audio(ATH_AUDIO_SHEIKHS[athShIdx].url+"/"+nums[idx]+".mp3");
                    a.onended=()=>{idx++;pn();};a.onerror=()=>{idx++;pn();};
                    a.play().catch(()=>{});
                    if(idx===0){setAthAud(a);setAthPlayCat(athCat);}
                    idx++;
                  };
                  pn();msg(L("🎵 تشغيل الفاتحة","🎵 Playing Al-Fatiha"));
                }}>▶</div>
            }
          </div>
          <AthkarReader cat={athCat} items={ATHKAR[athCat]||[]} fs={fs} isAr={isAr} counts={zCounts} onIncr={incrZ}/>
        </React.Fragment>
      )}

      {/* ── RAMADAN ── */}
      {tab==="ramadan"&&(
        <RamadanPage pt={pt} isAr={isAr} tDone={tDone} setTDone={setTDone} kDone={kDone} setKDone={setKDone}/>
      )}

      {/* ── PRAYER ── */}
      {tab==="prayer"&&(
        <div className="prayer-wrap su">
          <div className="p-hero">
            <div className="p-hero-glow"/>
            <div className="ph-city">📍 {L("دبي، الإمارات","Dubai, UAE")}</div>
            {nextP&&pt?(
              <React.Fragment>
                <div className="ph-cd-lbl">{L("الوقت المتبقي لصلاة","Time remaining for")}</div>
                <div className="ph-name">{L(PNAMES_AR[nextP],PNAMES_EN[nextP])}</div>
                <div className="ph-cd" dir="ltr">{cd}</div>
              </React.Fragment>
            ):<div className="ph-name" style={{opacity:0.4}}>--:--:--</div>}
            <div className="ph-date">
              <div className="ph-date-p">{wdAr} · {hijri}</div>
            </div>
          </div>
          <div className="p-cards">
            {pt&&PRAYERS_MAIN.map(p=>(
              <div key={p} className={"p-card"+(nextP===p?" now":"")}>
                <div className={"p-card-ico"+(nextP===p?"":" ")} style={nextP===p?{}:{}}>{PICO[p]}</div>
                <div className="p-card-info">
                  <div className="p-card-name">{L(PNAMES_AR[p],PNAMES_EN[p])}</div>
                  <div className="p-card-sub">{nextP===p?L("الصلاة القادمة","Next prayer"):L("صلاة "+PNAMES_AR[p],PNAMES_EN[p]+" prayer")}</div>
                </div>
                <div className="p-card-time" dir="ltr">{pt[p]?pt[p].slice(0,5):"--:--"}</div>
              </div>
            ))}
          </div>
          {/* Reminders */}
          <div className="p-rem-title">🔔 {L("تنبيهات الصلاة","Prayer Reminders")}</div>
          <button className="p-rem-btn" onClick={setupReminders}>{L("تفعيل الإشعارات","Enable Notifications")}</button>
          {pt&&PRAYERS_MAIN.map(p=>(
            <div key={p} className="p-rem-c">
              <div style={{display:"flex",alignItems:"center",gap:10,direction:"rtl"}}>
                <span style={{fontSize:20}}>{PICO[p]}</span>
                <div className="p-rem-name">{L(PNAMES_AR[p],PNAMES_EN[p])}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div className="p-rem-time" dir="ltr">{pt[p]?.slice(0,5)}</div>
                <Tog on={reminders[p]||false} fn={()=>setReminders(prev=>({...prev,[p]:!prev[p]}))}/>
              </div>
            </div>
          ))}
          <div style={{fontSize:10,color:"var(--ink4)",textAlign:"right",direction:"rtl",padding:"4px 2px",fontFamily:"var(--ui)"}}>{L("* يتطلب السماح بالإشعارات في المتصفح","* Requires browser notification permission")}</div>
        </div>
      )}

      {/* ── SETTINGS (full page, replaces drawer) ── */}
      {tab==="settings"&&(
        <div className="settings-wrap su">
          <div className="set-hero">
            <div className="set-hero-glow"/>
            <div className="set-app-ico">🕌</div>
            <div className="set-app-name">القرآن الكريم</div>
            <div className="set-app-ver">V 9.0 · THE HOLY QURAN</div>
          </div>
          {/* Display */}
          <div className="set-sec">
            <div className="set-sec-lbl">DISPLAY · العرض</div>
            <div className="set-card">
              <div className="set-row">
                <div className="set-row-ico" style={{background:"var(--bg2)"}}>🌙</div>
                <div className="set-row-body">
                  <div className="set-row-lbl">{L("الوضع الليلي","Dark Mode")}</div>
                  <div className="set-row-sub">{L("خلفية داكنة مريحة للعين","Easy on the eyes")} </div>
                </div>
                <div className="set-row-ctrl"><Tog on={dark} fn={()=>setDark(d=>!d)}/></div>
              </div>
              <div className="set-row">
                <div className="set-row-ico" style={{background:"var(--goldbg)"}}>🔤</div>
                <div className="set-row-body">
                  <div className="set-row-lbl">{L("حجم الخط","Font Size")}</div>
                  <div className="set-row-sub">{L("حجم نص القرآن الكريم","Quran text size")}</div>
                </div>
                <div className="set-row-ctrl">
                  <div className="fsz-ctrl">
                    <div className="fsz-btn" onClick={()=>setFs(f=>Math.max(18,f-2))}>−</div>
                    <div className="fsz-val">{fs}</div>
                    <div className="fsz-btn" onClick={()=>setFs(f=>Math.min(46,f+2))}>+</div>
                  </div>
                </div>
              </div>
              <div className="set-row">
                <div className="set-row-ico" style={{background:"var(--bluebg)"}}>🌐</div>
                <div className="set-row-body">
                  <div className="set-row-lbl">{L("اللغة الإنجليزية","Arabic Interface")}</div>
                  <div className="set-row-sub">{L("عرض الواجهة بالإنجليزية","Switch to English interface")}</div>
                </div>
                <div className="set-row-ctrl"><Tog on={!isAr} fn={()=>setIsAr(a=>!a)}/></div>
              </div>
            </div>
          </div>
          {/* Quran */}
          <div className="set-sec">
            <div className="set-sec-lbl">QURAN · القرآن</div>
            <div className="set-card">
              <div className="set-row">
                <div className="set-row-ico" style={{background:"var(--greenbg)"}}>📜</div>
                <div className="set-row-body">
                  <div className="set-row-lbl">{L("التمرير التلقائي","Auto Scroll")}</div>
                  <div className="set-row-sub">{L("التمرير مع التلاوة الصوتية","Scroll with audio playback")}</div>
                </div>
                <div className="set-row-ctrl"><Tog on={autoScroll} fn={()=>setAutoScroll(s=>!s)}/></div>
              </div>
              <div className="set-row">
                <div className="set-row-ico" style={{background:"var(--bluebg)"}}>📖</div>
                <div className="set-row-body">
                  <div className="set-row-lbl">{L("عرض الترجمة","Show Translation")}</div>
                  <div className="set-row-sub">{L("الترجمة الإنجليزية (Sahih Int'l)","Sahih International English")}</div>
                </div>
                <div className="set-row-ctrl"><Tog on={showT} fn={()=>setShowT(s=>!s)}/></div>
              </div>
            </div>
          </div>
          {/* Audio / Sheikh */}
          <div className="set-sec">
            <div className="set-sec-lbl">AUDIO · الصوت</div>
            <div className="set-card">
              <div className="set-row" style={{paddingBottom:8}}>
                <div className="set-row-ico" style={{background:"var(--goldbg)"}}>🎙</div>
                <div className="set-row-body">
                  <div className="set-row-lbl">{L("القارئ","Reciter")}</div>
                  <div className="set-row-sub">{isAr?SHEIKHS[shIdx].ar:SHEIKHS[shIdx].en}</div>
                </div>
              </div>
              <div className="sh-grid">
                {SHEIKHS.map((sh,i)=>(
                  <div key={sh.id} className={"sh-radio"+(shIdx===i?" on":"")}
                    onClick={()=>{setShIdx(i);if(playV!==null){stopAudio();msg(L("تم التغيير","Switched"));}}}>
                    <div className="sh-radio-name">{isAr?sh.ar:sh.en}</div>
                    <div className="sh-radio-en">{sh.en}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          {/* Prayer */}
          <div className="set-sec">
            <div className="set-sec-lbl">PRAYER · الصلاة</div>
            <div className="set-card">
              <div className="set-row">
                <div className="set-row-ico" style={{background:"var(--bluebg)"}}>📍</div>
                <div className="set-row-body">
                  <div className="set-row-lbl">{L("المدينة","City")}</div>
                  <div className="set-row-sub">{L("دبي، الإمارات","Dubai, UAE")}</div>
                </div>
                <div className="set-row-ctrl"><div className="set-row-val">دبي <span className="set-chevron">›</span></div></div>
              </div>
              <div className="set-row">
                <div className="set-row-ico" style={{background:"var(--greenbg)"}}>🔔</div>
                <div className="set-row-body">
                  <div className="set-row-lbl">{L("تنبيهات الصلاة","Prayer Reminders")}</div>
                  <div className="set-row-sub">{L("إدارة تنبيهات المواقيت","Manage prayer notifications")}</div>
                </div>
                <div className="set-row-ctrl"><div className="sec-ha" onClick={()=>setTab("prayer")}>←</div></div>
              </div>
            </div>
          </div>
          {/* About */}
          <div className="set-sec" style={{paddingBottom:20}}>
            <div className="set-sec-lbl">ABOUT · عن التطبيق</div>
            <div className="set-card">
              <div className="set-row">
                <div className="set-row-ico" style={{background:"var(--goldbg)"}}>📿</div>
                <div className="set-row-body">
                  <div className="set-row-lbl">{L("مصدر البيانات","Data Source")}</div>
                  <div className="set-row-sub">AlQuran.cloud · Aladhan.com</div>
                </div>
              </div>
              <div className="set-row">
                <div className="set-row-ico" style={{background:"var(--orangebg)"}}>🤲</div>
                <div className="set-row-body">
                  <div className="set-row-lbl">{L("دعاء","Prayer")}</div>
                  <div className="set-row-sub" style={{fontFamily:"var(--ar)",fontSize:13,lineHeight:1.7}}>{L("اللهم اجعل هذا العمل خالصاً لوجهك الكريم","May Allah accept this work")}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── BOOKMARKS ── */}
      {tab==="bookmarks"&&(
        <div className="bm-wrap su">
          <div className="bm-hero">
            <div className="bm-hero-t">{L("المحفوظات","Bookmarks")}</div>
            <div className="bm-hero-s">{bms.length} {L("آيات محفوظة","saved ayahs")}</div>
          </div>
          {bms.length===0?(
            <div className="empty">
              <div className="empty-ico">🔖</div>
              <div className="empty-txt">{L("لا توجد محفوظات بعد\nافتح سورة → اضغط على آية → 🔖","No bookmarks yet\nOpen surah → tap ayah → 🔖")}</div>
            </div>
          ):bms.map(b=>(
            <div key={b.id} className="bm-row" onClick={()=>openSurah(SURAHS[b.sn-1])}>
              <div className="bm-ico">🔖</div>
              <div className="bm-info">
                <div className="bm-ttl">{b.sar} · {L("آية","Ayah")} {b.vn}</div>
                <div className="bm-sub">{b.sen} · {L("سورة","Surah")} {b.sn}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── BOTTOM NAV ── */}
      <div className="bnav">
        {NAV.map(n=>(
          <div key={n.id}
            className={"bni"+(tab===n.id||(tab==="reader"&&n.id==="surahlist")?" on":"")}
            onClick={()=>{stopAudio();if(n.id!=="athkar")setAthCat(null);setTab(n.id);}}>
            <div className="bni-ind"/>
            <span className="bni-ico">{n.ico}</span>
            <span className="bni-lbl">{L(n.ar,n.en)}</span>
          </div>
        ))}
      </div>

      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
