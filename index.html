<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>القرآن الكريم</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;900&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ══════════════════════════════════════════════════
   ROOT TOKENS
══════════════════════════════════════════════════ */
:root {
  /* Brand */
  --navy:   #1E3A5F;
  --navy2:  #162d4a;
  --navy3:  #0e1d30;
  --gold:   #C89B3C;
  --gold2:  #a07828;
  --gold3:  #e8c060;
  --goldbg: #FEF9EC;
  --goldlt: #FFFDF5;

  /* Surface */
  --bg:     #F7F3EA;
  --bg2:    #EDE7D8;
  --bg3:    #E0D8C6;
  --paper:  #FDFAF3;
  --card:   #FFFFFF;

  /* Text */
  --ink:    #1C1407;
  --ink2:   #3A2E18;
  --ink3:   #6B5535;
  --ink4:   #A48858;
  --ink5:   #C8AC7A;

  /* Utility */
  --green:  #1A6B44;
  --green2: #24945E;
  --red:    #B83030;
  --orange: #C05820;

  /* Borders & Shadows */
  --bdr:    #DDD5BE;
  --bdr2:   rgba(200,155,60,0.28);
  --bdr3:   rgba(200,155,60,0.12);
  --shd:    rgba(30,58,95,0.06);
  --shd2:   rgba(30,58,95,0.14);
  --shd3:   rgba(0,0,0,0.04);

  /* Typography */
  --qfont:  'Amiri Quran', 'Amiri', serif;
  --ufont:  'Tajawal', sans-serif;
  --efont:  'Lato', sans-serif;

  /* Geometry */
  --r6:4px; --r8:8px; --r10:10px; --r12:12px;
  --r14:14px; --r16:16px; --r20:20px; --r24:24px;

  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}

.dark {
  --navy:   #4A7AC8;
  --navy2:  #3A6AB8;
  --navy3:  #2A50A0;
  --gold:   #D4A840;
  --gold2:  #B88C28;
  --gold3:  #ECC870;
  --goldbg: #120E00;
  --goldlt: #0C0900;

  --bg:     #0A0906;
  --bg2:    #141008;
  --bg3:    #1C160A;
  --paper:  #100C06;
  --card:   #161208;

  --ink:    #F0EAD8;
  --ink2:   #D8CCA8;
  --ink3:   #9A8458;
  --ink4:   #6A5838;
  --ink5:   #3A2C18;

  --bdr:    #2A2010;
  --bdr2:   rgba(212,168,64,0.22);
  --bdr3:   rgba(212,168,64,0.08);
  --shd:    rgba(0,0,0,0.35);
  --shd2:   rgba(0,0,0,0.6);
  --shd3:   rgba(0,0,0,0.5);
}

/* ══════════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════════ */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  direction: rtl;
}
body {
  font-family: var(--ufont);
  color: var(--ink);
  direction: rtl;
}
.app {
  max-width: 430px;
  margin: 0 auto;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.scroll::-webkit-scrollbar { width: 0; }

/* Page entrance animation */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.su { animation: fadeUp 0.25s cubic-bezier(.4,0,.2,1); }

/* ══════════════════════════════════════════════════
   ISLAMIC GEOMETRIC PATTERNS (CSS only)
══════════════════════════════════════════════════ */
.geo-bg {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.geo-bg::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(200,155,60,0.07) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(30,58,95,0.08) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(200,155,60,0.04) 0%, transparent 60%);
}

/* ══════════════════════════════════════════════════
   TOP BAR
══════════════════════════════════════════════════ */
.topbar {
  flex-shrink: 0;
  z-index: 60;
  background: var(--card);
  border-bottom: 1px solid var(--bdr);
  height: 56px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  box-shadow: 0 1px 0 var(--bdr3), 0 2px 12px var(--shd);
}
.tb-group { display: flex; gap: 6px; align-items: center; }
.tb-btn {
  width: 40px; height: 40px;
  border-radius: var(--r10);
  display: flex; align-items: center; justify-content: center;
  background: var(--bg2);
  border: 1px solid var(--bdr);
  cursor: pointer; font-size: 17px;
  transition: all 0.15s;
  flex-shrink: 0;
  color: var(--ink2);
  font-family: var(--ufont);
  font-weight: 700;
  font-size: 15px;
}
.tb-btn:active { transform: scale(0.88); background: var(--bg3); }
.tb-btn.accent { background: var(--goldbg); border-color: var(--bdr2); }
.tb-btn.navy { background: var(--navy); border-color: transparent; color: #fff; font-size: 18px; }
.tb-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; }
.tb-title {
  font-family: var(--ufont);
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  text-align: center;
}
.tb-sub {
  font-family: var(--qfont);
  font-size: 13px;
  color: var(--gold2);
  text-align: center;
  line-height: 1;
}

/* ══════════════════════════════════════════════════
   HOME — HERO PRAYER CARD
══════════════════════════════════════════════════ */
.prayer-hero {
  margin: 12px 14px 0;
  border-radius: var(--r20);
  background: linear-gradient(150deg, var(--navy3) 0%, #1a3560 40%, #0f2040 100%);
  padding: 20px 20px 18px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(14,29,48,0.4), 0 1px 0 rgba(255,255,255,0.04) inset;
}
/* Geometric arch decoration */
.ph-arch {
  position: absolute; bottom: -30px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 100px;
  border: 1px solid rgba(200,155,60,0.07);
  border-radius: 100px 100px 0 0;
  pointer-events: none;
}
.ph-arch::before {
  content: '';
  position: absolute; inset: 8px;
  border: 1px solid rgba(200,155,60,0.05);
  border-radius: 100px 100px 0 0;
}
/* Stars */
.ph-stars {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 10% 15%, rgba(200,155,60,0.12), transparent 60%),
    radial-gradient(ellipse 40% 40% at 90% 80%, rgba(255,255,255,0.03), transparent);
}
/* Grid line pattern */
.ph-grid {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(200,155,60,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,155,60,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
}
.ph-location {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.45);
  margin-bottom: 14px;
  font-family: var(--ufont);
  position: relative; z-index: 1;
}
.ph-loc-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4EDD88;
  box-shadow: 0 0 6px #4EDD88;
}
.ph-top {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 6px;
  position: relative; z-index: 1;
}
.ph-label {
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,0.45);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: var(--efont);
  margin-bottom: 6px;
}
.ph-prayer-name {
  font-family: var(--ufont);
  font-size: 30px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
}
.ph-icon-wrap {
  width: 50px; height: 50px;
  border-radius: var(--r12);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
  backdrop-filter: blur(4px);
}
.ph-countdown {
  font-family: var(--efont);
  font-size: 54px;
  font-weight: 900;
  color: #fff;
  direction: ltr;
  letter-spacing: 0px;
  line-height: 1;
  margin: 10px 0 12px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  position: relative; z-index: 1;
}
/* Progress track */
.ph-prog-wrap {
  position: relative; z-index: 1;
  margin-bottom: 14px;
}
.ph-prog-track {
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px; overflow: hidden;
  margin-bottom: 6px;
}
.ph-prog-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, rgba(200,155,60,0.5), rgba(255,255,255,0.8));
  transition: width 1s linear;
}
.ph-hijri {
  font-family: var(--qfont);
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  position: relative; z-index: 1;
}

/* ══ PRAYER TIMES STRIP ══ */
.pt-strip {
  margin: 10px 14px 0;
  display: flex; gap: 5px;
}
.pt-card {
  flex: 1;
  background: var(--card);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r12);
  padding: 9px 4px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.pt-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: transparent;
  transition: background 0.15s;
}
.pt-card.active {
  background: linear-gradient(180deg, rgba(30,58,95,0.06) 0%, var(--card) 100%);
  border-color: var(--navy);
}
.pt-card.active::before {
  background: linear-gradient(90deg, var(--navy), var(--navy2));
}
.pt-card:active { transform: scale(0.95); }
.pt-name {
  font-size: 9px; font-weight: 700;
  color: var(--ink3);
  margin-bottom: 4px;
  font-family: var(--ufont);
}
.pt-card.active .pt-name { color: var(--navy); }
.pt-time {
  font-size: 13px; font-weight: 900;
  color: var(--ink);
  font-family: var(--efont);
  direction: ltr;
}
.pt-card.active .pt-time { color: var(--navy); }

/* ══ RAMADAN CARD ══ */
.ram-card {
  margin: 10px 14px 0;
  background: var(--card);
  border: 1.5px solid var(--bdr2);
  border-radius: var(--r16);
  padding: 14px 16px;
  box-shadow: 0 2px 12px var(--shd);
  position: relative; overflow: hidden;
}
.ram-card::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 80px; height: 80px;
  background: radial-gradient(circle at top right, rgba(200,155,60,0.08), transparent 70%);
}
.ram-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.ram-title {
  font-family: var(--ufont);
  font-size: 13px; font-weight: 700;
  color: var(--ink2);
  display: flex; align-items: center; gap: 7px;
}
.ram-badge {
  background: var(--navy);
  color: rgba(255,255,255,0.9);
  font-size: 9px; font-weight: 700;
  padding: 2px 9px;
  border-radius: 20px;
  font-family: var(--ufont);
}
.ram-status {
  font-family: var(--ufont);
  font-size: 15px; font-weight: 900;
  color: var(--orange);
  margin-bottom: 10px; direction: rtl;
}
.ram-bar-track {
  height: 8px;
  background: var(--bg2);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 8px;
}
.ram-bar-fill {
  height: 100%;
  border-radius: 8px;
  background: linear-gradient(90deg, #1E3A5F, #C89B3C);
}
.ram-labels {
  display: flex; justify-content: space-between;
  font-size: 10.5px; font-weight: 600;
  font-family: var(--ufont);
}
.ram-suhoor { color: var(--navy); }
.ram-iftar  { color: var(--orange); }

/* ══ QURAN CONTINUE CARD ══ */
.quran-card {
  margin: 10px 14px 0;
  background: var(--goldlt);
  border: 1.5px solid var(--bdr2);
  border-radius: var(--r16);
  padding: 15px 16px;
  box-shadow: 0 2px 12px var(--shd);
  position: relative; overflow: hidden;
  direction: rtl;
}
.qc-accent {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--gold), var(--gold2));
}
.qc-eyebrow {
  font-size: 9px; font-weight: 700;
  color: var(--gold2);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-family: var(--efont);
  margin-bottom: 7px;
}
.qc-surah-name {
  font-family: var(--qfont);
  font-size: 28px; font-weight: 700;
  color: var(--ink);
  margin-bottom: 3px;
}
.qc-meta {
  font-size: 11px; color: var(--ink3);
  margin-bottom: 13px;
  font-family: var(--ufont);
}
.qc-buttons { display: flex; gap: 8px; }
.qc-btn-primary {
  flex: 1;
  background: var(--navy);
  color: #fff; border: none;
  border-radius: var(--r12);
  padding: 11px;
  font-size: 13px; font-weight: 700;
  font-family: var(--ufont);
  cursor: pointer;
  text-align: center;
  transition: opacity 0.15s;
  letter-spacing: 0.3px;
}
.qc-btn-primary:active { opacity: 0.82; }
.qc-btn-secondary {
  background: var(--bg2);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r12);
  padding: 11px 14px;
  font-size: 13px; font-weight: 700;
  font-family: var(--ufont);
  color: var(--ink2);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s;
}
.qc-btn-secondary:active { background: var(--bg3); }

/* ══ DUA TICKER ══ */
.dua-ticker {
  margin: 10px 14px 0;
  background: var(--card);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r14);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 11px;
  cursor: pointer;
  box-shadow: 0 1px 6px var(--shd);
  transition: border-color 0.15s;
}
.dua-ticker:active { border-color: var(--gold); }
.dua-ico {
  width: 38px; height: 38px;
  border-radius: var(--r10);
  background: var(--goldbg);
  border: 1.5px solid var(--bdr2);
  display: flex; align-items: center;
  justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.dua-body { flex: 1; min-width: 0; }
.dua-eyebrow {
  font-size: 8.5px; font-weight: 700;
  color: var(--gold2);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: var(--efont);
  margin-bottom: 3px;
}
.dua-text {
  font-family: var(--qfont);
  font-size: 15px; color: var(--ink2);
  overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap;
  direction: rtl;
  line-height: 1.5;
}
.dua-arrow { font-size: 14px; color: var(--ink4); flex-shrink: 0; }

/* ══ SECTION HEADER ══ */
.section-header {
  padding: 15px 14px 8px;
  display: flex; align-items: center;
  justify-content: space-between;
}
.sh-title {
  font-size: 10px; font-weight: 700;
  color: var(--ink3);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: var(--efont);
  display: flex; align-items: center; gap: 7px;
}
.sh-title::before {
  content: '';
  width: 3px; height: 14px;
  background: linear-gradient(180deg, var(--gold), var(--gold2));
  border-radius: 2px;
  flex-shrink: 0;
}
.sh-action {
  font-size: 12px; font-weight: 700;
  color: var(--navy);
  cursor: pointer;
  font-family: var(--ufont);
}

/* ══ QUICK ACTIONS GRID ══ */
.qa-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 14px;
}
.qa-item {
  background: var(--card);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r14);
  padding: 14px 8px 12px;
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  cursor: pointer;
  transition: all 0.14s;
  box-shadow: 0 1px 5px var(--shd);
  min-height: 80px;
}
.qa-item:active { transform: scale(0.93); border-color: var(--gold); }
.qa-ico { font-size: 22px; }
.qa-label {
  font-family: var(--ufont);
  font-size: 12px; font-weight: 700;
  color: var(--ink2);
  text-align: center; line-height: 1.3;
}
.qa-count {
  font-size: 9px; color: var(--ink4);
  font-family: var(--ufont);
}

/* ══════════════════════════════════════════════════
   SURAH LIST
══════════════════════════════════════════════════ */
.list-topbar {
  flex-shrink: 0;
  background: var(--card);
  border-bottom: 1px solid var(--bdr);
  padding: 8px 12px;
  display: flex; align-items: center; gap: 8px;
}
.list-tabs { display: flex; gap: 4px; flex: 1; }
.list-tab {
  padding: 8px 16px;
  border-radius: 22px;
  font-size: 13px; font-weight: 700;
  color: var(--ink3);
  cursor: pointer;
  transition: all 0.14s;
  white-space: nowrap;
  font-family: var(--ufont);
  border: 1.5px solid transparent;
}
.list-tab.on {
  background: var(--navy);
  color: #fff;
  box-shadow: 0 2px 8px rgba(30,58,95,0.25);
}
.list-search {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg2);
  border: 1.5px solid var(--bdr);
  border-radius: 22px;
  padding: 7px 12px;
  flex: 0 0 auto; width: 130px;
  transition: border-color 0.15s;
}
.list-search:focus-within { border-color: var(--gold); }
.list-search input {
  flex: 1; border: none;
  background: transparent;
  font-size: 13px; color: var(--ink);
  outline: none; direction: rtl;
  min-width: 0; font-family: var(--ufont);
}
.list-search input::placeholder { color: var(--ink4); }

/* Surah grid */
.sg-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 10px 10px 100px;
}
.sg-card {
  background: var(--card);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r16);
  padding: 14px 13px 11px;
  cursor: pointer;
  transition: all 0.14s;
  box-shadow: 0 1px 6px var(--shd);
  position: relative; overflow: hidden;
  direction: rtl;
}
.sg-card:active { transform: scale(0.96); border-color: var(--gold); }
.sg-num {
  position: absolute; left: 8px; bottom: 6px;
  font-size: 32px; font-weight: 900;
  color: rgba(30,58,95,0.04);
  font-family: var(--efont);
  line-height: 1;
}
.dark .sg-num { color: rgba(74,122,200,0.06); }
.sg-ar {
  font-family: var(--qfont);
  font-size: 24px; font-weight: 700;
  color: var(--ink);
  direction: rtl; line-height: 1.5;
}
.sg-badge {
  display: inline-block;
  font-size: 8.5px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
  margin: 5px 0 3px;
  font-family: var(--ufont);
}
.sg-badge.mk { background: rgba(192,88,32,0.1); color: var(--orange); }
.sg-badge.md { background: rgba(26,107,68,0.1); color: var(--green); }
.sg-meta {
  font-size: 10.5px; color: var(--ink3);
  font-weight: 600; font-family: var(--ufont);
}
.sg-page {
  font-size: 9.5px; color: var(--ink5);
  margin-top: 2px; font-family: var(--ufont);
}

/* Juz list */
.juz-list { padding: 8px 10px 100px; }
.juz-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--card);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r14);
  padding: 13px 14px;
  margin-bottom: 7px;
  cursor: pointer;
  transition: all 0.14s;
  box-shadow: 0 1px 5px var(--shd);
  direction: rtl;
}
.juz-row:active { border-color: var(--gold); transform: scale(0.99); }
.juz-orb {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: #fff;
  flex-shrink: 0; font-family: var(--efont);
  box-shadow: 0 2px 8px rgba(200,155,60,0.3);
}
.juz-info { flex: 1; text-align: right; }
.juz-name {
  font-size: 15px; font-weight: 700;
  color: var(--ink); font-family: var(--ufont);
}
.juz-sub {
  font-family: var(--qfont);
  font-size: 15px; color: var(--ink3); margin-top: 2px;
}
.juz-arrow { font-size: 16px; color: var(--ink4); flex-shrink: 0; }

/* ══════════════════════════════════════════════════
   READER (MUSHAF)
══════════════════════════════════════════════════ */
.reader-shell {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden; min-height: 0;
}

/* Reader sub-nav */
.reader-nav {
  flex-shrink: 0;
  background: var(--card);
  border-bottom: 1px solid var(--bdr);
  padding: 6px 10px;
  display: flex; align-items: center; gap: 5px;
  overflow-x: auto;
}
.reader-nav::-webkit-scrollbar { height: 0; }

/* Chip component */
.chip {
  flex-shrink: 0;
  padding: 5px 13px;
  border-radius: 22px;
  font-size: 11.5px; font-weight: 700;
  background: var(--bg2);
  border: 1.5px solid var(--bdr);
  color: var(--ink2);
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--ufont);
  transition: all 0.13s;
}
.chip.gold {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #fff; border-color: transparent;
  box-shadow: 0 2px 8px rgba(200,155,60,0.25);
}
.chip.navy {
  background: var(--navy);
  color: #fff; border-color: transparent;
  box-shadow: 0 2px 8px rgba(30,58,95,0.2);
}

/* Sheikh strip */
.sheikh-strip {
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--bdr);
  padding: 5px 10px;
  display: flex; align-items: center; gap: 6px;
  overflow-x: auto;
}
.sheikh-strip::-webkit-scrollbar { height: 0; }
.sheikh-label {
  font-size: 10px; color: var(--ink4);
  font-weight: 700; font-family: var(--ufont);
  flex-shrink: 0;
}
.sheikh-btn {
  flex-shrink: 0;
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 11px; font-weight: 700;
  background: var(--card);
  border: 1.5px solid var(--bdr);
  color: var(--ink3);
  cursor: pointer; font-family: var(--ufont);
  transition: all 0.13s;
}
.sheikh-btn.on {
  background: var(--gold);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 1px 6px rgba(200,155,60,0.3);
}

/* Reader toolbar */
.reader-toolbar {
  flex-shrink: 0;
  background: var(--card);
  border-bottom: 1px solid var(--bdr);
  padding: 6px 10px;
  display: flex; align-items: center; gap: 5px;
}
.rtbtn {
  height: 38px;
  border-radius: var(--r8);
  display: flex; align-items: center; justify-content: center;
  background: var(--bg2);
  border: 1.5px solid var(--bdr);
  cursor: pointer; font-size: 13px;
  font-family: var(--ufont); font-weight: 700;
  color: var(--ink2);
  padding: 0 9px;
  gap: 4px; flex-shrink: 0;
  transition: all 0.12s;
  white-space: nowrap;
}
.rtbtn:active { transform: scale(0.88); }
.rtbtn.on {
  background: var(--navy);
  color: #fff; border-color: transparent;
}
.rtbtn.play {
  background: var(--green); color: #fff;
  border-color: transparent;
  box-shadow: 0 2px 8px rgba(26,107,68,0.25);
}
.rtbtn-sep {
  width: 1px; height: 22px;
  background: var(--bdr); flex-shrink: 0;
}
.font-ctrl { display: flex; align-items: center; gap: 4px; margin-right: auto; }
.fc-btn {
  width: 30px; height: 30px;
  border-radius: var(--r6);
  border: 1.5px solid var(--bdr);
  background: var(--bg2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900;
  color: var(--ink2); font-family: var(--efont);
  transition: all 0.12s;
}
.fc-btn:active { background: var(--navy); color: #fff; border-color: transparent; }
.fc-val {
  font-size: 11px; color: var(--ink3);
  min-width: 22px; text-align: center;
  font-weight: 700; font-family: var(--efont);
}

/* ══ MUSHAF PAGE ══ */
.mushaf-page {
  flex: 1; overflow-y: auto;
  background: var(--paper);
}
.mushaf-page::-webkit-scrollbar { width: 2px; }
.mushaf-page::-webkit-scrollbar-thumb { background: var(--bdr); }

/* Surah header — like a real Mushaf */
.surah-header {
  background: var(--card);
  border-bottom: 2px solid var(--bdr2);
  padding: 24px 20px 20px;
  text-align: center;
  position: relative; overflow: hidden;
}
.surah-header-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 90% 50% at 50% 0%,
    rgba(200,155,60,0.1), transparent 65%);
  pointer-events: none;
}
/* Decorative top line */
.surah-header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
}
/* Diamond ornament */
.surah-ornament {
  font-size: 22px; color: var(--gold2);
  margin-bottom: 6px; opacity: 0.5;
  letter-spacing: 6px;
}
.surah-ar-name {
  font-family: var(--qfont);
  font-size: 52px; font-weight: 700;
  color: var(--ink);
  direction: rtl; line-height: 1.3;
  position: relative; z-index: 1;
}
.surah-en-name {
  font-size: 10px; color: var(--ink4);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
  font-family: var(--efont);
  position: relative; z-index: 1;
}
.surah-pills {
  display: flex; align-items: center;
  justify-content: center;
  gap: 5px; margin-top: 12px;
  flex-wrap: wrap;
  position: relative; z-index: 1;
}
.spill {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: 20px;
  padding: 3px 11px;
  font-size: 10px; color: var(--ink3);
  font-weight: 600; font-family: var(--ufont);
}
.spill.gold-pill {
  background: var(--goldbg);
  border-color: var(--bdr2);
  color: var(--gold2);
}
.spill.makki { background: rgba(192,88,32,0.08); color: var(--orange); border-color: rgba(192,88,32,0.18); }
.spill.madani { background: rgba(26,107,68,0.08); color: var(--green); border-color: rgba(26,107,68,0.18); }

/* BISMILLAH BLOCK — authentic Mushaf style */
.bismillah-block {
  margin: 18px 16px 6px;
  padding: 16px 20px;
  background: var(--goldlt);
  border: 1px solid var(--bdr2);
  border-radius: var(--r16);
  text-align: center;
  position: relative;
}
.bismillah-block::before,
.bismillah-block::after {
  content: '';
  position: absolute;
  left: 18%; right: 18%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold2), transparent);
}
.bismillah-block::before { top: 0; }
.bismillah-block::after  { bottom: 0; }
/* Diamond markers */
.bismillah-block .corner {
  position: absolute; font-size: 10px;
  color: var(--gold2); opacity: 0.4;
}
.bismillah-block .corner.tl { top: 5px; right: 10px; }
.bismillah-block .corner.tr { top: 5px; left: 10px; }
.bismillah-block .corner.bl { bottom: 5px; right: 10px; }
.bismillah-block .corner.br { bottom: 5px; left: 10px; }
.bism-text {
  font-family: var(--qfont);
  font-size: 28px; font-weight: 700;
  color: var(--ink2);
  direction: rtl; line-height: 2.2;
}

/* AYAH BODY — Mushaf continuous text style */
.ayah-body {
  padding: 12px 18px 24px;
  direction: rtl;
  font-family: var(--qfont);
  color: var(--ink);
  line-height: 3;
  text-align: justify;
  word-spacing: 2px;
}
.ayah-span {
  display: inline;
  cursor: pointer;
  border-radius: 4px;
  padding: 1px 2px;
  transition: background 0.1s;
}
.ayah-span.selected { background: rgba(200,155,60,0.2); }
.ayah-span.playing  { background: rgba(26,107,68,0.12); }

/* Ayah number medallion */
.ayah-num {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50%;
  margin: 0 3px;
  vertical-align: middle;
  cursor: pointer;
  font-size: 10px; font-weight: 900;
  color: #fff;
  font-family: var(--efont);
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  box-shadow: 0 1px 5px rgba(200,155,60,0.35);
  transition: transform 0.12s, box-shadow 0.12s;
}
.ayah-num:active { transform: scale(0.78); }
.ayah-num.is-playing {
  background: linear-gradient(135deg, var(--green), var(--green2));
  box-shadow: 0 0 0 3px rgba(26,107,68,0.15);
  animation: pulse-green 1.4s ease-in-out infinite;
}
@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 0 3px rgba(26,107,68,0.1); }
  50%       { box-shadow: 0 0 0 7px rgba(26,107,68,0.22); }
}

/* Next surah card */
.next-surah {
  margin: 6px 14px 18px;
  padding: 14px 15px;
  background: var(--card);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r16);
  display: flex; align-items: center; gap: 11px;
  cursor: pointer;
  transition: all 0.14s;
  box-shadow: 0 1px 8px var(--shd);
}
.next-surah:active { border-color: var(--gold); }
.ns-info { flex: 1; text-align: right; }
.ns-label {
  font-size: 8.5px; color: var(--navy);
  font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; font-family: var(--efont);
}
.ns-ar {
  font-family: var(--qfont);
  font-size: 26px; color: var(--ink);
  font-weight: 700; margin-top: 2px;
}
.ns-meta { font-size: 10px; color: var(--ink4); font-family: var(--efont); }

/* Translation panel */
.trans-panel {
  flex-shrink: 0;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s cubic-bezier(.4,0,.2,1);
  background: var(--bg2);
  border-top: 2px solid var(--navy);
}
.trans-panel.open { max-height: 42vh; }
.trans-inner {
  overflow-y: auto;
  max-height: 42vh;
}
.trans-inner::-webkit-scrollbar { width: 2px; }
.trans-header {
  position: sticky; top: 0; z-index: 2;
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 7px 13px;
  background: rgba(247,243,234,0.97);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid var(--bdr);
}
.dark .trans-header { background: rgba(10,9,6,0.97); }
.trans-title {
  font-size: 10px; font-weight: 700;
  color: var(--navy);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-family: var(--efont);
}
.trans-close {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--bg2); border: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; cursor: pointer; color: var(--ink3);
}
.trans-verse {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(200,155,60,0.08);
}
.trans-v-num {
  display: inline-block;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #fff;
  font-size: 8.5px; font-weight: 700;
  padding: 2px 8px; border-radius: 9px;
  margin-bottom: 5px; font-family: var(--efont);
}
.trans-v-ar {
  font-family: var(--qfont);
  font-size: 17px; color: var(--ink2);
  direction: rtl; text-align: right;
  line-height: 2.1; margin-bottom: 6px;
}
.trans-v-en {
  font-size: 12px; color: var(--ink3);
  line-height: 1.7;
  border-right: 2px solid rgba(26,107,68,0.18);
  padding-right: 9px;
  text-align: right;
  font-family: var(--efont);
}

/* Audio player bar */
.audio-bar {
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--green), var(--green2));
  padding: 10px 14px;
  display: flex; align-items: center; gap: 11px;
  box-shadow: 0 -3px 20px rgba(26,107,68,0.2);
}
.audio-play-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: 2px solid rgba(255,255,255,0.28);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer; color: #fff;
  flex-shrink: 0; transition: all 0.12s;
}
.audio-play-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.9); }
.audio-info { flex: 1; min-width: 0; }
.audio-title {
  font-size: 12px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; font-family: var(--ufont);
}
.audio-sub {
  font-size: 9px; color: rgba(255,255,255,0.55);
  font-family: var(--efont); margin-top: 1px;
}
.audio-progress {
  height: 3px; background: rgba(255,255,255,0.2);
  border-radius: 3px; margin-top: 6px; overflow: hidden;
}
.audio-fill {
  height: 100%; background: #fff;
  border-radius: 3px; transition: width 0.3s;
}
.audio-stop {
  font-size: 22px; cursor: pointer;
  color: rgba(255,255,255,0.65);
  flex-shrink: 0; transition: color 0.12s;
}
.audio-stop:active { color: #fff; }

/* ══════════════════════════════════════════════════
   ATHKAR
══════════════════════════════════════════════════ */
.athkar-home { padding: 10px 12px 100px; }
.athkar-label {
  font-family: var(--ufont);
  font-size: 12px; font-weight: 700;
  color: var(--ink3);
  padding: 8px 2px 7px;
}
.ath-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.ath-card {
  background: var(--card);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r16);
  padding: 16px 14px 13px;
  cursor: pointer; transition: all 0.14s;
  box-shadow: 0 1px 7px var(--shd);
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  position: relative; overflow: hidden;
  text-align: center; min-height: 96px;
}
.ath-card:active { transform: scale(0.94); }
.ath-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; border-radius: 0 0 14px 14px;
}
.ath-ico { font-size: 26px; }
.ath-title {
  font-family: var(--ufont);
  font-size: 13.5px; font-weight: 700;
  line-height: 1.3;
}
.ath-count { font-size: 10px; color: var(--ink4); font-family: var(--ufont); }
/* Colors */
.ath-morning { border-color: rgba(184,112,16,0.22); }
.ath-morning .ath-title { color: #a06010; }
.ath-morning .ath-bar { background: linear-gradient(90deg, #e09820, #f8c040); }
.ath-evening { border-color: rgba(30,58,95,0.22); }
.ath-evening .ath-title { color: var(--navy); }
.ath-evening .ath-bar { background: linear-gradient(90deg, var(--navy), var(--navy2)); }
.ath-sleep   { border-color: rgba(80,64,160,0.22); }
.ath-sleep   .ath-title { color: #5040a0; }
.ath-sleep   .ath-bar { background: linear-gradient(90deg, #5040a0, #8060d0); }
.ath-prayer  { border-color: rgba(26,107,68,0.22); }
.ath-prayer  .ath-title { color: var(--green); }
.ath-prayer  .ath-bar { background: linear-gradient(90deg, var(--green), var(--green2)); }
.ath-quran   { border-color: var(--bdr2); }
.ath-quran   .ath-title { color: var(--gold2); }
.ath-quran   .ath-bar { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
.ath-ramadan { border-color: rgba(112,48,160,0.22); }
.ath-ramadan .ath-title { color: #7030a0; }
.ath-ramadan .ath-bar { background: linear-gradient(90deg, #5a1080, #9040c0); }

/* Athkar audio bar */
.ath-audio-strip {
  flex-shrink: 0;
  background: var(--goldlt);
  border-bottom: 1.5px solid var(--bdr2);
  padding: 7px 12px;
  display: flex; align-items: center; gap: 7px;
}
.aas-label {
  font-size: 10px; font-weight: 700;
  color: var(--gold2);
  font-family: var(--efont);
  flex-shrink: 0;
  letter-spacing: 1px;
}
.aas-sheikhs {
  display: flex; gap: 4px; flex: 1;
  overflow-x: auto;
}
.aas-sheikhs::-webkit-scrollbar { height: 0; }
.aas-btn {
  flex-shrink: 0; padding: 4px 12px;
  border-radius: 16px;
  font-size: 10.5px; font-weight: 700;
  background: var(--bg2);
  border: 1.5px solid var(--bdr);
  color: var(--ink3); cursor: pointer;
  font-family: var(--ufont); transition: all 0.13s;
}
.aas-btn.on {
  background: var(--gold); color: #fff;
  border-color: transparent;
}
.aas-play-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--gold);
  display: flex; align-items: center;
  justify-content: center;
  font-size: 13px; cursor: pointer;
  color: #fff; flex-shrink: 0;
  transition: all 0.12s;
  box-shadow: 0 2px 8px rgba(200,155,60,0.3);
}
.aas-play-btn:active { transform: scale(0.86); }

/* Progress header */
.ath-progress-header {
  flex-shrink: 0;
  background: var(--card);
  border-bottom: 1px solid var(--bdr);
  padding: 9px 14px;
  display: flex; align-items: center; gap: 10px;
}
.ath-prog-bar {
  flex: 1; height: 5px;
  background: var(--bg2);
  border-radius: 5px; overflow: hidden;
}
.ath-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius: 5px; transition: width 0.3s;
}
.ath-prog-text {
  font-size: 11px; font-weight: 700;
  color: var(--ink3); font-family: var(--efont); flex-shrink: 0;
}

/* Zikr card */
.ath-reader-shell {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden; min-height: 0;
}
.ath-scroll {
  flex: 1; overflow-y: auto;
  padding: 10px 12px 20px;
}
.ath-scroll::-webkit-scrollbar { width: 2px; }
.zikr-card {
  background: var(--card);
  border: 1.5px solid var(--bdr);
  border-radius: var(--r20);
  padding: 17px 18px 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 8px var(--shd);
  position: relative; overflow: hidden;
  direction: rtl;
}
.zikr-stripe {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 4px; border-radius: 20px 0 0 20px;
}
.zikr-idx {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--bg2);
  border: 1px solid var(--bdr);
  font-size: 11px; font-weight: 700;
  color: var(--ink3); font-family: var(--efont);
  margin-bottom: 10px;
}
.zikr-ar {
  font-family: var(--qfont); font-weight: 700;
  color: var(--ink); direction: rtl;
  text-align: right; line-height: 2.3; margin-bottom: 8px;
}
.zikr-tr {
  font-size: 12.5px; color: var(--ink3);
  direction: rtl; text-align: right;
  line-height: 1.7; margin-bottom: 6px;
  font-family: var(--ufont);
}
.zikr-src {
  font-size: 10px; color: var(--ink4);
  direction: rtl; text-align: right;
  margin-bottom: 11px; font-family: var(--ufont);
  font-style: italic;
}
.zikr-footer {
  display: flex; align-items: center;
  justify-content: space-between; gap: 8px;
}
.zikr-rep {
  background: var(--goldlt);
  border: 1px solid var(--bdr2);
  border-radius: 20px; padding: 4px 13px;
  font-size: 11px; font-weight: 700;
  color: var(--gold2); font-family: var(--ufont);
}
.zikr-counter-wrap {
  display: flex; align-items: center; gap: 8px;
}
.zikr-count-lbl {
  font-size: 12px; font-weight: 700;
  color: var(--ink3); font-family: var(--efont);
  direction: ltr;
}
.zikr-btn {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; cursor: pointer;
  color: #fff; font-family: var(--efont);
  transition: transform 0.1s;
}

/* ── Countdown hook ── */
function useCountdown(target){
  const [cd, setCd] = useState("--:--:--");
  useEffect(()=>{
    if(!target) return;
    const tick = () => {
      const now = new Date();
      const [h,m] = target.split(":").map(Number);
      const tgt = new Date(now);
      tgt.setHours(h,m,0,0);
      if(tgt < now) tgt.setDate(tgt.getDate()+1);
      const d = Math.max(0, tgt - now);
      const hh = String(Math.floor(d/3600000)).padStart(2,"0");
      const mm = String(Math.floor((d%3600000)/60000)).padStart(2,"0");
      const ss = String(Math.floor((d%60000)/1000)).padStart(2,"0");
      setCd(`${hh}:${mm}:${ss}`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [target]);
  return cd;
}

/* ── RamadanHomeCard ── */
function RamadanHomeCard({pt, L}){
  const fp = pt.Fajr.split(":").map(Number);
  const mp = pt.Maghrib.split(":").map(Number);
  const now = new Date();
  const nm = now.getHours()*60 + now.getMinutes();
  const sm = fp[0]*60+fp[1]; const em = mp[0]*60+mp[1];
  const pct = Math.max(0, Math.min(100, ((nm-sm)/(em-sm))*100));
  const isFasting = nm>=sm && nm<em;
  const afterIftar = nm>=em;
  const remMins = isFasting ? em-nm : 0;
  const rH=Math.floor(remMins/60); const rM=remMins%60;
  const toFajr = nm<sm ? sm-nm : (24*60-nm+sm);
  const tFH=Math.floor(toFajr/60); const tFM=toFajr%60;
  const status = afterIftar
    ? L("🎉 حان وقت الإفطار","🎉 Iftar time!")
    : isFasting
    ? L(`🌙 متبقي على الإفطار: ${rH} ساعة و ${rM} دقيقة`,`🌙 ${rH}h ${rM}m to Iftar`)
    : L(`🌅 متبقي على الإمساك: ${tFH} ساعة و ${tFM} دقيقة`,`🌅 ${tFH}h ${tFM}m to Suhoor`);
  return(
    <div className="ram-card">
      <div className="ram-header">
        <div className="ram-title">🌙 {L("رمضان المبارك","Blessed Ramadan")}</div>
        <div className="ram-badge">١٤٤٧ هـ</div>
      </div>
      <div className="ram-status">{status}</div>
      <div className="ram-bar-track"><div className="ram-bar-fill" style={{width:pct+"%"}}/></div>
      <div className="ram-labels">
        <span className="ram-suhoor">🌅 {L("الإمساك","Suhoor")} {pt.Fajr}</span>
        <span className="ram-iftar">🌇 {L("الإفطار","Iftar")} {pt.Maghrib}</span>
      </div>
    </div>
  );
}

  const colMap = {morning:"#a06010",evening:"#1E3A5F",sleep:"#5040a0",prayer:"#1A6B44",quran:"#a07828",ramadan:"#7030a0"};
  const col = colMap[cat]||"#a07828";
  const done = items.filter((_,i)=>{const c=counts[cat+"-"+i]||0;return c>0;}).length;
  return(
    <div className="ath-reader-shell">
      <div className="ath-progress-header">
        <div className="ath-prog-bar"><div className="ath-prog-fill" style={{width:(done/items.length*100)+"%"}}/></div>
        <div className="ath-prog-text">{done}/{items.length}</div>

      <div className="ath-scroll">
        {items.map((z,i)=>{
          const cnt = counts[cat+"-"+i]||0;

/* ── stripBismillah: removes bismillah from start of verse text ──
   The alquran.cloud API always includes bismillah at the start of verse 1
   for every surah. Since we render it separately as a decorative block,
   we strip it here. We use a robust approach that handles all diacritic variants:
   strip everything up to and including the last word that looks like رحيم.
   ── */
function stripBismillah(text) {
  if (!text) return text;
  // The bismillah is always the opening ~4 words ending in a form of الرحيم
  // We detect it by looking for بسم as the first non-space word (bare or fully diacritised)
  // and strip everything up to and including the next occurrence of رحيم + diacritics
  const bare = text.replace(/[ً-ٰٟ]/g, ""); // strip all harakat
  // Does this text start with بسم or بِسْمِ?
  const startsWithBism = /^\s*بسم/.test(bare);
  if (!startsWithBism) return text;
  // Find index of رحيم (bare) in the original text and strip up to that point + the word
  // Approach: find last harakat-stripped رحيم within first 80 chars, then cut after it
  let cutIdx = -1;
  // Walk through text finding رحيم (possibly with diacritics between letters)
  // Build a regex that matches ر + any diacritics + ح + diacritics + ي + diacritics + م + diacritics + any final diacritics + whitespace?
  const rahimRx = /ر[ً-ٰٟ]*ح[ً-ٰٟ]*ي[ً-ٰٟ]*م[ً-ٰٟ]*/;
  const m = text.match(rahimRx);
  if (m && m.index < 80) {
    cutIdx = m.index + m[0].length;
    // Also skip any trailing whitespace/diacritics after الرحيم
    while (cutIdx < text.length && (text[cutIdx] === " " || text[cutIdx] === " " || (text.charCodeAt(cutIdx) >= 0x064B && text.charCodeAt(cutIdx) <= 0x065F))) {
      cutIdx++;
    }
  }
  if (cutIdx > 0) return text.slice(cutIdx).trim();
  // Fallback: try common plain-text variants
  return text
    .replace(/^بسم الله الرحمن الرحيم\s*/u, "")
    .trim();
}

  /* Dark mode */
  useEffect(()=>{document.documentElement.className=dark?"dark":"";},[dark]);

  /* Prayer times */
  useEffect(()=>{
    fetch("https://api.aladhan.com/v1/timingsByCity?city=Dubai&country=AE&method=8")
      .then(r=>r.json()).then(d=>{
        const t=d.data?.timings;
        if(!t) throw new Error();
        setPt(t);
        const nm=new Date().getHours()*60+new Date().getMinutes();
        let f=null;
        for(const p of PRAYERS){const pp=t[p].split(":").map(Number);if(pp[0]*60+pp[1]>nm){f=p;break;}}
        setNextP(f||"Fajr");
      })
      .catch(()=>{setPt({Fajr:"05:22",Sunrise:"06:35",Dhuhr:"12:33",Asr:"15:53",Maghrib:"18:26",Isha:"19:39"});setNextP("Asr");});
  },[]);

  const msg = (t)=>{setToast(t);setTimeout(()=>setToast(null),2400);};

  /* Day progress for hero */
  const dayPct = (()=>{
    if(!pt||!nextP) return 0;
    const nm=new Date().getHours()*60+new Date().getMinutes();
    const idx=PRAYERS.indexOf(nextP);
    const prev=pt[idx>0?PRAYERS[idx-1]:"Isha"].split(":").map(Number);
    const next=pt[nextP].split(":").map(Number);
    const s=prev[0]*60+prev[1]; const e=next[0]*60+next[1];
    const el=e>s?(nm-s)/(e-s)*100:(nm<e?(24*60+nm-s)/(24*60+e-s)*100:100);
    return Math.max(0,Math.min(100,el));
  })();

  const getJuz=(sn)=>{let j=1;for(const jz of JUZ){if(jz.s<=sn)j=jz.j;else break;}return j;};

  /* Open surah */
  const openSurah = async(s)=>{
    setSurah(s);setTab("reader");setVerses([]);setTrans([]);
    setLoading(true);stopAudio();setSelV(null);
    setLastRead({n:s.n,arShort:s.arShort,en:s.en,ayah:1});
    if(pageRef.current) pageRef.current.scrollTop=0;
    try{
      const [aRes,eRes] = await Promise.all([
        fetch(`${API}/surah/${s.n}`).then(r=>r.json()),
        fetch(`${API}/surah/${s.n}/en.sahih`).then(r=>r.json()),
      ]);
      const ayahs = aRes.data?.ayahs||[];
      const engs  = eRes.data?.ayahs||[];
      if(s.n!==1 && s.n!==9 && ayahs.length>0){
        ayahs[0] = {...ayahs[0], text: stripBismillah(ayahs[0].text)};
      }
      setVerses(ayahs);setTrans(engs);
    }catch(e){msg(L("فشل التحميل","Load failed"));}
    setLoading(false);
  };

  /* Audio */
  const stopAudio = ()=>{
    if(aud.current){aud.current.pause();aud.current.src="";aud.current=null;}
    if(ntimer.current)clearTimeout(ntimer.current);
    setPlaying(false);setPlayV(null);setProg(0);
  };
  const stopAthAud = ()=>{
    if(athAud){try{athAud.pause();athAud.src="";}catch(e){}}
    setAthAud(null);setAthPlayCat(null);
  };
  const playAyah = (num,globalNum,allV)=>{
    stopAudio();
    const a = new Audio(SHEIKHS[shIdx].url+"/"+globalNum+".mp3");
    aud.current = a;
    a.ontimeupdate = ()=>{if(a.duration)setProg(a.currentTime/a.duration*100);};
    a.onended = ()=>{
      setProg(0);setPlaying(false);
      const arr=allV||verses;const idx=arr.findIndex(v=>v.numberInSurah===num);
      if(idx<arr.length-1){const nv=arr[idx+1];ntimer.current=setTimeout(()=>playAyah(nv.numberInSurah,nv.number,arr),300);}
      else setPlayV(null);
    };
    a.onerror=()=>msg(L("الصوت غير متاح","Audio unavailable"));
    a.play().then(()=>{setPlayV(num);setPlaying(true);}).catch(()=>msg(L("الصوت غير متاح","Audio unavailable")));
    if(autoScroll)setTimeout(()=>{const el=ayRefs.current[num];if(el&&pageRef.current)el.scrollIntoView({behavior:"smooth",block:"center"});},200);
  };
  const togglePlay = ()=>{
    if(!aud.current)return;
    if(playing){aud.current.pause();setPlaying(false);}
    else{aud.current.play();setPlaying(true);}
  };

  const toggleBM = (v,s)=>{
    const id=`${s.n}:${v.numberInSurah}`;
    setBms(prev=>{
      const has=prev.find(b=>b.id===id);
      if(has){msg(L("تمت الإزالة","Removed"));return prev.filter(b=>b.id!==id);}
      msg(L("تم الحفظ 🔖","Bookmarked 🔖"));
      return[...prev,{id,sn:s.n,sen:s.en,sar:s.arShort,vn:v.numberInSurah}];
    });
  };
  const share = (v,s)=>{
    const en=trans[v.numberInSurah-1]?.text||"";
    const txt=`${v.text}\n\n"${en}"\n\n— ${s.arShort} (${s.n}:${v.numberInSurah})`;
    if(navigator.share)navigator.share({title:"القرآن الكريم",text:txt}).catch(()=>{});
    else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>msg(L("تم النسخ","Copied"))).catch(()=>{});
  };

  const incrZ = (cat,i)=>{
    const k=`${cat}-${i}`;
    setZCounts(prev=>{
      const c=(prev[k]||0)+1;const mx=ATHKAR[cat][i].rep;
      if(c>=mx)msg(L("✅ اكتمل","✅ Done!"));
      return{...prev,[k]:c>=mx?c:c};
    });
  };

  const setupReminders = ()=>{
    if(!("Notification" in window))return msg(L("المتصفح لا يدعم التنبيهات","Unsupported"));
    Notification.requestPermission().then(p=>{
      msg(p==="granted"?L("✅ تم تفعيل التنبيهات","✅ Notifications enabled"):L("⚠️ يرجى السماح بالإشعارات","⚠️ Please allow notifications"));
    });
  };

  const fil = SURAHS.filter(s=>
    s.arShort.includes(q)||s.en.toLowerCase().includes(q.toLowerCase())||String(s.n).includes(q)
  );
  const nextS = surah && surah.n<114 ? SURAHS[surah.n] : null;
  const hijri = new Date().toLocaleDateString("ar-SA-u-ca-islamic",{day:"numeric",month:"long",year:"numeric"});
  const wdAr  = new Date().toLocaleDateString("ar-SA",{weekday:"long"});

  const NAV = [
    {id:"home",     ico:"🏠",ar:"الرئيسية",en:"Home"},
    {id:"surahlist",ico:"📖",ar:"المصحف",  en:"Quran"},
    {id:"athkar",   ico:"🤲",ar:"الأذكار",  en:"Athkar"},
    {id:"prayer",   ico:"🕌",ar:"الصلاة",   en:"Prayer"},
    {id:"settings", ico:"⚙️",ar:"الإعدادات",en:"Settings"},
  ];

  const pageTitle = ()=>{
    if(tab==="reader"&&surah)return surah.arShort;
    if(tab==="prayer")  return L("أوقات الصلاة","Prayer Times");
    if(tab==="bookmarks")return L("المحفوظات","Bookmarks");
    if(tab==="surahlist")return L("المصحف الشريف","The Holy Quran");
    if(tab==="athkar"&&athCat)return(ATHKAR_CATS.find(x=>x.id===athCat)||{ar:""}).ar;
    if(tab==="athkar")  return L("الأذكار","Athkar");
    if(tab==="ramadan") return L("رمضان المبارك","Ramadan");
    if(tab==="settings")return L("الإعدادات","Settings");
    return "القرآن الكريم";
  };

  const goBack = ()=>{
    if(tab==="reader"){stopAudio();setTab("surahlist");}
    else if(tab==="athkar"&&athCat)setAthCat(null);
  };
  const showBack = tab==="reader" || (tab==="athkar"&&athCat);
  const curDua = ROTATING_DUAS[duaIdx];

  return(
    <div className="app">

      {/* ── TOP BAR ── */}
      <div className="topbar">
        <div className="tb-group">
          {showBack
            ? <div className="tb-btn navy" onClick={goBack}>←</div>
            : <div className="tb-btn accent" onClick={()=>setTab("bookmarks")}>🔖</div>
          }
        </div>
        <div className="tb-center">
          <div className="tb-title">{pageTitle()}</div>
          {tab==="home" && <div className="tb-sub">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>}
          {tab==="reader"&&surah && <div style={{fontSize:9,color:"var(--ink4)",fontFamily:"var(--efont)",letterSpacing:2,textTransform:"uppercase",marginTop:1}}>{surah.en}</div>}
        </div>
        <div className="tb-group">
          {(tab==="home"||tab==="settings") && <div className="tb-btn" onClick={()=>setDark(d=>!d)}>{dark?"☀️":"🌙"}</div>}
          {tab==="reader"&&surah && <div className={"tb-btn"+(showT?" accent":"")} onClick={()=>setShowT(s=>!s)}>🌐</div>}
          {tab==="surahlist" && <div className="tb-btn" onClick={()=>document.getElementById("main-search")?.focus()}>🔍</div>}
        </div>
      </div>

      {/* ══════ HOME ══════ */}
      {tab==="home" && (
        <div className="scroll su" style={{paddingBottom:16}}>

          {/* Next Prayer Hero */}
          {pt&&nextP ? (
            <div className="prayer-hero">
              <div className="ph-arch"/>
              <div className="ph-stars"/>
              <div className="ph-grid"/>
              <div className="ph-location">
                <div className="ph-loc-dot"/>
                دبي، الإمارات
              </div>
              <div className="ph-top">
                <div>
                  <div className="ph-label">{L("الوقت المتبقي لصلاة","NEXT PRAYER")}</div>
                  <div className="ph-prayer-name">{L(PNAMES_AR[nextP],PNAMES_EN[nextP])}</div>
                </div>
                <div className="ph-icon-wrap">{PICO[nextP]}</div>
              </div>
              <div className="ph-countdown" dir="ltr">{cd}</div>
              <div className="ph-prog-wrap">
                <div className="ph-prog-track"><div className="ph-prog-fill" style={{width:dayPct+"%"}}/></div>
              </div>
              <div className="ph-hijri">{hijri}</div>
            </div>
          ) : (
            <div className="prayer-hero" style={{minHeight:160}}>
              <div className="ph-stars"/>
              <div className="ph-location"><div className="ph-loc-dot"/>دبي، الإمارات</div>
              <div className="ph-prayer-name" style={{opacity:0.35,fontSize:16}}>{L("جاري تحميل المواقيت...","Loading...")}</div>
              <div className="ph-countdown" dir="ltr" style={{opacity:0.2}}>--:--:--</div>
            </div>
          )}

          {/* Prayer strip */}
          <div className="pt-strip">
            {pt&&PRAYERS.map(p=>(
              <div key={p} className={"pt-card"+(nextP===p?" active":"")} onClick={()=>setTab("prayer")}>
                <div className="pt-name">{L(PNAMES_AR[p],PNAMES_EN[p])}</div>
                <div className="pt-time" dir="ltr">{pt[p]?pt[p].slice(0,5):"--"}</div>
              </div>
            ))}
          </div>

          {/* Ramadan card */}
          {pt && <RamadanHomeCard pt={pt} L={L}/>}

          {/* Last Read */}
          <div className="quran-card">
            <div className="qc-accent"/>
            <div className="qc-eyebrow">📖 {L("آخر قراءة","LAST READ")}</div>
            <div className="qc-surah-name">{lastRead?lastRead.arShort:L("الفاتحة","Al-Fatiha")}</div>
            <div className="qc-meta">{lastRead?L(`آية ${lastRead.ayah} · ${lastRead.en}`,`Ayah ${lastRead.ayah} · ${lastRead.en}`):L("سورة ١ · الصفحة ١","Surah 1 · Page 1")}</div>
            <div className="qc-buttons">
              <button className="qc-btn-primary" onClick={()=>openSurah(lastRead?SURAHS[lastRead.n-1]:SURAHS[0])}>{L("متابعة القراءة ←","Continue →")}</button>
              <button className="qc-btn-secondary" onClick={()=>setTab("surahlist")}>{L("الفهرس","Index")}</button>
            </div>
          </div>

          {/* Dua ticker */}
          <div className="dua-ticker" onClick={()=>setTab("athkar")}>
            <div className="dua-ico">🤲</div>
            <div className="dua-body">
              <div className="dua-eyebrow">DUA · دعاء اليوم</div>
              <div className="dua-text">{curDua.ar}</div>
            </div>
            <div className="dua-arrow">←</div>
          </div>

          {/* Quick actions */}
          <div className="section-header">
            <div className="sh-title">QUICK ACTIONS</div>
            <div className="sh-action" onClick={()=>setTab("athkar")}>{L("الكل ←","All →")}</div>
          </div>
          <div className="qa-grid">
            {[
              {ico:"🌅",ar:"أذكار الصباح",en:"Morning",  fn:()=>{setAthCat("morning");setTab("athkar");},c:ATHKAR.morning.length},
              {ico:"🌙",ar:"أذكار المساء",en:"Evening",  fn:()=>{setAthCat("evening");setTab("athkar");},c:ATHKAR.evening.length},
              {ico:"😴",ar:"أذكار النوم", en:"Sleep",    fn:()=>{setAthCat("sleep");  setTab("athkar");},c:ATHKAR.sleep.length},
              {ico:"🤲",ar:"أذكار الصلاة",en:"Prayer",   fn:()=>{setAthCat("prayer"); setTab("athkar");},c:ATHKAR.prayer.length},
              {ico:"☪️",ar:"أدعية رمضان",en:"Ramadan",   fn:()=>{setAthCat("ramadan");setTab("athkar");},c:ATHKAR.ramadan.length},
              {ico:"📿",ar:"رمضان المبارك",en:"Ramadan",  fn:()=>setTab("ramadan"),    c:null},
            ].map((a,i)=>(
              <div key={i} className="qa-item" onClick={a.fn}>
                <div className="qa-ico">{a.ico}</div>
                <div className="qa-label">{L(a.ar,a.en)}</div>
                {a.c&&<div className="qa-count">{a.c} {L("ذكر","adhkar")}</div>}
              </div>
            ))}
          </div>
          <div style={{height:8}}/>
        </div>
      )}

      {/* ══════ SURAH LIST ══════ */}
      {tab==="surahlist" && (
        <React.Fragment>
          <div className="list-topbar">
            <div className="list-tabs">
              <div className={"list-tab"+(stab==="surahs"?" on":"")} onClick={()=>setStab("surahs")}>{L("السور","Surahs")}</div>
              <div className={"list-tab"+(stab==="juz"?" on":"")}    onClick={()=>setStab("juz")}>{L("الأجزاء","Juz")}</div>
            </div>
            <div className="list-search">
              <span style={{fontSize:12,color:"var(--ink4)"}}>🔍</span>
              <input id="main-search" placeholder={L("بحث...","Search...")} value={q} onChange={e=>setQ(e.target.value)}/>
            </div>
          </div>
          <div className="scroll su">
            {stab==="surahs" && (
              <div className="sg-grid">
                {fil.map(s=>(
                  <div key={s.n} className="sg-card" onClick={()=>openSurah(s)}>
                    <div className="sg-num">{s.n}</div>
                    <div className="sg-ar">{s.ar}</div>
                    <div className={"sg-badge "+(s.tar==="مكية"?"mk":"md")}>{L(s.tar,s.ten)}</div>
                    <div className="sg-meta">{s.v} {L("آية","ayahs")}</div>
                    <div className="sg-page">{L("ص","P.")}{s.pg}</div>
                  </div>
                ))}
              </div>
            )}
            {stab==="juz" && (
              <div className="juz-list">
                {JUZ.map(j=>{const s=SURAHS[j.s-1];return(
                  <div key={j.j} className="juz-row" onClick={()=>openSurah(s)}>
                    <div className="juz-orb">{j.j}</div>
                    <div className="juz-info">
                      <div className="juz-name">{L("الجزء "+j.j,"Juz "+j.j)}</div>
                      <div className="juz-sub">{L(s.arShort,s.en)}</div>
                    </div>
                    <div className="juz-arrow">←</div>
                  </div>
                );})}
              </div>
            )}
          </div>
        </React.Fragment>
      )}

      {/* ══════ READER (MUSHAF) ══════ */}
      {tab==="reader" && surah && (
        <div className="reader-shell su">
          {/* Sub-nav */}
          <div className="reader-nav">
            <div className="chip navy">{surah.arShort}</div>
            <div style={{width:1,height:14,background:"var(--bdr)",flexShrink:0}}/>
            <div className="chip gold">{L("ج"+getJuz(surah.n),"Juz "+getJuz(surah.n))}</div>
            <div style={{width:1,height:14,background:"var(--bdr)",flexShrink:0}}/>
            <div className={"chip"+(showT?" navy":"")} onClick={()=>setShowT(s=>!s)}>{L("ترجمة","Translation")}</div>
            <div style={{marginRight:"auto",fontSize:10,color:"var(--ink4)",flexShrink:0,fontWeight:700,fontFamily:"var(--efont)"}}>{surah.v} {L("آية","v")}</div>
          </div>
          {/* Sheikh strip */}
          <div className="sheikh-strip">
            <div className="sheikh-label">{L("القارئ:","Reciter:")}</div>
            {SHEIKHS.map((sh,i)=>(
              <div key={sh.id} className={"sheikh-btn"+(shIdx===i?" on":"")}
                onClick={()=>{setShIdx(i);if(playV!==null){stopAudio();msg(L("تم التغيير","Switched"));}}}>
                {isAr?sh.ar:sh.en}
              </div>
            ))}
          </div>
          {/* Toolbar */}
          <div className="reader-toolbar">
            <div className={"rtbtn"+(autoScroll?" on":"")} onClick={()=>setAutoScroll(s=>!s)}>📜 {L("تمرير","Auto")}</div>
            <div className="rtbtn" onClick={()=>{if(selV){const v=verses.find(x=>x.numberInSurah===selV);if(v)toggleBM(v,surah);}else msg(L("اضغط آية","Tap ayah"));}}>🔖</div>
            <div className="rtbtn" onClick={()=>{if(selV){const v=verses.find(x=>x.numberInSurah===selV);if(v)share(v,surah);}else msg(L("اضغط آية","Tap ayah"));}}>📤</div>
            <div className={"rtbtn play"} onClick={()=>{if(verses[0])playAyah(verses[0].numberInSurah,verses[0].number,verses);}}>▶ {L("تشغيل","Play")}</div>
            <div className="font-ctrl">
              <div className="fc-btn" onClick={()=>setFs(f=>Math.max(18,f-2))}>A−</div>
              <div className="fc-val">{fs}</div>
              <div className="fc-btn" onClick={()=>setFs(f=>Math.min(48,f+2))}>A+</div>
            </div>
          </div>
          {/* Mushaf page */}
          <div className="mushaf-page" ref={pageRef}>
            <div className="surah-header">
              <div className="surah-header-glow"/>
              <div className="surah-ornament">◆ ◇ ◆</div>
              <div className="surah-ar-name">{surah.ar}</div>
              <div className="surah-en-name">{surah.en}</div>
              <div className="surah-pills">
                <span className="spill">{surah.v} {L("آية","Ayahs")}</span>
                <span className={"spill "+(surah.tar==="مكية"?"makki":"madani")}>{L(surah.tar,surah.ten)}</span>
                <span className="spill gold-pill">{L("الجزء "+getJuz(surah.n),"Juz "+getJuz(surah.n))}</span>
                <span className="spill">{L("ص","P.")}{surah.pg}</span>
              </div>
            </div>

            {/* BISMILLAH — once, except Fatiha (it's verse 1) and Tawba */}
            {surah.n!==1 && surah.n!==9 && (
              <div className="bismillah-block">
                <span className="corner tl">◆</span>
                <span className="corner tr">◆</span>
                <span className="corner bl">◆</span>
                <span className="corner br">◆</span>
                <div className="bism-text">{BISM}</div>
              </div>
            )}

            {loading ? (
              <div className="loading-state">
                <span className="loading-spinner">🌙</span>
                <div className="loading-text">{L("جاري التحميل...","Loading...")}</div>
              </div>
            ) : (
              <React.Fragment>
                {/* Continuous Mushaf text */}
                <div className="ayah-body" style={{fontSize:fs+"px"}}>
                  {verses.map(v=>(
                    <span key={v.number}
                      ref={el=>{if(el)ayRefs.current[v.numberInSurah]=el;}}
                      className={"ayah-span"+(playV===v.numberInSurah?" playing":"")+(selV===v.numberInSurah?" selected":"")}
                      onClick={()=>{
                        setSelV(p=>p===v.numberInSurah?null:v.numberInSurah);
                        setLastRead({n:surah.n,arShort:surah.arShort,en:surah.en,ayah:v.numberInSurah});
                      }}>
                      {v.text}
                      {" "}
                      <span
                        className={"ayah-num"+(playV===v.numberInSurah?" is-playing":"")}
                        onClick={e=>{e.stopPropagation();playAyah(v.numberInSurah,v.number,verses);}}>
                        {v.numberInSurah}
                      </span>
                      {" "}
                    </span>
                  ))}
                </div>
                {/* Next surah */}
                {nextS && verses.length>0 && (
                  <div className="next-surah" onClick={()=>openSurah(nextS)}>
                    <span style={{fontSize:22,color:"var(--ink4)"}}>→</span>
                    <div className="ns-info">
                      <div className="ns-label">{L("السورة التالية","NEXT SURAH")}</div>
                      <div className="ns-ar">{nextS.ar}</div>
                      <div className="ns-meta">{nextS.en} · {nextS.v} {L("آية","v")}</div>
                    </div>
                    <span style={{fontSize:26}}>📖</span>
                  </div>
                )}
              </React.Fragment>
            )}
          </div>

          {/* Translation panel */}
          <div className={"trans-panel"+(showT?" open":"")}>
            <div className="trans-inner">
              <div className="trans-header">
                <div className="trans-title">✦ SAHIH INTERNATIONAL</div>
                <div className="trans-close" onClick={()=>setShowT(false)}>✕</div>
              </div>
              {trans.map((t,i)=>(
                <div key={t.number} className="trans-verse">
                  <div className="trans-v-num">Ayah {t.numberInSurah}</div>
                  <div className="trans-v-ar">{verses[i]?.text}</div>
                  <div className="trans-v-en">{t.text}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Audio player bar */}
          {playV!==null && (
            <div className="audio-bar">
              <div className="audio-play-btn" onClick={togglePlay}>{playing?"⏸":"▶"}</div>
              <div className="audio-info">
                <div className="audio-title">{L("الآية "+playV+" · "+SHEIKHS[shIdx].ar,"Ayah "+playV+" · "+SHEIKHS[shIdx].en)}</div>
                <div className="audio-sub">{surah.en} · Auto-scroll {autoScroll?"ON":"OFF"}</div>
                <div className="audio-progress"><div className="audio-fill" style={{width:prog+"%"}}/></div>
              </div>
              <div className="audio-stop" onClick={stopAudio}>⏹</div>
            </div>
          )}
        </div>
      )}

      {/* ══════ ATHKAR HOME ══════ */}
      {tab==="athkar" && !athCat && (
        <div className="scroll su">
          <div className="athkar-home">
            <div className="athkar-label">{L("اختر قسماً","Choose a section")}</div>
            <div className="ath-grid">
              {ATHKAR_CATS.map(c=>(
                <div key={c.id} className={"ath-card ath-"+c.col} onClick={()=>setAthCat(c.id)}>
                  <div className="ath-ico">{c.ico}</div>
                  <div className="ath-title">{isAr?c.ar:c.en}</div>
                  <div className="ath-count">{(ATHKAR[c.id]||[]).length} {L("ذكر","adhkar")}</div>
                  <div className="ath-bar"/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ══════ ATHKAR READER ══════ */}
      {tab==="athkar" && athCat && (
        <React.Fragment>
          <div className="ath-audio-strip">
            <div className="aas-label">🔊 {L("تلاوة","Play")}</div>
            <div className="aas-sheikhs">
              {ATH_SHEIKHS.map((sh,i)=>(
                <div key={sh.id} className={"aas-btn"+(athShIdx===i?" on":"")} onClick={()=>{stopAthAud();setAthShIdx(i);}}>
                  {isAr?sh.ar:sh.en}
                </div>
              ))}
            </div>
            {athPlayCat===athCat
              ? <div className="aas-play-btn" style={{background:"var(--red)"}} onClick={stopAthAud}>⏹</div>
              : <div className="aas-play-btn" onClick={()=>{
                  stopAthAud();
                  const nums=[1,2,3,4,5,6,7]; let idx=0;
                  const pn=()=>{
                    if(idx>=nums.length)return;
                    const a=new Audio(ATH_SHEIKHS[athShIdx].url+"/"+nums[idx]+".mp3");
                    a.onended=()=>{idx++;pn();};a.onerror=()=>{idx++;pn();};
                    a.play().catch(()=>{});
                    if(idx===0){setAthAud(a);setAthPlayCat(athCat);}
                    idx++;
                  };
                  pn();msg(L("🎵 تشغيل الفاتحة","🎵 Playing Al-Fatiha"));
                }}>▶</div>
            }
          </div>
          <AthkarReader cat={athCat} items={ATHKAR[athCat]||[]} fs={fs} L={L} counts={zCounts} onIncr={incrZ}/>
        </React.Fragment>
      )}

      {/* ══════ RAMADAN ══════ */}
      {tab==="ramadan" && (
        <RamadanPage pt={pt} L={L} tDone={tDone} setTDone={setTDone} kDone={kDone} setKDone={setKDone}/>
      )}

      {/* ══════ PRAYER TIMES ══════ */}
      {tab==="prayer" && (
        <div className="prayer-page su">
          {/* Hero */}
          <div className="prayer-hero-full">
            <div className="phf-glow"/>
            <div className="phf-city">📍 {L("دبي، الإمارات","Dubai, UAE")}</div>
            {nextP&&pt ? (
              <React.Fragment>
                <div className="phf-cd-label">{L("الوقت المتبقي لصلاة","TIME REMAINING FOR")}</div>
                <div className="phf-prayer-name">{L(PNAMES_AR[nextP],PNAMES_EN[nextP])}</div>
                <div className="phf-countdown" dir="ltr">{cd}</div>
              </React.Fragment>
            ) : <div className="phf-countdown" dir="ltr" style={{opacity:0.25}}>--:--:--</div>}
            <div className="phf-date-row">
              <div className="phf-date">{wdAr}</div>
              <div style={{width:1,height:14,background:"rgba(255,255,255,0.1)",flexShrink:0}}/>
              <div className="phf-date">{hijri}</div>
            </div>
          </div>

          {/* Prayer cards */}
          <div className="prayer-cards-wrap">
            {pt&&PRAYERS.map(p=>(
              <div key={p} className={"prayer-card"+(nextP===p?" current":"")}>
                <div className="pc-icon">{PICO[p]}</div>
                <div className="pc-info">
                  <div className="pc-name">{L(PNAMES_AR[p],PNAMES_EN[p])}</div>
                  <div className="pc-sub">{nextP===p?L("الصلاة القادمة","Next prayer"):L("صلاة "+PNAMES_AR[p],PNAMES_EN[p]+" prayer")}</div>
                </div>
                <div className="pc-time" dir="ltr">{pt[p]?pt[p].slice(0,5):"--:--"}</div>
              </div>
            ))}
          </div>

          {/* Reminders */}
          <div className="prayer-reminders">
            <div className="pr-section-title">🔔 {L("تنبيهات الصلاة","Prayer Reminders")}</div>
            <button className="pr-enable-btn" onClick={setupReminders}>{L("🔔 تفعيل إشعارات الصلاة","🔔 Enable Prayer Notifications")}</button>
            {pt&&PRAYERS.map(p=>(
              <div key={p} className="pr-reminder-row">
                <div className="prr-left">
                  <span style={{fontSize:20}}>{PICO[p]}</span>
                  <div className="prr-name">{L(PNAMES_AR[p],PNAMES_EN[p])}</div>
                </div>
                <div className="prr-right">
                  <div className="prr-time" dir="ltr">{pt[p]?.slice(0,5)}</div>
                  <Tog on={reminders[p]||false} fn={()=>setReminders(prev=>({...prev,[p]:!prev[p]}))}/>
                </div>
              </div>
            ))}
            <div style={{fontSize:10,color:"var(--ink4)",textAlign:"right",direction:"rtl",padding:"6px 2px",fontFamily:"var(--ufont)"}}>{L("* يتطلب السماح بالإشعارات في المتصفح","* Requires browser notification permission")}</div>
          </div>
        </div>
      )}

      {/* ══════ SETTINGS ══════ */}
      {tab==="settings" && (
        <div className="settings-page su">
          <div className="settings-hero">
            <div className="sh-glow"/>
            <div className="sh-icon">🕌</div>
            <div className="sh-app-name">القرآن الكريم</div>
            <div className="sh-version">V 10.0 · THE HOLY QURAN</div>
          </div>

          {/* Display */}
          <div className="settings-section">
            <div className="settings-section-label">DISPLAY · العرض</div>
            <div className="settings-card">
              <div className="settings-row">
                <div className="sr-icon" style={{background:"var(--bg2)"}}>🌙</div>
                <div className="sr-body"><div className="sr-label">{L("الوضع الليلي","Dark Mode")}</div><div className="sr-sub">{L("خلفية داكنة","Dark background")}</div></div>
                <div className="sr-ctrl"><Tog on={dark} fn={()=>setDark(d=>!d)}/></div>
              </div>
              <div className="settings-row">
                <div className="sr-icon" style={{background:"var(--bg2)"}}>🌐</div>
                <div className="sr-body"><div className="sr-label">{L("اللغة الإنجليزية","Arabic Interface")}</div><div className="sr-sub">{L("تغيير لغة الواجهة","Switch interface language")}</div></div>
                <div className="sr-ctrl"><Tog on={!isAr} fn={()=>setIsAr(a=>!a)}/></div>
              </div>
            </div>
          </div>

          {/* Quran */}
          <div className="settings-section">
            <div className="settings-section-label">QURAN · القرآن</div>
            <div className="settings-card">
              <div className="settings-row">
                <div className="sr-icon" style={{background:"var(--goldbg)"}}>🔤</div>
                <div className="sr-body"><div className="sr-label">{L("حجم الخط","Font Size")}</div><div className="sr-sub">{L("حجم نص القرآن","Quran text size")}</div></div>
                <div className="sr-ctrl">
                  <div className="font-stepper">
                    <div className="fs-btn" onClick={()=>setFs(f=>Math.max(18,f-2))}>−</div>
                    <div className="fs-val">{fs}</div>
                    <div className="fs-btn" onClick={()=>setFs(f=>Math.min(48,f+2))}>+</div>
                  </div>
                </div>
              </div>
              <div className="settings-row">
                <div className="sr-icon" style={{background:"var(--goldbg)"}}>📜</div>
                <div className="sr-body"><div className="sr-label">{L("التمرير التلقائي","Auto Scroll")}</div><div className="sr-sub">{L("التمرير مع التلاوة","Scroll with recitation")}</div></div>
                <div className="sr-ctrl"><Tog on={autoScroll} fn={()=>setAutoScroll(s=>!s)}/></div>
              </div>
              <div className="settings-row">
                <div className="sr-icon" style={{background:"var(--bluebg,#EEF3FA)"}}>📖</div>
                <div className="sr-body"><div className="sr-label">{L("عرض الترجمة","Show Translation")}</div><div className="sr-sub">Sahih International</div></div>
                <div className="sr-ctrl"><Tog on={showT} fn={()=>setShowT(s=>!s)}/></div>
              </div>
            </div>
          </div>

          {/* Audio */}
          <div className="settings-section">
            <div className="settings-section-label">AUDIO · الصوت</div>
            <div className="settings-card">
              <div className="settings-row" style={{paddingBottom:8}}>
                <div className="sr-icon" style={{background:"var(--goldbg)"}}>🎙️</div>
                <div className="sr-body"><div className="sr-label">{L("القارئ","Reciter")}</div><div className="sr-sub">{isAr?SHEIKHS[shIdx].ar:SHEIKHS[shIdx].en}</div></div>
              </div>
              <div className="sheikh-grid">
                {SHEIKHS.map((sh,i)=>(
                  <div key={sh.id} className={"sheikh-option"+(shIdx===i?" on":"")}
                    onClick={()=>{setShIdx(i);if(playV!==null){stopAudio();msg(L("تم التغيير","Switched"));}}}>
                    <div className="so-name">{isAr?sh.ar:sh.en}</div>
                    <div className="so-en">{sh.en}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Prayer */}
          <div className="settings-section">
            <div className="settings-section-label">PRAYER · الصلاة</div>
            <div className="settings-card">
              <div className="settings-row">
                <div className="sr-icon" style={{background:"rgba(30,58,95,0.08)"}}>📍</div>
                <div className="sr-body"><div className="sr-label">{L("المدينة","City")}</div><div className="sr-sub">Dubai, UAE</div></div>
                <div className="sr-ctrl"><div className="sr-value">دبي <span className="sr-chevron">›</span></div></div>
              </div>
              <div className="settings-row">
                <div className="sr-icon" style={{background:"rgba(26,107,68,0.08)"}}>🔔</div>
                <div className="sr-body"><div className="sr-label">{L("تنبيهات الصلاة","Prayer Alerts")}</div><div className="sr-sub">{L("إدارة مواقيت الصلاة","Manage prayer times")}</div></div>
                <div className="sr-ctrl"><div className="sr-value" style={{cursor:"pointer"}} onClick={()=>setTab("prayer")}>← <span className="sr-chevron"/></div></div>
              </div>
            </div>
          </div>

          {/* About */}
          <div className="settings-section" style={{paddingBottom:24}}>
            <div className="settings-section-label">ABOUT · عن التطبيق</div>
            <div className="settings-card">
              <div className="settings-row">
                <div className="sr-icon" style={{background:"var(--goldbg)"}}>📿</div>
                <div className="sr-body"><div className="sr-label">{L("مصدر البيانات","Data Sources")}</div><div className="sr-sub">AlQuran.cloud · Aladhan.com</div></div>
              </div>
              <div className="settings-row">
                <div className="sr-icon" style={{background:"rgba(26,107,68,0.08)"}}>🤲</div>
                <div className="sr-body"><div className="sr-label">{L("دعاء","Dua")}</div><div className="sr-sub" style={{fontFamily:"var(--qfont)",fontSize:13,lineHeight:1.8,color:"var(--ink3)"}}>{L("اللهم اجعل هذا العمل خالصاً لوجهك الكريم","May Allah accept this humble work")}</div></div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ══════ BOOKMARKS ══════ */}
      {tab==="bookmarks" && (
        <div className="bm-wrap su">
          <div className="bm-hero">
            <div className="bm-hero-title">{L("المحفوظات","Bookmarks")}</div>
            <div className="bm-hero-count">{bms.length} {L("آيات محفوظة","saved ayahs")}</div>
          </div>
          {bms.length===0 ? (
            <div className="empty-state">
              <div className="empty-ico">🔖</div>
              <div className="empty-text">{L("لا توجد محفوظات بعد\nافتح سورة ← اضغط آية ← 🔖","No bookmarks yet\nOpen surah → tap ayah → 🔖")}</div>
            </div>
          ) : bms.map(b=>(
            <div key={b.id} className="bm-row" onClick={()=>openSurah(SURAHS[b.sn-1])}>
              <div className="bm-icon">🔖</div>
              <div className="bm-info">
                <div className="bm-title">{b.sar} · {L("آية","Ayah")} {b.vn}</div>
                <div className="bm-subtitle">{b.sen} · {L("سورة","Surah")} {b.sn}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ══════ BOTTOM NAV ══════ */}
      <div className="bnav">
        {NAV.map(n=>(
          <div key={n.id}
            className={"bnav-item"+(tab===n.id||(tab==="reader"&&n.id==="surahlist")?" on":"")}
            onClick={()=>{stopAudio();if(n.id!=="athkar")setAthCat(null);setTab(n.id);}}>
            <div className="bnav-indicator"/>
            <span className="bnav-icon">{n.ico}</span>
            <span className="bnav-label">{L(n.ar,n.en)}</span>
          </div>
        ))}
      </div>

      {/* Toast */}
      {toast && <div className="toast-msg">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
